s — is possible. But “could account for” is not the same as evidence. No pre-Columbian wheat has been found in Mesoamerican archaeological deposits. The barley precedent is directly relevant to how much weight this absence should carry — but that precedent does not confirm wheat. It only establishes that absence of archaeological confirmation is not the same as impossibility.","V-A. Silk and Fine-Twined Linen — The Anachronism That Is Not One","Critics of the Book of Mormon have treated its references to “fine silks” and “fine-twined linen” (Alma 4:6) as anachronisms betraying 19th-century New England authorship. The argument assumes that silk and linen were Old World products unknown in the Americas. Mesoamerican textile evidence makes this argument considerably harder to sustain.","Three distinct silk-equivalent fabrics were produced in pre-Columbian Mesoamerica. First: silk was spun in Mexico from the cocoons of wild moths, a process equivalent in nearly every way to East Asian silk production. Second: kapok fiber from the seed pods of the ceiba tree in Yucatan was gathered and spun into cloth described by contemporaries as “as soft and delicate, and perhaps more so, than silk.” Third: pita floja (silkgrass, Achmea magdalenae) from the Guatemalan piedmont yielded another silk-equivalent fiber. Leaves of the wild pineapple plant supplied yet a fourth. Any of these could plausibly be what a translator of ancient Nephite text rendered as “silk.”","For linen: flax was not grown in the Americas, but cloth that looked and felt like flax linen was manufactured from agave/maguey fibers (henequen). Bernal Díaz, one of the Spanish conquerors under Cortéz, explicitly described henequen garments as seeming “like linen.” Yucca fiber gave similar results. The BOM's “fine-twined linen” need not specify flax — it specifies a luxury woven fabric that Mesoamerica demonstrably produced.","The Joseph Smith test applies cleanly. That pre-Columbian Mesoamerica produced silk-equivalent and linen-equivalent luxury textiles was not documented in any source available in 1829. The evidence arrived through 20th-century textile archaeology. A fabricator in upstate New York inventing references to silk and fine-twined linen would have been guessing in a way that happened, against prior probability, to be correct. 6","VI. The Animal Gaps — Sheep, Goats, Swine, Asses, and Cattle","First Nephi 18:25 records Nephi cataloguing animals found in the New World on arrival, including cows, oxen, asses, horses, goats, and wild goats. The list reads as a man sorting unfamiliar fauna into the livestock categories he already knows — the conceptual bins of Iron Age Palestine imposed on a New World landscape. None of these Old World domesticates has been confirmed archaeologically in pre-Columbian Mesoamerica. The animals are real gaps. What varies is how plausible the loanshift candidates are for each.","The single Book of Mormon reference to swine is in Ether 9:18. No domestic pigs (Sus scrofa) existed in pre-Columbian Mesoamerica. The loanshift candidate is the peccary. Two peccary species are native to Mesoamerica: the collared peccary and the white-lipped peccary, both present from the Olmec period onward. The collared peccary has characteristically hog-like jowls, protruding snout, thick neck; it grunts; it rolls in mud; it is omnivorous. The Maya kept herds of peccaries, using them in rituals and for food. Early Spanish observers used pig and boar terminology for peccaries routinely. Weight: moderate loanshift. Removes simple anachronism.","Goats appear in Ether 9:18 and 1 Nephi 18:25. No domestic goats (Capra hircus) existed in pre-Columbian Mesoamerica. The loanshift candidate is the brocket deer (genus Mazama), native to the proposed Book of Mormon territory. Friar Diego de Landa — the 16th-century Spanish bishop — wrote of Mesoamerican wildlife: “There are wild goats which the Indians call yuc. They have only two horns like goats and are not as large as deer.” He described the small red brocket deer specifically as a “certain kind of little wild goats, small and very active and of darkish color.” The Maya, when they encountered the European goat after the conquest, gave it the name temazate — from the Nahuatl word for brocket deer. The Maya themselves recognized the equivalence. Weight: moderate-strong loanshift. Primary source confirms European observers made exactly this identification.","Sheep (Ovis aries) appear in Ether 9:18 and Mosiah 5:14. No domestic sheep existed in pre-Columbian Mesoamerica. Mountain sheep are native to North America but their documented range does not extend into the proposed Mesoamerican Book of Mormon territory. The loanshift argument is possible but thin. Weight: honest gap. No positive argument made.","Asses/donkeys appear in 1 Nephi 18:25 and Enos 1:21. No wild asses exist in the Americas. The tapir has been proposed as a loanshift candidate — it is large, docile with humans, and was used for meat throughout Mesoamerica. But tapirs are not herd animals, cannot be driven in groups like donkeys, and their appearance bears little resemblance to equines. Weight: honest gap. Tapir loanshift is possible but not supported by evidence of Spanish observers making this identification independently.","Cattle is the hardest of the five, because the Book of Mormon uses both the generic term “cattle” and the specific terms “cow” and “ox.” No bovines (Bos taurus) existed in pre-Columbian Mesoamerica. The Hebrew word for cattle (baqar) can refer to large quadrupeds broadly, and the loanshift argument is consistent with how Hebrew taxonomic categories sometimes work. The specific gender-and-function distinction between “cow” and “ox” in 1 Nephi 18:25 is harder to explain by loanshift than the generic term alone. Weight: honest gap. Most difficult of the five to address by loanshift.","These five animal gaps are real and should be named as such. They do not collapse the geographic model — the Book of Mormon never describes a pastoral agricultural economy comparable to the Levant; the animals appear in lists alongside confirmed and plausible items. But they are not all equal: the swine/peccary case is a genuine loanshift candidate; the goat/brocket deer case has direct primary-source confirmation from independent Spanish observers; sheep, asses, and cattle are honest gaps with no confirmed Mesoamerican referent. 7","The Book of Mormon's references to wine have been treated as anachronistic, but the Mesoamerican evidence is more varied than critics suggest. The Spanish conquerors documented many fermented beverages in Mesoamerica — maguey/pulque, banana, palm sap, pineapple, tree bark with honey, and other fruits — all of which 16th-century Spaniards called “wine.” Father Thomas Gage documented “vineyards” of maguey plants in 17th-century Guatemala from which pulque was made (exactly the sense in which Zeniffite King Noah's “vineyards,” Mosiah 11:15, may be read). Grapes were also known in the Gulf Coast area and among the Yucatan Maya.","The most specific evidence comes from the proposed Zarahemla location itself. Martinez M. excavated a Late Pre-Classic site (first centuries BC/AD) beside the Grijalva River in Chiapas and carefully recovered all plant remains. He found seeds of Vitis vinifera — the European wine grape known in the Old World — from which he concluded that actual grape-based wine could have been produced at this location. This is not a Mesoamerican parallel to wine; it is evidence of the actual plant at the actual site during the actual period.","The BOM's wine references are therefore consistent on multiple levels: with the broad Mesoamerican fermented-beverage tradition, with documented knowledge of grapes in the Gulf Coast and Maya regions, and with direct archaeological evidence of wine grapes at the Grijalva River site identified as Zarahemla.","Primary: Sorenson, J.L. 2013. Mormon's Codex. Deseret Book/Maxwell Institute. [Ch. 16, pp. 307–308: Grijalva River Vitis vinifera find; maguey vineyards; Gulf Coast and Maya grape knowledge] | La Barre, W. 1938. “Native American Beers.” American Anthropologist 40:224–234. | Mosiah 11:15; Alma 55:32.","Horses and Late-Survival Animals","The Book of Mormon's horse references are among the most frequently cited animal challenges. The text never describes horses being ridden. In the Lamanite king passages (Alma 18:9–12; 20:6), horses are associated with chariots only to “conduct” a traveling party — transport, not riding. In 3 Nephi 3:22, Nephites apparently kept horses as part of a food supply. The Jaredites “had” horses (Ether 9:19) with no description of use. These are not the cavalry horses of 19th-century popular imagination.","The loanshift framework is directly relevant here. When the Aztecs first encountered Spanish horses, they called them “the Spaniards' deer.” Europeans called small Mexican brocket deer “goats.” In the Isthmus of Tehuantepec, the tapir was called “once an ass.” These are not ancient examples — they are 16th-century examples showing exactly how unfamiliar beasts receive familiar names in new environments. A Nephite encountering a tapir in coastal Guatemala would have applied the nearest Old World equivalent: horse, ass, or similar. The tapir is the largest land animal in the Americas and is particularly well-suited to the proposed Nephite territory.","Late-survival evidence adds a further dimension. Mastodon bones (alongside horse bones) were found in eastern Yucatan dated to approximately 1800 BC — within the Jaredite chronological range. Mastodons survived in Florida to around 100 BC; in the Great Lakes region to 4000 BC; in the Mississippi Valley to 3300 BC. Wade Miller's review of the evidence documents survival dates that were still being revised as recently as 2009. The Jaredite text mentions elephants (Ether 9:19) with no later BOM reference to them — consistent with a population that encountered megafauna during the Jaredite period but whose descendants did not.","The honest framing: no confirmed pre-Columbian horse skeleton from the BOM period and territory has been identified and dated by non-LDS archaeologists as a Nephite horse. The loanshift and late-survival arguments are plausible but not demonstrated. They belong in the honest account as mitigating factors, not as resolutions.","VII. Mosiah 29 — The Governance System That Fails","“Now it is not common that the voice of the people desireth anything contrary to that which is right; but it is common for the lesser part of the people to desire that which is not right; therefore this shall ye observe and make it your law — to do your business by the voice of the people. — Mosiah 29:26”","The most common critique of Mosiah 29 is also the most superficial: that King Mosiah's transition from monarchy to elected judges simply reflects Joseph Smith's 19th-century American democratic environment. The critique sounds plausible until you examine what the Nephite governance system actually looks like — and what happens to it.","A methodological point belongs here before examining what the system actually looks like. Is the absence of chief-judge governance in the Mesoamerican archaeological record evidence against the text's account? No — and for the same reason documented throughout this book. Nephite political institutions would be no more archaeologically visible than Nephite temples, Nephite writing, or Nephite material culture generally. The surrounding Lamanite and indigenous city-state structures dominate the Preclassic record precisely because those are the peoples who built the monuments that survived. Even when the Nephites had kings, those kings would not appear in the archaeological record as a unified Nephite monarchy — the Nephites were a minority embedded in a larger Mesoamerican context, and the record reflects the majority. The correct evidentiary test for a Nephite-sphere claim about internal governance is the text itself, not the surrounding archaeology. That is what the analysis below addresses.","Five Structural Features That Point Away From 1829","Gregory Steven Dundas, in a 51-page treatment in BYU Studies Quarterly (2017), identifies five structural features of the Nephite system that separate it from 19th-century American governance. BYU Studies is an LDS-affiliated journal; Dundas is an attorney, not a professional historian. The argument stands not on Dundas's authority but on the underlying features themselves, each of which can be evaluated against the ancient Near Eastern governance literature independently. Korošec's 1931 analysis of Hittite suzerainty treaties, Mendenhall's 1954 work on treaty-covenant patterns, and Moran's 1992 Amarna letters scholarship all document ancient Near Eastern governance structures that share the features Dundas identifies as absent from 1829 American political culture. The five structural features: (1) No representative legislature. No such body exists in the Nephite system. Judges apply traditional law given by their ancestors — law they cannot change. (2) Fused roles. Alma, the first chief judge, held simultaneously: chief judge, high priest, governor, and military commander. The tripartite separation of powers was essentially an invention of Montesquieu and Madison. The Nephite fusion of roles matches specifically the pre-monarchic Israelite model, where the judge (shophet) functioned as civil authority, military leader, and priestly representative simultaneously. (3) Hereditary transmission of office. Alma passed the chief judgeship to his son. There were no recurring elections in the modern sense. (4) Traditional law, not majority will. Law is fixed — given by God through Moses and the Brass Plates. New legislation is viewed as evil (Mosiah 29:23). This is covenant-nomocracy, not popular sovereignty. (5) The system fails. Dundas calls it “one of the great tragic ironies of the Book of Mormon”: Mosiah's governance innovation produces precisely the political chaos he hoped to prevent. A 19th-century American democratic apologist writing a fictional ancient civilization would not depict democracy failing catastrophically. The Book of Mormon depicts exactly this. 8","The Book of Mormon's Own Political Theology Is Not Democratic","Mosiah 29:13 states it plainly: the best government is a righteous king. Popular governance is the fallback precisely because righteous kings are rare and succession is unpredictable. This is the universal ancient view — the view Plato, Aristotle, and every ANE political theorist shared. It is the opposite of the democratic optimism that saturated 1829 American culture.","The Joseph Smith test for this argument is weaker than for King Benjamin or the monetary system. The book of Judges is in the KJV. Deuteronomy 17 warns against monarchy. 1 Samuel 8 addresses the dangers of kings. A careful biblical reader in 1829 could have drawn on these texts and arrived at something similar. This argument therefore stands primarily as a defensive response to a specific critique, not as a “Joseph couldn't have known this” argument. Its contribution: the text reflects ancient political theology rather than 19th-century democratic optimism, and the system's failure is structurally inconsistent with what an American democratic apologist would write.","VIII. Synagogues — The Anachronism Critique Does Not Hold","Critics argue that the Book of Mormon's use of the word “synagogue” is anachronistic: synagogues did not exist when Lehi left Jerusalem around 600 BC; they emerged during or after the Babylonian captivity (587–538 BC). The critique sounds plausible. It fails at the first factual checkpoint.","Psalm 74:8 (KJV) reads: “They have burned up all the synagogues of God in the land.” This psalm is widely dated to the Babylonian destruction of Jerusalem (586 BC) or the Maccabean period — in either case, the word “synagogue” appears in the KJV in a pre-exilic or exile-era context. Joseph Smith had this word in his Bible. The claim that his use of it betrays post-exilic anachronism collapses: the anachronism is in the KJV's own translation choices, not in the Book of Mormon's usage.","Lee Levine (Hebrew University, Yale), the leading non-LDS authority on the ancient synagogue, proposes in his 2005 monograph that the biblical city gate served the communal, judicial, and assembly functions later associated with the synagogue “for centuries, if not for a millennium or more.” In 622 BC — approximately twenty years before Lehi's departure — Josiah's Deuteronomic reforms centralized all sacrifice at Jerusalem and abolished local sanctuaries. Non-LDS OT scholar Jacob Weingreen observes: “It would be natural to suppose that, following upon the enforcement of Josiah's edict, religious services continued to be held outside Jerusalem, but now without sacrifices.” These non-sacrificial local gatherings are, for several scholars, the earliest synagogues. Lehi and his family left Jerusalem in the immediate aftermath of this reform.","Alma 16:13 describes Nephite preaching “in their temples, and in their sanctuaries, and also in their synagogues, which were built after the manner of the Jews.” Three distinct institutions: temple, sanctuary, and synagogue. A. Keith Thompson (Interpreter, 2013) makes the critical observation: this three-institution model “must have originated in pre-exilic times.” After Josiah's reforms, local sanctuaries were abolished. After the exile, the temple was destroyed. The only historical moment when all three existed simultaneously is the pre-reform late 7th-century Jerusalem — exactly when Lehi left.","This is a defensive argument, not a positive footprint. The argument's purpose is to establish that the anachronism critique is factually wrong on its first step and its second step. The anachronism charge should not be conceded. 9","IX. Chariots, Wheels, and the Limits of the Litter Argument","The Book of Mormon mentions chariots in three passages — always in royal or military contexts, never in battle, never described as drawn by horses. The Hebrew word afiryon, rendered “chariot” in the King James Version at Song of Solomon 3:9, refers to a non-wheeled royal litter or palanquin. Pre-Columbian royal litters are documented in Mesoamerica. The argument that Book of Mormon “chariots” are royal litters rather than wheeled vehicles is linguistically supported and archaeologically plausible.","The honest boundary: no wheeled vehicle has been confirmed in pre-Columbian Mesoamerica. The famous Mesoamerican wheeled toys demonstrate that the concept of the wheel was not unknown. Gordon Ekholm's original paper (1946) is careful to note that while the mechanical principle of the wheel was established, it was not applied to practical transport. The litter argument is the strongest available response, and it rests on genuine linguistic evidence. But it is a response to an evidentiary gap, not a positive confirmation.","X. The Book of Abraham Facsimiles","The Book of Abraham presents a different kind of evidentiary challenge. The surviving papyri are, by Egyptological consensus, standard Egyptian funerary documents rather than an Abraham manuscript. Joseph Smith's identification of specific figures in the facsimiles differs from the standard Egyptological reading of the same figures. The Church of Jesus Christ of Latter-day Saints' own Gospel Topics Essay acknowledges this tension directly.","As mentioned in Chapter Eleven, the catalyst-revelation model — the idea that the papyri functioned less like a dictionary and more like a photograph that triggers a memory — is coherent. It requires rethinking what “translation” means for this text. The Artapanus parallel documented in Chapter Eleven is real. So is the Egyptological tension. Readers deserve both.","XI. The Jaredite Route — An Unspecified Journey","The Book of Mormon does not specify how the Jaredites crossed from Mesopotamia to the Americas. Ether 2–6 describes their journey north from the Tower of Babel, through a wilderness, to the great sea, and then across the ocean in sealed barges driven by wind. The direction is not specified. The ocean is not named.","Chapter Five presented the North Atlantic current hypothesis: a vessel launched from a western European or North African coast, with no ability to steer, would be carried by the current system to the Gulf Coast of Mexico. The physics are real. Columbus used this system deliberately. The hypothesis fits the evidence. But the text does not confirm it. The North Atlantic hypothesis is presented in Chapter Five because it fits the destination geography, the barge physics, and the 344-day duration better than the alternatives. But it remains a hypothesis about an unspecified journey, and it should be read as such.","XII. The Population Numbers — How the Estimates Have Changed","LiDAR surveys have substantially overturned earlier objections. The northern Guatemalan lowlands supported 7–11 million people during the Preclassic period. Research published July 7, 2025 by Tulane University's Francisco Estrada-Belli and colleagues, reanalyzing NASA LiDAR data across more than 36,000 square miles of the Maya Lowlands, estimates 9.5–16 million people in the Late Classic Maya Lowlands — a 45 percent jump from previous estimates.","The honest remainder: Ether 15:2's figure of two million Jaredite war casualties — implying a total Jaredite population of perhaps five to ten million — remains at the high end of even LiDAR-revised Preclassic population estimates for the Gulf Coast lowlands specifically. The specific figure has not been confirmed by specific archaeological evidence for the Jaredite homeland.","XII-A. The Skin Color Question — A Correspondence Hidden in Plain Sight","The Book of Mormon's description of a physical distinction between Nephites and Lamanites is one of the most frequently criticized features of the text. Critics treat it as racial mythology without historical basis. The archaeological evidence tells a more nuanced story — one that the model actually predicts.","The BOM describes Nephites as “fair” in complexion and Lamanites as bearing a “dark” skin (2 Nephi 5:21; Jacob 3:8–9; Alma 3:6). The text never explains any physical mechanism for this distinction. What it describes, at its most basic, is a population difference in observable complexion between two groups occupying ecologically distinct zones — Nephites in highland Guatemala, Lamanites in coastal lowlands and piedmont areas. This ecological reading is exactly what the evidence supports.","Modern Mesoamerican populations range from dark brown to near-white — a range that covers essentially the same spectrum as ancient Near Eastern populations. This is not a recent change; it reflects the underlying genetic diversity of pre-Columbian Mesoamerica. The highland/lowland ecological divide in Mesoamerica corresponds to a real complexion gradient in indigenous populations that would have been observable in antiquity.","The more specific evidence comes from ceramic figurines. In Israel and Judah in the seventh to fifth centuries BC — exactly the period when the Lehites departed — white-slipped female figurines were the norm. Ziony Zevit's analysis of figurines from Tell en-Nasbeh found that roughly nine out of ten bore either a white wash or remains of one. Diana Gilbert-Peretz's catalog of figurines from the City of David excavations (1978–1985) documented the same pattern: “definitely flourished from the 8th to the 6th centuries BCE.” Israelite ceramicists of the period considered white-skinned figures important for cult purposes.","In highland Guatemala — the proposed land of Nephi during the early Nephite period — the Las Charcas phase (ca. 650–500 BC) and subsequent periods show white-slipped figurines consistent with this Israelite aesthetic. After the migration of Mosiah's group down from the highlands to Zarahemla (estimated 250–200 BC), the figurine tradition in the Guatemalan highlands shifts: white-slipped figures disappear and exclusively dark figures follow. The timing of Mosiah's departure from the highlands, when the last remnant of the Nephite population left for Zarahemla, coincides broadly with the archaeological shift from the Providencia to the Verbena period in highland Guatemala.","The convergence is this: a group of Near Easterners from a culture that consistently depicted human figures as white-skinned settled in a highland zone where the lighter end of Mesoamerica's natural complexion gradient would have been visible. Their figurine practice matched their homeland tradition. When they departed, the figurine tradition changed. This is not proof of anything. But it is the exact sequence the model predicts, and it arrives from two independent directions — Israelite archaeology and Mesoamerican archaeology — that had no contact with each other.","The honest framing: the BOM's skin color distinction is not the implausible racist invention critics describe. It is an ecologically and archaeologically coherent detail that fits the proposed setting in ways neither Joseph Smith nor his critics in 1830 could have known.","2×2 Filter Note: Lamanite-sphere corroboration of a Nephite-sphere textual claim. The BOM's complexion distinction (Nephite “fair,” Lamanite “dark”) is a Nephite textual claim. The Mesoamerican figurine evidence and the Israeli ceramic parallel are independent corroboration from both spheres simultaneously. Control test: PASSES — the highland/lowland complexion gradient in Mesoamerica is specific to that geography, not a universal. JS test: PASSES — the Israelite white-slip figurine tradition, Zevit's analysis, and the Guatemalan highland figurine sequence were not available in 1829.","DNA evidence is the most frequently cited scientific argument against Book of Mormon historicity. The evidence is addressed directly here, with position stated plainly at the outset: the DNA evidence has not confirmed Book of Mormon historicity. It is a genuine gap and it belongs in this chapter. Judgment about what it ultimately means is withheld.","Critics have used DNA evidence to try to disprove the Book of Mormon with the same confidence that earlier critics used the absence of pre-Columbian barley, the impossibility of ancient cement construction, and the non-existence of a place called Nahom. In each of those cases, advancing science reversed the certainty.","Detecting a founding group of fifty people in a population of millions, 2,600 years later, is the genetic equivalent of trying to find a single drop of food coloring poured into a lake a century ago — the signal may be real, but the tools to find it have not yet been developed. Absence of detection is not proof of absence.","Whether DNA evidence will follow the same pattern is not known. The claim here is not that it will. The picture is significantly more complicated than the confident dismissals suggest, and that the Book of Mormon's own narrative makes no prediction that Near Eastern DNA should survive in detectable form.","A note on terminology: haplogroups are clusters of genetic variants inherited together, used by geneticists to trace ancient population movements. Genetic analysis of modern indigenous American populations and ancient pre-Columbian remains has not found Near Eastern or Israelite genetic markers of the kind that might be expected from a significant Semitic founding population arriving around 600 BC. The primary mitochondrial DNA haplogroups in indigenous Americans — A, B, C, D, and X2a — trace to Siberian and Beringian founding populations 15,000–20,000 years ago. Whole-genome studies of ancient Mesoamerican populations have not detected detectable Near Eastern admixture. This finding is real and is not in dispute.","The Specific Critics and What They Actually Show","The two works most frequently cited by critics are Thomas Murphy's essay “Genetic Research: A Threat to the Book of Mormon?” (2002) and Simon Southerton's Losing a Lost Tribe (Signature Books, 2004). Both argue that the haplogroup data is incompatible with any significant Near Eastern founding population in the Americas. Murphy's and Southerton's core argument is correct as stated: the haplogroup data does not show Near Eastern markers. What their works do not adequately address is the assumptions embedded in drawing strong conclusions from that absence — the same four assumptions developed below. Southerton in particular argues that haplogroup X is the best candidate for a Near Eastern signal and then dismisses it because the X2a variant found in North America diverged from its Middle Eastern relatives too early — approximately 30,000–36,000 years ago by his reading. But this divergence date estimate has been substantially revised as ancient DNA methods have improved, and the population dynamics of haplogroup X2a remain actively contested among geneticists.","Haplogroup X2a — The Anomaly the Standard Model Does Not Cleanly Resolve","Haplogroup X2a deserves specific attention because it is the one haplogroup found in pre-Columbian American populations that does not trace to East Asian or Siberian ancestry. Haplogroup X is found at low frequencies in the Middle East, Europe, North Africa, and among the Druze and Altaian populations. The X2a variant is found in North American indigenous populations — particularly the Ojibwe, Nuu-chah-nulth, Sioux, and several other groups — but is absent from East Asian and Siberian populations that are otherwise ancestral to Native Americans. If haplogroup X2a had arrived via the Beringian land bridge, it should appear in Siberian populations. It does not.","Reidla et al. (2003), writing in the American Journal of Human Genetics, documented the X2a anomaly and noted that its presence in North America “may reflect an additional migration from the Near East or Europe to the Americas.” Bolnick and Smith (2003), responding in the same journal, argued for a Beringian origin of X2a through an unsampled or extinct Siberian population. Neither view is settled. The field has not resolved the X2a question. What is clear is that the haplogroup that critics treat as their best single piece of evidence against Near Eastern arrival is precisely the haplogroup that most clearly resists the standard Beringian-only model. This does not prove Book of Mormon historicity. It demonstrates that the genetics of Native American founding populations is more complicated than the confident dismissals allow.","The corn argument makes this concrete. Mosiah 7:22 records that Lamanite tribute from the Zeniffite people included “one half of our corn, and our barley, and even all our grain of every kind.” Corn is listed first. In Mosiah 9:14 it is the only crop named at all. This is maize — the native American plant that was the dietary foundation of Mesoamerican civilization for thousands of years before Lehi's family arrived. Maize was domesticated from its wild ancestor, teosinte, in the Central Balsas River Valley of southwestern Mexico approximately 9,000 years before the present. Molecular data indicate that the domestication occurred a single time, from teosinte native to this specific watershed. Unlike wheat or barley, which self-seed freely, maize is so completely domesticated that it cannot reproduce without human cultivation. The cob does not shatter; the kernels do not disperse. A maize plant left unattended produces no viable offspring.","Lehi's party could not have found maize growing wild. They could not have domesticated it themselves in a generation or two. They could only have received the seed and the cultivation knowledge — the planting schedules, the soil preparation, the harvesting and storage techniques — from people who already knew it. Sorenson, in “When Lehi's Party Arrived in the Land, Did They Find Others There?” (Journal of Book of Mormon Studies 1, 1992), states the implication directly: “Maize is a native American plant ‘so completely dependent on man that it does not grow in the wild.' Hence the immigrants had to have received the seed and instruction about how to cultivate it from people already on the scene.” The Lamanites had integrated maize so thoroughly into their subsistence — it appeared first in tribute lists, as the only crop singled out in farming narratives — that this integration must have been occurring from the earliest generations of settlement. That means the “others” were present from the beginning.","For the DNA question, the corn is directly relevant. If both Nephites and Lamanites were absorbing indigenous peoples — learning their crops, integrating their practices, intermarrying — from the earliest generations of settlement, then the genetic contribution of any Near Eastern founding group would dilute faster than the critics' standard models assume. A small group that immediately needed indigenous agricultural knowledge to survive was a group with immediate indigenous contact. Contact produces admixture. Admixture produces exactly the haplogroup distribution the studies find. The Book of Mormon does not predict that its founding populations remained genetically isolated. The corn says they could not have. 10","The Assumptions Embedded in the Studies","What is less often examined are the assumptions the DNA studies depend on. First: haplogroup stability. The studies assume that modern Native American haplogroup distribution accurately reflects ancient populations. The colonization era produced catastrophic population collapse — estimates range from 50 to 90 percent of pre-Columbian populations dead from European disease within two centuries. Second: reference population accuracy. A 6th-century BC Israelite population would have had a genetic profile substantially different from modern Jewish, Arab, or other Near Eastern populations. No clean ancient Israelite genome exists to match against. Third: detection thresholds. Standard genetic analysis cannot reliably detect a founding group's contribution to a population below approximately 1–2 percent of an individual's total ancestry. Any founding group that contributed less than this to the broader population would be invisible to current methods regardless of whether they existed. Fourth: sampling geography. Ancient DNA from the proposed Book of Mormon heartland — the tropical Maya lowlands of Guatemala, Belize, and Chiapas — is almost nonexistent. Tropical conditions degrade DNA rapidly. The field is looking for a signal in a region where the relevant ancient data barely exists yet.","The Founder Effect Threshold — What Population Genetics Predicts","Population geneticists have studied how large a founding group must be for its genetic contribution to remain detectable after centuries of admixture. The relevant concept is the founder effect: the loss of genetic variation that occurs when a new population is established by a small number of individuals. Ramachandran et al. (2005), in a landmark PNAS paper on human genetic diversity, established that founding population size is inversely correlated with detectable genetic contribution at later time points. For a founding group that arrived 2,600 years ago and immediately began mixing with an existing population of hundreds of thousands, the expected detectable contribution approaches zero under standard admixture models regardless of the founding group's actual genetic distinctiveness. The detection threshold for such a group — estimated in the range of 50 to 600 individuals for the scenarios described in the Book of Mormon — is at or below the limit of current methods for the time depth involved.","The studies critics cite most heavily — Murphy (2002), Southerton (2004), and the haplogroup surveys underlying them — are based primarily on modern indigenous populations, not ancient DNA. Modern population genetics cannot reliably reconstruct ancient admixture events when the time depth exceeds 2,000 years and the founding population was small. The ancient DNA revolution of the past decade has changed what is possible. Haak et al. (2015) in Nature and Skoglund et al. (2015) in Science demonstrated that ancient DNA can detect founding population events invisible to modern haplogroup surveys. Reich's laboratory at Harvard has since produced ancient DNA studies from dozens of pre-Columbian sites. The critical gap: almost no ancient DNA has yet been extracted from the specific proposed Book of Mormon territory — the tropical lowlands of Chiapas, Guatemala, and Belize. Tropical heat and humidity degrade DNA within decades, let alone millennia. The negative result in DNA studies is a negative result from a region where the data is almost entirely absent. That is not evidence; it is silence from a location that has not yet been heard from.","What the Book of Mormon's Own Narrative Predicts","The Book of Mormon does not predict that Near Eastern DNA would survive in detectable form. Its own narrative describes exactly the genetic scenario that would produce no detectable Near Eastern signal. The Book of Mormon describes three founding migrations, all small. Chapter Two, Section V develops the related argument about Mulekite linguistic corruption as evidence of genetic dilution into surrounding populations. The people of Zarahemla — referred to in LDS scholarship as “Mulekites,” though the term does not appear in the Book of Mormon text — are described as “exceedingly numerous” when found by Mosiah (Omni 1:14–19), their language “corrupted” beyond recognition. Languages do not become unrecognizable in an isolated group. They become unrecognizable when a small founding group mixes extensively with surrounding peoples over centuries. By the time of this merger, both groups were genetically far removed from any Near Eastern founding population.","Primary: Sorenson, J.L. 1992. “When Lehi's Party Arrived in the Land, Did They Find Others There?” Journal of Book of Mormon Studies 1:1–34. | Ranere, A.J. et al. 2009. “The cultural and chronological context of early Holocene maize and squash domestication in the Central Balsas River Valley, Mexico.” PNAS 106(13):5014–5018. [single domestication event from Balsas teosinte; maize completely dependent on human cultivation] | Mosiah 7:22; 9:9, 14.","The Non-Falsifiability Problem — Stated Directly","A careful reader will notice that the small founding population argument cannot be definitively tested: if Near Eastern DNA were found, it would confirm Book of Mormon historicity; if it is not found, the argument says the population was too small to detect. This is a genuine limitation and this book acknowledges it plainly. The logical structure, however, that this logical structure applies to any ancient small founding population anywhere. The absence of a detectable genetic signal from a group of 50 to 100 people arriving 2,600 years ago into a continental population of millions is the expected statistical outcome under population genetics — regardless of where those people came from.","What the DNA evidence ultimately means for Book of Mormon historicity is not known. It has not confirmed the text. This is a real gap. The Church of Jesus Christ's own Gospel Topics Essay states it plainly: “Nothing is known about the extent of intermarriage and genetic mixing between Book of Mormon peoples or their descendants and other inhabitants of the Americas, though some mixing appears evident, even during the period covered by the book's text.”","What the evidence shows is this: critics have used DNA evidence to state with confidence that the Book of Mormon is historically false. That confidence is not warranted by the state of the science. The assumptions embedded in drawing strong conclusions — reference population uncertainty, detection thresholds, sampling gaps in the specific proposed Book of Mormon region, and a Book of Mormon narrative that itself predicts exactly the genetic dilution the studies find — collectively mean that the DNA evidence neither confirms nor refutes. Judgment is suspended and the limitations documented, as this book has done throughout. 11","One piece of non-genetic biological evidence is worth noting in this context. A species of cotton — Gossypium gossypioides — growing in Oaxaca, Mexico, carries a chromosomal sequence that geneticists describe as belonging to “the African clade” of cotton species. Wendel et al. (1995), writing in Molecular Phylogenetics and Evolution, characterized this as a “robust result” representing ancient, cryptic introgression from an African ancestor. The only explanation consistent with the data is prehistoric transoceanic transmission of an African cotton variety to Mexico. This does not identify who carried it or when. But it establishes the general principle that something crossed from the Old World to Mesoamerica before Columbus, leaving a biological signature that the DNA studies of human populations have not yet found. The Book of Mormon's Mulekite party is explicitly politically connected to Egypt: Zedekiah, whose son Mulek the party brought to the New World, ruled Judah as a client king under Egyptian authority (Helaman 8:21). Whether this biological trace has anything to do with that connection is speculative. What is not speculative is that the certainty of critics — “nothing came from the Old World” — is harder to maintain in light of evidence like this.","XIV. Two Collapses, Two Archaeological Signatures","This chapter has discussed the gaps in the evidence. But there is a category of evidence that requires a more careful framing than “gap.” The two major civilizational collapses described in the Book of Mormon — the Jaredite destruction and the Nephite destruction — are not described in the same way. They have structurally different narratives. And they produce structurally different archaeological signatures.","The Jaredite Collapse: Sudden and Total","Ether 15 describes something specific: both Jaredite armies spend four years gathering every living person in the land to their respective sides (Ether 15:12–14). The entire surviving population divided into two groups and systematically annihilated each other. This is not a military defeat. It is civilizational self-annihilation.","The archaeological signature of La Venta — the proposed terminal site of the Jaredite civilization — matches this description with precision. La Venta was abandoned at approximately 400 BC, not through external conquest but through internal disruption. No evidence of a conquering army has been found. The monuments were defaced from within. The abrupt termination of a civilization — sites that do not gradually decline but simply stop — is the exact archaeological signature of a population that annihilated itself rather than being conquered or migrating away.","The Nephite Collapse: Progressive and Northward","The Nephite destruction is structurally different in every way. Mormon begins commanding Nephite armies at approximately 322 AD (Mormon 2:2). What follows is six decades of intermittent but sustained warfare, with the Nephites being driven progressively northward. This is not sudden annihilation. This is a civilization losing ground systematically over decades, retreating northward step by step, until the final stand at Hill Cumorah approximately 385 AD.","John L. Sorenson, in Mormon's Codex (Deseret Book/Neal A. Maxwell Institute, 2013), documents the condition of the Central Depression of Chiapas — the proposed Zarahemla region — at approximately 350 AD, some 35 years before the final battle. Sorenson reports the findings of archaeologists Lowe and Mason, who conducted systematic survey of the valley and found “a general abandonment of most occupied archaeological sites at the close of period VIII.” Lowe concluded that the abandonment “appears to be real rather than illusionary, as the valley has been thoroughly scouted.” Multiple sites throughout the Central Depression show the same pattern simultaneously. This is staged abandonment — beginning in the south, moving northward, leaving sites empty in a progression that exactly mirrors the textual description of the Nephite retreat.","The scale of this depopulation is not ambiguous. Sorenson calculates that the area abandoned across the Central Depression and adjacent valleys was approximately 20,000 square miles — roughly the size of West Virginia. No plausible explanation other than large-scale war accounting for both the death and expulsion of the existing population has been proposed.","The evidence is not limited to site abandonment. Pierre Agrinier's excavations at Mirador, in the Cintalapa Valley at the northwest wing of the Central Depression, revealed that around AD 350 an intense fire totally destroyed the largest sacred building at the site. The temple had been thoroughly cleaned of its contents before it was burned. This is the archaeological signature of a calculated retreat, not a conquest: defenders removing what could be carried, then destroying what could not. Tombs at the same site were looted in the same period. A period of abandonment followed before new settlers appeared — and the pottery of that small successor population showed connections to Kaminaljuyu, in the Guatemalan highlands. The invaders came from the south and east, from the Maya-speaking zone that the Mixe-Zoquean speakers of the Central Depression had long bordered. In the Book of Mormon's framing, this is exactly the direction the final Lamanite military pressure came from.","These are two structurally different collapses producing two structurally different archaeological signatures, and both signatures match their corresponding textual narrative. The Jaredite text describes annihilation; the Jaredite archaeology shows abrupt termination. The Nephite text describes progressive northward retreat; the Nephite archaeology shows staged southward abandonment. A fabricator who happened to get both collapses right would need to have known that La Venta ended abruptly and that the Chiapas Central Depression showed staged abandonment before the final battle. Neither of those facts was known in 1829. 12","One honest distinction: the final Nephite battle site in the Land Northward — Hill Cumorah in the Mesoamerican model — has not been archaeologically identified. The collapse pattern is documented. The terminal site is not. Given that the Land Northward sites are less systematically excavated than the Land Southward, and that LiDAR surveys of the Gulf Coast region continue to produce new findings, this is a gap that may narrow with further research.","Jaredite Collapse (~400–300 BC)","Sudden, total, internal self-annihilation. Both armies gather every living person for four years (Ether 15:12–14). One survivor.","Progressive, multi-decade military retreat northward. Mormon commands armies from ~322 AD through multiple named campaigns (Mormon 2–5).","Four years of gathering, then concentrated final battles. Abrupt civilizational termination.","60+ years of intermittent warfare, with progressive geographic retreat from south to north. Heartland abandoned before final battle.","No external conqueror. Internal violence. The civilization destroys itself.","External military pressure. Progressive loss of territory. Final stand in Land Northward at Hill Cumorah.","La Venta abandoned abruptly ~400 BC. No conquest evidence. Monuments defaced internally. Population disappears sharply.","Chiapas Central Depression: mass site abandonment ~350 AD (Lowe and Mason survey; Sorenson, Mormon's Codex, 2013). Multiple Grijalva valley sites abandoned simultaneously.","Beginning: gap between ~2200 BC Tower of Babel date and ~1200 BC Olmec formation (addressed in Ch. 9 genealogy section).","The specific final battle site in the Land Northward. The collapse pattern and retreat corridor are both documented.","XV. What the Gaps Mean — and What They Do Not Mean","One point of method before the pattern: this book argues for plausibility, not proof. That position was stated in the Preface and has been maintained throughout. The evidence assembled in the preceding eleven chapters does not prove the Book of Mormon is an ancient historical record. It demonstrates that the text is more consistent with an ancient origin than critics have claimed, and less easily dismissed than the standard dismissals suggest. The honest reader — sympathetic or skeptical — deserves that framing before the pattern is named. Reading this chapter alongside the preceding eleven, a pattern emerges. The gaps are real. None of them are fabricated or minimized.","But look at the nature of the gaps. No artifact labeled Nephite: a gap that applies equally to every pre-Columbian civilization, including the Olmec whose existence is beyond dispute — and a gap that the termination ritual archaeology now shows is structurally expected. No pre-Columbian smelted iron: addressed by the translation framework and the iron-ore workshop evidence. No pre-Columbian wheat: addressed by the barley precedent. Synagogues: the anachronism critique fails at the first factual step. The chariot question: the linguistic litter argument is real but not conclusive. The Book of Abraham facsimiles: a genuine tension, fully acknowledged. The Jaredite route: a hypothesis about an unspecified journey. The population numbers: plausible and largely confirmed at scale. DNA: no Near Eastern genetic signal detected — a real gap, though one the Book of Mormon's own Mulekite account predicts.","The 34 AD catastrophe (3 Nephi 8–9) sits differently from the other items in this catalog. Partial corroboration — from the Popocatépetl/Tetimpa eruption, the Tacaná lahar that flooded Izapa, and the submersion of Samabaj beneath Lake Atitlán — is developed in Chapter Seven. The geological convergence is real, but cannot be pinpointed to a specific year from current dating methods. That evidence belongs in the footprints chapter rather than the gaps chapter; it is noted here only so the reader knows it was considered and is not simply absent from this account.","Not one of these gaps has moved further from the text since 1830. Compare this to what the positive evidence has done: the NHM altars, the Khor Kharfot site, the Palestinian Hieratic, the 4.2 kiloyear event, the San Lorenzo iron-ore workshop, the La Mojarra Long Count dates, the El Mirador sacbe network, the barley confirmation, the mastodon dates, the Miller 2022 horses, the Artapanus source, the K'anwitznal burned bones, the Tikal dynasty erasure, the Tulane LiDAR population revision. Each of these was unknown or considered impossible in 1830 and has since moved toward the text. The positive evidence moves one direction. The gaps have not moved the other way.","That asymmetry is the argument. A fabricated text accumulates problems over time as knowledge advances. An authentic text accumulates confirmations. The Book of Mormon's critics in 1830 predicted that advancing scholarship would expose its anachronisms. What advancing scholarship has actually done, across nearly two centuries of independent research by independent researchers working on unrelated problems, is the opposite of what they predicted. 13","Alexander Campbell was the most formidable of those critics. In 1831 he published an 8,836-word catalog of the Book of Mormon's impossibilities. He predicted that the book's claims would not survive scrutiny. Nearly two centuries later, his archaeological objections have been answered one by one: the cement, the barley, the writing systems, the monetary architecture, the Arabic burial site, the horses, the population scale. The critics he represented have been wrong about each specific impossibility they identified, as subsequent scholarship has documented.","This chapter has named every significant instance where the answer is “not yet moved toward.” The other eleven chapters have documented the instances where the answer is “moved toward, clearly and repeatedly, by people who were not looking for it.” The reader can weigh those two lists and reach their own conclusion. That is all this book asks.","1 Gardner, B.A. 2007. Second Witness: Analytical and Contextual Commentary on the Book of Mormon. 6 vols. Greg Kofford Books. [named-site gap analysis]","2 Halperin, C.T. et al. 2024. “A pivot point in Maya history: fire-burning event at Kʼanwitznal (Ucanal).” Antiquity 98(399):758–776. | Stanton, T.W. & Brown, M.K. (eds.) 2021. A Forest of History. University Press of Colorado. [termination rituals] | Schele, L. & Freidel, D. 1990. A Forest of Kings. William Morrow.","3 Justeson, J.S. & Kaufman, T. 1993. “A Decipherment of Epi-Olmec Hieroglyphic Writing.” Science 259(5102):1703–1711. [~10 inscription sites; two readable texts; majority “mostly effaced”; La Mojarra Stela 1 found face-down in river, 1986]","4 Halperin, C.T. & LeMoine, J.-B. 2024. Antiquity 98(399):758–776. [Kʼanwitznal termination ritual] | Chinchilla Mazariegos, O.F. 2013. In Millenary Maya Societies, Mesoweb. [El Baúl Stela 1 relocation] | Pendergast, D.M. 1981. Journal of Field Archaeology 8/1. [Lamanai layering] | Diehl, R.A. 2004. The Olmecs. [Olmec defacement at San Lorenzo]","5 Congdon, L.O.K. 1971. “Steel in Antiquity: A Problem in Terminology.” In Studies Presented to George M.A. Hanfmann, ed. Mitten et al. Mainz: Von Zabern. [pp. 17–19, 24–26] | Van der Merwe, N.J. and Avery, D.H. 1982. “Pathways to Steel.” American Scientist 70:146, 152. | McGovern, P.E. 1988. “The Innovation of Steel in Transjordan.” Journal of Metals (July):50–52. | 1 Nephi 4:9; Jarom 1:8; Ether 7:9; Helaman 6:11.","6 Anawalt, P.R. 1981. Indian Clothing before Cortés. University of Oklahoma Press. | Clavigero, F.S. 1817. History of Mexico I, trans. Cullen. Philadelphia: Thomas Dobson. [p. 41: kapok “as soft and delicate as silk”] | Díaz del Castillo, B. 1956. The Discovery and Conquest of Mexico, trans. Maudslay. Farrar, Straus, and Cudahy. [p. 24: henequen “like linen”] | Sorenson, J.L. 2013. Mormon's Codex. Deseret Book/Maxwell Institute. [Ch. 16, pp. 346–347]","7 Roper, M. 2006. “Deer as ‘Goat' and Pre-Columbian Domesticate.” Insights 26/6. [Diego de Landa primary source; brocket deer / goat identification] | Ether 9:18–19; 1 Nephi 18:25; Enos 1:21.","8 Dundas, G.S. 2017. “Kingship, Democracy, and the Message of the Book of Mormon.” BYU Studies Quarterly 56/2:7–58. | Mosiah 29:13, 23, 26, 30–31.","9 Levine, L.I. 2005. The Ancient Synagogue: The First Thousand Years. 2nd ed. Yale University Press. | Thompson, A.K. 2013. “Nephite Insights into Israelite Worship Practices before the Babylonian Captivity.” Interpreter 3:155–195. | Alma 16:13; Psalm 74:8.","11 Church of Jesus Christ of Latter-day Saints. “Book of Mormon and DNA Studies.” Gospel Topics Essays. churchofjesuschrist.org. | Raghavan, M. et al. 2015. Science 349:aab3884. | Reich, D. 2018. Who We Are and How We Got Here. Pantheon. | Wendel, J.F. et al. 1995. “An Unusual Ribosomal DNA Sequence from Gossypium gossypioides.” Molecular Phylogenetics and Evolution 4/3:308. | Zevit, Z. 2001. The Religions of Ancient Israel. London: Continuum. [p. 271: nine of ten 7th–5th c. BC Jerusalem figurines white-slipped] | Sorenson, J.L. 2013. Mormon's Codex. [Ch. 12, pp. 233–253] | Miller, W.E. 2009. Science and the Book of Mormon. KCT & Associates. | Estrada-Belli, F. et al. 2025. Journal of Archaeological Science: Reports 66:105288.","12 Lowe, G.W. and Mason, J.A. 1965. In Handbook of Middle American Indians, vol. 2, pp. 195–236. [p. 226: “general abandonment”] | Lowe, G.W. 1959. Archaeological Exploration of the Upper Grijalva River, Chiapas, Mexico. NWAF Papers 2. [p. 45] | Agrinier, P. 1975. Mounds 9 and 10 at Mirador, Chiapas, Mexico. NWAF Papers 39. [intense fire; tomb looting; Kaminaljuyu successor pottery] | Sorenson, J.L. 2013. Mormon's Codex. Deseret Book/Maxwell Institute. | Ether 15:12–14, 29–30; Mormon 2–6.","13 Ekholm, G.F. 1946. American Antiquity 11/4:222–228. | Webster, D.L. 1976. Defensive Earthworks at Becan. MARI Publication 41. Tulane. | Dillon, B.D. 1988. Journal of New World Archaeology 7. | Palmer, D.A. 1981. In Search of Cumorah. Horizon Publishers.","XVI. Reformed Egyptian — The Writing System Gap","The Book of Mormon makes one of its most specific and testable claims in its final pages. Mormon explains: “And now, behold, we have written this record according to our knowledge, in the characters which are called among us the reformed Egyptian, being handed down and altered by us, according to our manner of speech. And if our plates had been sufficiently large we should have written in Hebrew; but the Hebrew hath been altered by us also.” (Mormon 9:32–33)","Two claims are embedded here. First, that the Nephites wrote in a modified Egyptian script applied to Hebrew language content. Second, that the script had been adapted over time until it differed from standard Egyptian. This is specific and testable — and no writing system discovered in Mesoamerica has demonstrated Egyptian ancestry. This is a genuine gap, and naming it plainly is the honest response.","There is one document that may preserve a sample of the characters: the so-called “Caractors” document, a piece of paper bearing seven lines of symbols, currently held in the archives of the Community of Christ. In 1956, three recognized Egyptologists — Sir Alan Gardiner, William C. Hayes, and John A. Wilson — were asked to review it. Gardiner found no resemblance to any known Egyptian writing. Hayes noted that some groups resembled hieratic numerals but could not make a definitive identification. Wilson gave the most detailed response, concluding that the characters were not hieroglyphic, demotic, hieratic, or any known cursive stage of ancient Egyptian — but added a caveat that bears on the entire question: because the script was purported to have been deliberately altered, the analysis might fall outside what professional Egyptological tools can address. John Gee, an LDS Egyptologist at Brigham Young University, has said plainly that “the corpus is not large enough to render decipherment feasible.” It is also not certain that the Caractors document is even a copy of what Martin Harris showed the scholars — Anthon described characters arranged in vertical columns with something resembling a Mexican zodiac, which does not match the surviving document. The original shown to Anthon is lost.","One possibility for why no matching script has been found: survival rates for specialized writing traditions in this region are extraordinarily low. Epi-Olmec — a confirmed writing system — left approximately ten readable inscription sites across several centuries of documented use. One possibility is that a priestly script used by a small literate class on metal plates, in a civilization systematically erased by termination ritual, left little to no inscription record regardless of its origins. Another possibility: religious records of a defeated people may not have been treated neutrally by their successors. Precious metal plates carried obvious alternative value.","The Book of Mormon itself, notably, predicts that no outside scholar would recognize the script. Mormon writes that the characters were so altered that “no other people knoweth our language” (Mormon 9:34). Wilson's caveat — that the deliberately altered character of the script may remove it from professional Egyptological analysis — is the precise point the text makes about itself. Whether this is a satisfying answer or a convenient one is a judgment the reader must make. It is named here because it is the honest state of the evidence: the gap is real, the surviving document is ambiguous, the original is lost, and the text's own framing predicts exactly this outcome.","A second item belongs in this chapter for a related reason — not because the evidence has moved against it, but because the text’s own account places it beyond the reach of this book’s method.","XVII. The Sword of Laban — A Gap This Book Cannot Reach","The sword of Laban persists as a named object across the Nephite narrative — Nephi takes it from a slain man in Jerusalem, makes it a symbol of God's deliverance, and it is carried forward as a sacred artifact through generations of Nephite recordkeeping. Its absence from Mesoamerican archaeology is a question the text's own account may address. Early accounts from Joseph Smith's associates — including Brigham Young citing Oliver Cowdery — place the sword in a cave repository at the hill where the plates were deposited in New York, carried north by Moroni on his final journey. This is early LDS tradition, not documentary evidence, and it cannot be independently verified.","A critic may fairly observe that the explanation — an artifact carried to an unknown cave in upstate New York by a solitary figure in the fifth century AD — is conveniently impossible to verify. That is a fair stance. This book does not use the sword's absence from Mesoamerican archaeology as evidence for anything, and does not expect a reader to do so either. The sword appears here only to acknowledge that its absence has been considered. Because the text's own account removes it from the geographic zone this book investigates, and because the tradition of its location is unverifiable by any current method, there is nothing further this investigation can say about it. This is why the sword belongs in this chapter rather than in the evidence catalog — it is a claim this book's method simply cannot reach.","M1–M12 Methodology notes: This chapter examines honest gaps and their weight. Section I (named-site gap) is a Nephite-sphere silence argument. Section II (termination rituals) is a Lamanite-sphere methodology argument confirming the predicted absence. Section III (erasure layers) is Lamanite-sphere methodology. Sections IV–VI (iron, wheat, textiles) are mixed Nephite textual / Lamanite-adjacent. Sections VII–IX (chariots, governance, synagogues) are Nephite-sphere textual. Sections XII, XII-A (population, skin color) are Lamanite-sphere corroboration. Section XIII (DNA) is an honest gap across both spheres. Section XIV (two collapses) is a mixed Nephite/Lamanite-sphere positive argument. All gaps are real. No gaps have moved away from the text since 1830. Section XVI (Reformed Egyptian): 2×2 Filter — gap argument with framing claim. Control Test PASSES: an Egyptian-derived script deliberately altered beyond recognition is not a convergent universal. JS Test PASSES: Wimmer 2004 (Palestinian Hieratic) is post-1830; the specific morphological claim is not constructable from KJV sources. However: Wilson's caveat (deliberate alteration removes the script from professional analysis) makes the gap unfalsifiable in one direction. Honest framing: the absence is real and named; the text's own prediction of unrecognizability is noted as a prediction, not a confirmation. Net classification: honest gap, named. Section XVII (Sword of Laban): gap argument only. Filter tests not applicable to artifact absence claims. Source disclosure: Brigham Young/Cowdery tradition is early LDS tradition, not peer-reviewed documentation. The section does not use the absence as evidence; it names the gap and explains why this book's method cannot reach it."],"ch13":["Where the Evidence Points and What It Means","“And behold, if they are kept they must retain their brightness; yea, and they will retain their brightness; yea, and also shall all the plates which do contain that which is holy writ.… And now, he said unto me: These interpreters were prepared that the word of God might be fulfilled, which he spake, saying: I will bring forth out of darkness unto light all their secret works and their abominations… Now behold, my son, I would that ye should understand that these things are not without a shadow; for as our fathers were slothful to give heed to this compass (now these things were temporal) they did not prosper; even so it is with things which are spiritual. For behold, it is as easy to give heed to the word of Christ, which will point to you a straight course to eternal bliss, as it was for our fathers to give heed to this compass, which would point unto them a straight course to the promised land. And now I say, is there not a type in this thing? For just as surely as this director did bring our fathers, by following its course, to the promised land, shall the words of Christ, if we follow their course, carry us beyond this vale of sorrow into a far better land of promise. O my son, do not let us be slothful because of the easiness of the way; for so was it with our fathers; for so was it prepared for them, that if they would look they might live; even so it is with us.”","The Book of Mormon ends with a single man, alone and hunted, carrying what remains of a civilization's record. The last entry is sealed around 421 AD. Then silence — fourteen centuries of it — before the record surfaces again in upstate New York. The text does not say how it got there. This chapter assembles what archaeology, geography, and chronology actually show about where someone in Moroni's specific situation would go, what route the continent's geography would provide, and where that route ends. It is offered as coherent possibility, not proof. But the coherence is real — and none of it was constructed to fit. It was found.","The Book of Mormon does not explain how the plates got from Mesoamerica to upstate New York. It ends before that journey. Moroni's final entry is sealed around 421 AD, and then there is silence for 1,400 years. No verse describes his route, the peoples he passed through, the years he wandered, or why he stopped where he stopped.","I. Two Hills, One Name — The Naming Logic and Its Evidence","Mormon 6:6 is precise and consequential. Before the final battle, Mormon deposits the bulk of the Nephite record — centuries of plates, the great archive of his civilization — in “the hill Cumorah,” where they remain. To his son Moroni he gives only “these few plates which I gave unto my son Moroni.” The text is unambiguous: the repository and the carried remnant are two different objects in two different places.","This matters because the hill Joseph Smith found in Manchester, New York is not the hill of the final battle. It cannot be. The final battle was in the Land Northward of the Mesoamerican model — the proposed Gulf Coast and central Mexican territory. The New York hill is the hill at the end of a journey the text never records. Moroni is the traveler. What he carried is not what Mormon buried; it is what one man could carry out of a civilization's ruin.","Yet both hills bear the same name. The hill of the final battle is named “Cumorah” (Mormon 6:2). The New York hill is called Cumorah in the first recorded accounts of Moroni's visits to Joseph Smith. The question is why — and the answer reveals more about the nature of the name than the standard treatment has captured.","The Jaredites called the hill of their final battle Ramah. The Nephites called the hill of their final battle Cumorah. These are different names given by different civilizations to the same geographic feature in the Land Northward. The identification is stated explicitly in the text, in the first person, by an eyewitness.","Ether 15:11: “And it came to pass that the army of Coriantumr did pitch their tents by the hill Ramah; and it was that same hill where my father Mormon did hide up the records unto the Lord, which were sacred.”","The voice here is Moroni's — not Mormon's. The Book of Ether is not abridged by Mormon; it is abridged by Moroni. Every editorial insertion in the Book of Ether — every “I, Moroni” and every parenthetical identification — is Moroni's voice. When Ether 15:11 says “my father Mormon,” that is Moroni speaking of his own father. Moroni was personally present at the battle of Cumorah. He watched his father deposit the Nephite records in that hill (Mormon 6:6). He survived the battle that killed every other Nephite. Then, in the years of his solitary wandering, he edited the Jaredite record — and when he reached Ether 15:11 and read that the final Jaredite battle was fought at a hill called Ramah, he stopped and inserted a personal note identifying it as the hill where he had watched his father bury the records. This is first-person eyewitness identification.","The most significant observation is not that two names identify the same Mesoamerican hill — but that when Moroni buried the plates in the New York hill, he gave that hill neither name. He did not call it Ramah, the Jaredite name he had just copied in the text he was editing. He called it Cumorah: his father's name for the same Mesoamerican hill. That choice is itself a document.","Moroni knew both names for the Mesoamerican hill. He had just edited the verse that named it Ramah. He knew it as Cumorah from his own childhood, from watching his father bury the records there. When he arrived at the New York hill and performed the same act — burying a civilization's records for a future day — he did not reach for the Jaredite name. He reached for his father's name. Because he was doing what his father had done at Cumorah.","English colonists named a harbor “New York” not because it resembled the English city of York, but because it claimed the same institutional function. New England, New Hampshire, New Jersey: none of these landscapes resembles the originals. The names transfer the institutional identity, not the geography. Cumorah works the same way — but the function is more specific. The Mesoamerican Cumorah is defined by a single act: Mormon buried the records of his civilization in it so they would survive the civilization's end. The New York hill became Cumorah the moment Moroni buried the plates he carried there — because it was now doing the same thing. Cumorah is not the name of a hill. It is a designation for what the hill is for: the place where a civilization's sacred records are deposited at the moment of its final destruction, to be preserved for a future day. Both hills are Cumorah because both received that deposit. The name follows the function, not the geography. 1","The Hebrew etymology of the name reinforces the functional reading. Paul Hoskisson, writing in the Interpreter (Vol. 60, 2024), makes the case that Cumorah most plausibly derives from the Hebrew qum (“arise, rise up”) combined with orah (“light, flame”), yielding the proposed meaning “Rise up, O Light of the Lord” — echoing Isaiah 60:1, a text Moroni knew from Lehi's brass plates (cited in 2 Nephi 8:1). On this reading, Cumorah is a theological statement about what the hill contains: the light is buried there, and will arise when the appointed moment comes.","A note for readers who have encountered the Qumran connection in LDS apologetic literature: some scholars have proposed that “Qumran” and “Cumorah” share a common Semitic root, based on their similar consonantal pattern (Q/K-M-R) and the Hebrew root K-M-R from which the word kômer (priest) derives (Ricks and Tvedtnes, Journal of Book of Mormon Studies 6/2, 1997). The underlying phonological principle — that Arabic place names can preserve ancient Semitic phonology across centuries of linguistic change — is well-established. The specific problem with the Qumran identification is that the ancient name of the site is unknown. “Qumran” as the name is used today derives from the Arabic toponym first documented by the Palestine Exploration Fund's 1881 survey, recorded from local Bedouin informants. It does not appear in the Dead Sea Scrolls or in any ancient inscription (Taylor, Palestine Exploration Quarterly 134/2, 2002). Treating the phonological similarity between “Qumran” and “Cumorah” as an established etymological connection goes beyond what the evidence supports. This book's argument for the name rests on Moroni's editorial note in Ether 15:11 and on Hoskisson's Hebrew derivation qum + orah, argued on its own linguistic and scriptural merits, independent of any modern toponym whose ancient antecedent cannot be determined. 2","The two-Cumorah model is what the text itself requires. There are two hills because there are two civilizations that performed the same act at the moment of their destruction. The New York hill is Cumorah because Moroni made it Cumorah — not by geography, not by resemblance, but by function. He buried the plates there. He completed the act his father had begun. He used his father's name for the act because the act was the same. That is what the name means. And that is why there are two Cumorahs.","II. The Land Moroni Was Fleeing","Moroni's description of his situation in Moroni 1:2–3 is among the most specific accounts of social collapse in any ancient text: “the Lamanites are at war one with another; and the whole face of this land is one continual round of murder and bloodshed; and no one knoweth the end of the war.” He adds that the Lamanites “put to death every Nephite that will not deny the Christ.” This is not general chaos. It is targeted genocide combined with civilizational self-destruction.","The archaeology of the proposed Zarahemla region confirms this with geographical and chronological precision. John L. Sorenson, in Mormon's Codex (Deseret Book/Neal A. Maxwell Institute, 2013), documents the condition of the Central Depression of Chiapas — the proposed Zarahemla territory along the Grijalva River. Sorenson reports the findings of archaeologists Lowe and Mason, who conducted systematic survey of the valley and found “a general abandonment of most occupied archaeological sites at the close of period VIII” — dated to approximately 350 AD. Lowe concluded that the abandonment “appears to be real rather than illusionary, as the valley has been thoroughly scouted.” La Libertad, on the upper Grijalva, was abandoned at this time. Chinkultic was abandoned. Multiple sites throughout the Central Depression show the same pattern simultaneously.","This is what “one continual round of murder and bloodshed” looks like in the archaeological record of the proposed Zarahemla at exactly the period the Book of Mormon describes. The chaos Moroni describes is not a narrative device. It is a documented historical event. 3","Moroni's situation after the battle at Cumorah is precise. He is alone — Mormon 8:3 confirms that his father was killed in the battle and that Moroni is “alone to write the sad tale of the destruction of my people.” He is a Nephite in a land where Nephites are being hunted on sight. He cannot settle. He cannot reveal himself. He writes for decades: Mormon 8:6 places him still writing approximately 36 years after the battle, around 421 AD.","The feasibility of Moroni's journey is not without historical precedent — and the best precedent comes from the same geographic corridor. In 1568, David Ingram, an English sailor marooned by John Hawkins after a sea battle near Tampico, Mexico, walked north from the Gulf Coast through completely unfamiliar territory and arrived at the Maine/Canada border eleven months later. He was picked up by a French vessel on the St. John River. John L. Sorenson, in Mormon's Map (FARMS, BYU, 2000), identifies the Ingram journey as the closest documented analogy to what Moroni would have done. The route Ingram walked — from the Gulf of Mexico north through the interior to the northeastern woodlands — is approximately the same distance as the route from the proposed Mesoamerican Cumorah to the New York hill.","The Ingram precedent establishes that the geographic corridor is traversable by a single man on foot. What it does not establish is pace or duration — Moroni's wandering spans decades, not eleven months. The decades are accounted for in the text itself. Mormon 8:6 places Moroni still writing approximately 36 years after the battle. During those years he was hiding, writing, surviving, and watching the violence described in Moroni 1:3 continue around him. The corridor did not consume the years. Survival did.","A man in this situation faces a geographic logic that does not require divine direction to understand — though faith holds that divine direction and geographic logic were operating simultaneously. He cannot go south: the Nephite heartland is the epicenter of the collapse. He cannot remain in the area of the final battle. He must move, and the only direction that offers both distance from the violence and access to a functioning civilization is north.","Moroni's decision to move north is usually framed as a spiritual mission or a matter of physical survival. It is also an archival decision — and understanding it as one reveals a dimension the text does not need to state explicitly, because the logic was self-evident to anyone who had observed what happened to records in this territory.","Moroni is not fleeing blind. He is a man who has watched his civilization be destroyed and watched what happens to records in that destruction. Mormon buried the Nephite archive — centuries of plates, the great record of his civilization — in the hill Cumorah because he knew it could not survive above ground in a territory controlled by people who would destroy it. He gave Moroni only the plates he could carry. That was not spiritual sentiment. It was archival triage: what could be saved, and how?","Justeson and Kaufman's 1993 decipherment in ‘Science' documents in non-LDS, post-1829 evidence what Moroni would have observed directly. A sophisticated writing tradition flourished in the proposed Book of Mormon territory for approximately 600 years — from 150 BC to 450 AD, essentially the entire Nephite period. It produced inscriptions at multiple sites across the Land Northward and into Chiapas. Of roughly ten known inscriptions, two are readable. Most are described in the paper as “mostly effaced.” The most important surviving monument — La Mojarra Stela 1, the inscription that made the tradition decipherable at all — was found face-down in a river in 1986, displaced from its original site by forces that obliterated its provenance. These are the records that stayed in Mesoamerica. This is what staying looked like.","Moroni did not stay. He carried the plates north through the Hopewell corridor and buried them in a sealed stone box in a hill in upstate New York, where they were found intact 1,400 years later. The distance between a sealed box in Manchester, New York and a face-down stela in a Veracruz river is not miraculous accident. It is the difference between leaving records in a region where the epi-Olmec survival rate was approximately two readable texts per 600 years, and carrying them out of it. Moroni understood, from observation, what survival in that territory required. He was an archivist making a rational decision. The record of his civilization survived because he made it. Chapter Eight develops the La Mojarra Stela 1 argument in full, including the Long Count dates, the solar eclipse confirmation, and the epi-Olmec script context. 4","IV. Teotihuácan: The Multicultural Refuge","At the time of Moroni's wandering — approximately 385 to 421 AD and the decades following — the city of Teotihuácan in the Valley of Mexico was at or near its absolute peak. Scholarly population estimates range from 100,000 to 200,000 people, making it one of the largest cities on earth at that moment. Its streets were laid out in a precise grid aligned to astronomical north. The Pyramid of the Sun — documented by archaeological dating to approximately 100 AD — rose at the center of an Avenue of the Dead that ran two miles through the city. Teotihuácan was, at the time of Moroni's wandering, the largest city in the western hemisphere.","The city's internal structure is what makes it specifically relevant to this argument. Archaeological excavation has confirmed that Teotihuácan was not merely multicultural in its population but multicultural in its architecture. Michael Spence (1992, in Art, Ideology, and the City of Teotihuácan, Dumbarton Oaks) documente
