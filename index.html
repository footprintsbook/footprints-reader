Function and Meaning in Classic Maya Architecture. Dumbarton Oaks / Harvard University, pp. 271–302. | McAnany, P.A. 1995. Living with the Ancestors: Kinship and Kingship in Ancient Maya Society. University of Texas Press. Rev. ed. Cambridge University Press, 2014. | Baudez, C.-F. 2002. Review of McAnany. L'Homme 161:302–304. [contested mechanism] | Wright, C.J.H. 1990. God's People in God's Land. Eerdmans. [non-LDS; nachalah as legally inalienable ancestral inheritance]","5 Mosiah 10:12–16 [Lamanite grievance catalog] | Alma 20:13 [Lamoni's father: “they robbed our fathers”] | Alma 54:17 [Ammoron: “did rob them”] | Genesis 23:17–20; Joshua 24:32; Leviticus 25:23; Numbers 36:7; 1 Kings 21:3.","6 Bachand, B. 2012. “Chiapa de Corzo: Rise of a Zoque Capital in the Heart of Mesoamerica.” Popular Archaeology (March). | Omni 1:13–19, 1:20–21. | Ether 15:11 [Coriantumr survives]. | Mosiah 25:2 [Zarahemla more numerous than Nephites].","7 Welch, J.W. and Welch, S.M. 2009. Charting the Book of Mormon. Provo: BYU Studies. [genealogical compression analysis; positions 10, 12, 20, 27] | Matthew 1:8 [Joram begat Ozias — telescoped genealogy] | 2 Kings 8:25; 2 Chronicles 22:1–2. | Ether 1:6–32; Ether 6–11.","8 Grover, J.D. 2017. Sumerian Roots of Jaredite-Derived Names and Terminology in the Book of Mormon. Challex Scientific. [LDS independent researcher; deseret, Zerin, cureloms, -hi suffix, Kish] | Jacobsen, T. 1939. The Sumerian King List. University of Chicago Press. | Ether 2:3; 9:18–19; 12:30; 1:18–19.","9 Grover, J.D. 2018. The Swords of Shule: Jaredite Land Northward Chronology, Geography, and Culture in Mesoamerica. Challex Scientific. [LDS independent researcher; sacred bundle interpretation] | Mosiah 8:8–9; Ether 7:8–9. | Miller, M. & Taube, K. 1993. The Gods and Symbols of Ancient Mexico and the Maya. Thames & Hudson.","M1–M10 Methodology notes: This chapter presents two argument types. Environmental coherence arguments (I–III): Lamanite-sphere, not footprints. Ball game theology (I) and broken-heart doctrine (II) are coherence arguments whose control tests partially pass — the specific combination of elements is not universal but vicarious sacrifice appears in other traditions. The nachalah/Maya ancestor estate convergence (III) is a dual-sphere coherence argument with a clean JS test. Internal evidence arguments (V–VIII): Nephite-sphere textual arguments whose control tests pass and JS tests are clean throughout. The genealogical compression (VI) and Jaredite linguistic content (VII) operate entirely within the BOM text."],"ch10":["The Order of Nehor and the Religion Already There","“And it came to pass that he began to teach among the people that every priest and teacher ought to become popular; and they ought not to labor with their hands, but that they ought to be supported by the people. And he also testified unto the people that all mankind should be saved at the last day, and that they need not fear nor tremble, but that they might lift up their heads and rejoice; for the Lord had created all men, and had also redeemed all men; and, in the end, all men should have eternal life.”","The Book of Mormon contains two kinds of religion. One is the prophetic, Judaic religion of Lehi, Nephi, and the Nephite apostolic succession — centered on the coming of Christ, the law of Moses as preparatory covenant, and the anticipated atonement. This religion is well-studied.","The other kind has been almost entirely overlooked.","It has also been misread. Most readers assume the Order of Nehor was a corruption or heresy that branched from Nephite faith. The text itself does not support this reading, and understanding why changes everything about what the competing religion represents.","Alongside the Nephite prophetic tradition, the Book of Mormon describes a competing religious system that is explicitly not an apostate version of the Nephite faith. Its followers have a creator god but deny Christ. They preach universal salvation. They employ paid priests. They burn their opponents' scriptures without ritual scruple. They are not confused or deviant Nephites. They are followers of a different religion entirely.","This chapter asks what that religion was — and what it tells us about the world the Nephites entered. The argument proceeds in a specific order: first, establishing the indigenous religion the Nephites encountered; second, testing whether the Order of Nehor's five specific doctrines match it; third, examining additional structural and ritual parallels; and fourth — only after the case is independently established — noting what the name itself may encode. The case stands without the name. The name, if correct, is a remarkable convergence.","I. The Order of Nehor Is Not an Apostate Nephite Religion","The standard popular reading of the Order of Nehor treats it as a corruption or heresy branching from the Nephite faith. The text does not support this reading. A careful examination of the Book of Mormon's own evidence reveals a religion that operates entirely independently of the Nephite tradition, predating the individual named Nehor, and spread across both Nephite and Lamanite territory simultaneously.","The individual named Nehor is introduced in Alma 1 in the first year of the reign of the judges. He is not presented as the founder of his doctrine — he is presented as the first to introduce it among the Nephites of Zarahemla (Alma 1:12). When Amlici, just four years later, organizes a significant political following “after the order of Nehor” (Alma 2:1), he draws on a religion already established with enough depth to sustain a kingdom-wide election campaign. When the sons of Mosiah arrive in Lamanite territory and encounter Aaron at the city of Jerusalem (Alma 21), they find the Order of Nehor already firmly established — with synagogues, organized priests, and a population that has long dismissed the Nephite tradition as “foolish traditions.”","Ammonihah, roughly 90 miles northwest of Zarahemla, and Jerusalem, roughly 120 miles to the south in Lamanite territory — simultaneously practicing the same religion, with organized structures, before any Nephite missionary had reached either. This is not apostasy spreading outward from a Nephite core. This is a pre-existing religion that the Nephites encountered when they arrived.","The doctrinal content reinforces this conclusion. When Alma and Amulek preach in Ammonihah, they address the most basic theological claims as though explaining them for the first time to people who have no background in the Nephite tradition (Alma 9–13). When Aaron preaches in Lamanite Jerusalem, he is told flatly: “We do not believe that thou knowest of things to come, neither do we believe that thy fathers and also that our fathers did know concerning the things which they spake” (Alma 21:8). These are not people who once knew the tradition and rejected it. These are people who never held it.","The Order of Nehor is an indigenous religion. The question is: which one?","II. The Principal Bird Deity — Itzamna of the Maya","To answer that question, the dominant indigenous religion of the proposed Book of Mormon territory actually was. When Lehi's family arrived in the Americas around 590 BC, a specific theological tradition had already been developing in the Gulf Coast and Maya lowlands for centuries. Its central figure is the deity modern scholarship calls the Principal Bird Deity.","The Principal Bird Deity (PBD) is one of the most important figures in the Mesoamerican pre-Columbian pantheon. In the pre-Classic period, the PBD is depicted perching on the world tree, commanding the cardinal directions, overseeing creation. The figure appears in one of the earliest known pieces of Maya monumental art — the San Bartolo West Wall Murals, dated to approximately 100 BC — where it sits atop four world trees representing the four cardinal directions. In the Classic and Post-Classic periods, the PBD is identified as a transformative aspect of Itzamna: the supreme creator god, the celestial lord, the divine patron of rulership and priestcraft.","Itzamna was the creator who made humankind, the lord of the heavens, the father of the Bacab. Colonial-period sources variously identify him with Hunab Ku (the invisible high god), Kinich Ahau (the sun deity), and Yaxcocahmut (a great bird of omen). He is depicted in the codices as an aged high priest seated on his celestial throne, governing agriculture and the hunt. As the PBD, he manifests as a raptor — specifically a great bird of prey — sweeping across the sky with serpents in his talons or beak.","This is the religion the Nephites encountered when they arrived: a creator-deity tradition, centered on a supreme bird-god, presided over by an organized paid priesthood, with its own cosmological framework and no messianic figure. The next section asks whether the five specific doctrines the Book of Mormon attributes to the Order of Nehor match this tradition — and the answer is point for point. 1","III. Five Doctrines, Five Matches","The Book of Mormon identifies five specific theological positions of the Order of Nehor. All five map to documented Maya religious beliefs. This is the core of the chapter's argument. It does not require any etymology, any name analysis, or any cross-cultural linguistic comparison. It requires only reading what the Book of Mormon says the Order of Nehor believed, and reading what the pre-Columbian Maya believed, and noticing that the two lists correspond point for point.","Each item on the Nehor side is drawn from explicit Book of Mormon text. Each item on the Maya side is drawn from pre-Columbian and colonial-period scholarship on Maya theology.","Creator god without a messianic figure. The Nehor religion is not atheist. Its followers acknowledge a creator: “the Lord had created all men” (Alma 1:3). What they specifically deny is the coming of Christ as a person who enters human history in bodily form. Itzamna, in Maya theology, is exactly this: a creator deity whose narrative contains no messianic figure, no prophecy of a god entering human history to atone for sin. The match is precise. It is not “they had a god” — every ancient culture had gods. It is “they had a creator who did not have, and whose theology had no place for, a messianic figure.”","Universal salvation. Alma 1:3–4 records the Nehor doctrine: “all mankind should be saved at the last day” — universal, unconditional. In Maya theology documented in colonial sources, the ch'ulel — the impalpable soul-essence of every person — ascends to the celestial paradise of the Flower World after death. The Maya afterlife system is not a judgment-based system distributing rewards and punishments based on individual conduct. It is a universal destination. Every soul ascends. The Nehor doctrine of universal salvation maps to the Maya afterlife framework with structural precision.","Paid priesthood. Alma 1:3: “every priest and teacher ought to become popular… they ought to be supported by the people.” This is not a generic observation about religious leaders. It is a specific institutional claim about the economic relationship between clergy and congregation. The PBD/Itzamna complex was presided over by an organized, hierarchical paid priesthood whose economic support by the population is documented in colonial-period Maya records. The itzam — the class of priest-shamans associated with Itzamna — were economically supported specialists. This is specific enough that the match is not a coincidence of generic religious organization.","The earth will not pass away. When Alma and Amulek preach in Ammonihah that “the earth shall pass away” (Alma 9:2–3), the population responds with bewilderment and hostility. Their reaction is not theological disagreement. It is genuine incomprehension of a category their cosmological framework has no place for. The Maya Long Count was premised on an eternal, repeating universe. The world was periodically renewed at the end of each b'ak'tun cycle — it was not destroyed. The concept of cosmic finality, of the earth “passing away,” is not merely incorrect within the Maya cosmological framework. It is categorically unthinkable. The Ammonihahites' incomprehension is what you would expect from people whose entire cosmology was built on an infinite repeating cycle.","Death by burning as judicial execution. This fifth item requires more care. It is not a doctrinal position but a practice, and it is examined specifically in the following section. Its inclusion here is as evidence that the Order of Nehor was not merely a different theology but a different institutional and ritual complex — one with its own forms of sacred violence that belonged to the PBD cult.","Five specific theological positions. Five matches to documented features of the PBD/Itzamna complex. Each is independently verifiable against the primary texts on both sides. None of them requires the other to be true. A fabricator working in 1829 would have needed to: (1) decide to include a competing indigenous religion in his text; (2) give it five specific theological positions; (3) have all five positions happen to correspond to the dominant pre-Classic Maya religion; (4) include a detail about the earth's eternity that specifically inverts the Maya cyclical cosmology; and (5) embed the whole structure in a religion he was ostensibly contrasting with his own. The scholarship that would allow anyone to identify this correspondence was not available in 1829. Karl Taube's systematic analysis of the PBD and Itzamna was published in 1992. The San Bartolo murals were discovered in 2001. The Maya Long Count was not correlated with the Western calendar until the early 20th century. 2","2×2 Filter Note: Lamanite-sphere religious argument. The Order of Nehor is explicitly located in Lamanite territory (and introduced at Ammonihah, a Nephite city that adopted it). Control test: PASSES — the five specific doctrines are not convergent universals; each is specific enough to narrow the theological space significantly. JS test: PASSES — systematic analysis of PBD/Itzamna theology and its five relevant features postdates 1829 by over a century. This section does not depend on any etymology.","IV. The Four Directions — A Structural Parallel","Beyond the five doctrinal matches, the PBD/Itzamna complex shares a specific cosmological structure with the tradition from which Lehi's family came. Horus, the Egyptian falcon-deity, had four sons. Each represented one of the four cardinal directions and one of the four corners of creation. In the Pyramid Texts (approximately 2400–2300 BC), the four sons of Horus are called “the four spirits” and “the souls of Horus,” described as binding earth and heaven together at the four cardinal points.","The Maya had the Bacab — a set of four deities, one for each cardinal direction, who held up the sky at the four corners of the world. Their father, in colonial-period sources, is identified as Itzamna/the PBD. The Bacab were invoked in new year ceremonies and in the cardinal-direction rituals that structured Maya sacred time and space.","Four sons. Four cardinal directions. A supreme falcon-bird deity as father. In Egypt and in Maya Mesoamerica. This parallel does not prove the Maya borrowed from Egypt, or vice versa, and the argument does not require it. What it establishes is that a people who came from a cultural world where this structure existed would have encountered in the Maya world a religion that felt, at its cosmological foundation, structurally familiar. The five-doctrine match established that the Nehor religion had the same theological content as the PBD/Itzamna complex. This structural parallel reinforces that correspondence at the cosmological level. 3","V. The Death of Abinadi — A Ritual Form","Abinadi's death at the hands of King Noah's priests is described in Mosiah 17:13: “And it came to pass that when the flames began to scorch Abinadi, he cried unto them, saying: Behold, even as ye have done unto me, so shall it come to pass that thy seed shall cause that many shall suffer the pains that I do suffer, even the pains of death by fire.”","Burning alive is a specific, ritualized form of execution that carries very different cultural connotations in different traditions. In the Hebrew biblical world, death by fire was associated with apostasy and specific categories of ritual impurity — but it was not the standard mode of judicial execution. The Book of Mormon does not explain why burning is the chosen method. It simply records it.","The Maya Scaffold Vase — a Classic Maya polychrome vessel documented in Justin Kerr's Maya Vase Database — depicts a specific ritual sacrifice scene identified by Mayanists as the deer-man sacrifice: a captive or ritual victim, bound and positioned on a scaffold, subjected to fire while priests oversee the ceremony. The deer-man sacrifice was associated with the transition periods of the Maya year — specifically the Wayeb, the five-day unlucky period at the year's end, when liminal figures were offered at the boundary between temporal cycles. The sacrifice was not generic cruelty. It was a specific ritual with cosmological significance connected to the PBD and the Itzamna worship complex.","King Noah's priests used the death-by-burning they knew. Abinadi died in a manner that, within the Maya context of the land of Nephi, was ritually specific — not a punishment improvised from anger, but a form of death that the priests of an Itzamna-centered religion would have understood as cosmologically meaningful. 4","Stuart, D. 2014. “Notes on a Sacrifice Scene.” Maya Decipherment Blog, October 31, 2014. mayadecipherment.com/2014/10/31/notes-on-a-sacrifice-scene/.","VI. The Name — A Possible Additional Convergence","The preceding four sections have established the correspondence on independent grounds, without reference to the name the Nephites gave this religion. Five specific doctrines match. The cosmological structure parallels. The ritual form of Abinadi's death is consistent with the PBD cult's documented practices. None of this required the name. The name is a separate line of evidence, noted here as a possible additional convergence. If it is correct, it is remarkable. If the preferred etymology holds instead, the argument above stands entirely on its own.","The Book of Mormon Onomasticon — the official scholarly catalog of Book of Mormon names — presents several proposed derivations for “Nehor.” The most commonly preferred is a connection to the Hebrew biblical name Nahor (nāḥōr), the grandfather of Abraham, though Nahor itself lacks a secure etymology in Hebrew. The Onomasticon also lists an Egyptian derivation — n-ḥr, meaning “belonging to Horus” — though it explicitly rates this as the least likely of the proposed options. Jerry D. Grover, an LDS independent researcher who has published extensively on Book of Mormon Mesoamerican connections, adopted this Egyptian derivation and developed the observation that n-ḥr potentially encodes the same identification this chapter has established through five independent doctrines.","If the n-ḥr derivation is correct, the convergence is striking. Horus is the Egyptian falcon god: a supreme creator bird-deity associated with the sky and with kingship, presided over by an organized paid priesthood, whose structural counterpart in Mesoamerica is the Principal Bird Deity. The name the Nephites gave the Order — if it encodes “belonging to Horus” — would mean they recognized the same correspondence this chapter has independently documented. A Nephite people familiar with Egyptian scribal practice, arriving in a land where the dominant religion structurally resembled the Horus cult, might have assigned an Egyptian name that captured the identification they were making.","The Joseph Smith test for this etymology is clean regardless of which derivation is preferred. Egyptian was not systematically decipherable before Champollion's 1822 work, and the systematic application of Egyptian etymology to Book of Mormon onomastics required Egyptological scholarship across the 19th and 20th centuries. The n-ḥr construction — a nisbe adjective formed with the preposition n (“belonging to”) and the noun ḥr (“Horus”) — is standard Egyptian morphology that would not have been available in 1829. If n-ḥr is the correct etymology, it encodes a connection Joseph Smith could not have made.","If the Hebrew Nahor connection is preferred, none of the preceding sections is affected. The five-doctrine match, the structural parallel, and the Abinadi ritual form are each independent of what “Nehor” derives from. They stand on their own. 5","VII. The Amalekites and the Spread of the Religion","The Amalekites are introduced in Alma 21:2–3 alongside the Amulonites in Lamanite territory, and are identified as “after the order of the Nehors.” They are important enough to have built synagogues at Jerusalem (Alma 21:4) and are listed among the groups who fought Lamanite wars against the Nephites.","The Amalekites are generally assumed to be Nephite dissenters — though the text is not explicit on this. What is explicit is that they practiced the Nehor religion. And their name in Hebrew suggests a connection to one of the oldest enemy traditions in Israelite history: the Amalekites of the Old Testament are Israel's quintessential adversary, the first people to attack Israel after the Exodus (Exodus 17:8–16). The name signals enmity as much as ethnicity.","If the Amalekites in the Book of Mormon are a people who retained the name of Israel's ancient adversary while adopting — or maintaining — the indigenous Maya religion, they represent exactly the kind of hybridization the Lamanite-sphere framework predicts: groups that retained partial Near Eastern cultural identity while absorbing the religious frameworks of the surrounding civilization.","VIII. What the Test Battery Shows","The control test passes. The five-doctrine correspondence is not a convergent universal. The specific combination — creator-without-Christ, universal salvation, paid priesthood, eternal-earth cosmology, fire-ritual execution — is not a set of generic religious features that any culture would independently develop. Each item narrows the theological space; all five together, mapped to a specific pre-Classic Maya complex, is not coincidence.","The Joseph Smith test passes. The PBD's identification as a transformative aspect of Itzamna is a product of 20th-century decipherment. Karl Taube's systematic analysis was published in 1992. The San Bartolo murals confirming the PBD's pre-Classic presence were discovered in 2001. The five-doctrine match requires detailed knowledge of Maya theology from colonial sources and epigraphic analysis that postdates Joseph Smith by over a century. The Long Count's cyclical cosmology, which explains the Ammonihahites' bewilderment at “the earth shall pass away,” was not correlated with the Western calendar until the early 20th century.","The chronology test passes. The PBD is documented at San Bartolo in approximately 100 BC — before the Nehor individual's introduction in Alma 1. The Book of Mormon itself presents the Order as pre-existing among Lamanite populations. The Maya tradition the text describes was already there before any Nephite missionary encountered it.","The name argument (Section VI) carries its own test results. The n-ḥr Egyptian etymology was not systematically accessible before Champollion, and the application of Egyptian morphological analysis to this name postdates 1829. But the argument of this chapter does not depend on the name passing any test. The five doctrines, the structural parallel, and the ritual form each pass the control and JS tests independently. The name is additional and conditional. 6","The Book of Mormon does not pretend the Nephites arrived in an empty land.","It is explicit that they found people already there — Zarahemla's people, who were more numerous than the Nephites (Mosiah 25:2). It implies, through the DNA logic examined in Chapter Twelve, that the founding migrations were absorbed into a larger existing population. And it describes, in the chapters on the Order of Nehor, a religious system that has roots older than Lehi — an indigenous faith with its own creator theology, its own afterlife doctrine, its own priestcraft, and its own calendar of sacrifice.","Examining that religion against the backdrop of what was actually practiced in Mesoamerica during the Book of Mormon period, the match is precise. Not approximate. Not generic. The five doctrines the Nephites specifically rejected align with five documented features of the PBD/Itzamna complex. The structural cosmology of four directional sons mirrors the Horus-sons/Bacab structure. The death by burning that Abinadi suffered matches a documented Maya ritual form. And if the n-ḥr name derivation is correct, even the name the Nephites gave this religion encodes the identification this chapter has established on independent grounds.","The next chapter broadens the frame. The Book of Mormon's ancient witnesses — Artapanus, Josephus, the Dead Sea Scrolls, the Book of Moses — confirm that the theological claims running through Chapters Eight and Nine are not confined to the text itself. They are embedded in independent ancient traditions that Joseph Smith could not have known.","X. The Feathered Serpent and the Israelite Serpent Tradition","The Itzamna-centered theology documented in this chapter is one religious tradition the Nephites encountered on arrival. A second is relevant to this chapter's argument: the Feathered Serpent complex, which eventually became the Quetzalcoatl cult of the Classic and Post-Classic eras. Its roots are considerably older.","La Venta Monument 19, an Olmec basalt carving dated to approximately 900–400 BC, is the earliest known depiction of a feathered serpent in Mesoamerica. It shows a human figure — identified by scholars as a ruler or shaman — interacting with a large serpent whose body is adorned with avian attributes. Mesoamericanist Karl Taube has traced this image to what he calls “the earliest stratum of Mesoamerican religious symbolism,” arguing that the concept was already fully formed by the Middle Formative period and that virtually all later Mesoamerican feathered serpent imagery derives from this Olmec prototype. The tradition was therefore ancient and geographically widespread by the time Lehi's family arrived around 590 BC — embedded in the religious landscape the Nephites entered.","The Book of Mormon carries a parallel tradition from the Old World. Moses raised a bronze serpent on a pole in the wilderness as a sign of healing and deliverance (Numbers 21:8–9). The Nephites preserved and developed this symbolism with unusual insistence. Nephi wrote of it as a type of Christ (2 Nephi 25:20). His son Nephi, writing around 30 BC, made the typology explicit: “as Moses lifted up the brazen serpent in the wilderness, even so shall he be lifted up who should come” (Helaman 8:14–15). The elevated serpent — healing, divine, the sign of something coming from above — runs through the Nephite tradition from arrival to the close of the record.","Two serpent traditions — one indigenous and one Israelite — thus occupied the same territory at the same time. The Mesoamerican feathered serpent represented celestial power, fertility, and the axis between earth and sky. The Israelite brazen serpent represented healing, divine provision, and a type of the coming Messiah. They are not the same tradition. But they share a structural resonance — the serpent as the sign of something divine made accessible to human beings — that would have made the Nephite theology legible within the symbolic vocabulary already present in the land. This is not the argument that one derived from the other. It is the argument that a people carrying the Mosaic serpent symbolism arrived in a place where serpent-as-divine-power was already the oldest religious symbol in the culture. The Book of Mormon's unusual insistence on the brazen serpent as typology fits that context with a precision that a fabricator in 1829, with no knowledge of Olmec iconography, could not have anticipated. 7","A 19th-century fabricator writing an ancient-sounding text would not have invented a competing religion and given it five specific theological positions that happen to match the dominant pre-Classic Maya religion. He would not have made its central cosmological commitment the eternal repetition of time — the specific belief that explains why his characters responded with bewilderment to the claim that the earth would pass away. He would not have killed his prophet in a manner consistent with documented Maya ritual sacrifice. And if he happened to name its founder with an Egyptian etymology pointing to a falcon deity whose structural parallel in Mesoamerica was unknown until the 20th century, he did all of it in 1829, from sources that did not exist.","These five doctrines were the religion already there. The Nephites entered a world that had been theologically furnished before they arrived. The Book of Mormon knew what that world believed. That knowledge had no 1829 source.","1 Miller, M. & Taube, K. 1993. The Gods and Symbols of Ancient Mexico and the Maya. Thames & Hudson. | Taube, K.A. 1992. The Major Gods of Ancient Yucatán. Dumbarton Oaks Pre-Columbian Studies 32. | Taube, K.A. et al. 2010. “The Murals of San Bartolo, El Petén, Guatemala. Part 2: The West Wall.” Ancient America 10.","2 Alma 1:3–4 [Nehor's five positions] | Alma 9:2–3 [earth shall pass away] | Alma 21:6–8 [indigenous religion in Lamanite Jerusalem] | Taube, K.A. 2004. “Flower Mountain.” RES: Anthropology and Aesthetics 45:69–98. [Flower World / chʿulel afterlife] | Guiteras-Holmes, C. 1961. Perils of the Soul. Free Press. [Maya universal afterlife] | Tozzer, A.M. 1941. Landa's Relación de las Cosas de Yucatán. Peabody Museum Papers 18. Harvard. [Itzamna paid priesthood]","3 Mercer, S.A.B. 1942. The Pyramid Texts. Longmans, Green. [Four sons of Horus, cardinal directions] | Wilkinson, R.H. 2003. The Complete Gods and Goddesses of Ancient Egypt. Thames & Hudson. | Taube, K.A. 1992. The Major Gods of Ancient Yucatán. Dumbarton Oaks. [Bacab as sons of Itzamna/PBD]","4 Kerr, J. K8719. Maya Vase Database. research.mayavase.com/kerrmaya_hires.php?vase=8719. | Stuart, D. 2014. “Notes on a Sacrifice Scene.” Maya Decipherment Blog. mayadecipherment.com/2014/10/31/notes-on-a-sacrifice-scene/ | Coe, M.D. 1973. The Maya Scribe and His World. Grolier Club. | Mosiah 17:13.","5 Grover, J.D. 2017. Evidence of the Nehor Religion in Mesoamerica. Challex Scientific Publishing, Provo, UT. [LDS independent researcher; n-ḥr derivation developed here] | BYU Book of Mormon Onomasticon, s.v. NEHOR. onoma.lib.byu.edu. [n-ḥr rated “even less likely”; preferred etymology is Hebrew Nahor (nāḥōr). Attribution to JAT (J.A. Tvedtnes).]","6 Taube, K.A. 1992. The Major Gods of Ancient Yucatán. Dumbarton Oaks. | Taube, K.A. 2004. RES 45:69–98. | Miller & Taube 1993. | Kerr K8719. | Stuart 2014. | Christenson, A.J. 2007. Popol Vuh. University of Oklahoma Press.","7 Taube, K.A. 2004. Olmec Art at Dumbarton Oaks. Pre-Columbian Art at Dumbarton Oaks 2. Washington, DC: Dumbarton Oaks Research Library and Collection. | Diehl, R.A. 2004. The Olmecs: America's First Civilization. Thames & Hudson, pp. 102–103. [La Venta Monument 19] | 2 Nephi 25:20; Helaman 8:14–15; Numbers 21:8–9.","M1–M7 Methodology notes: All arguments in this chapter are Lamanite-sphere (Sections I–III, V, VII–X) or mixed Nephite/Lamanite-sphere (Sections IV, X). The Order of Nehor is explicitly a non-Nephite religion. The five-doctrine correspondence (Section III) is the chapter's core argument and passes both control and JS tests independently of the name argument (Section VI). The name argument is supplementary: if the Hebrew Nahor etymology is preferred, the five-doctrine case is unaffected. Control test: passes. JS test: passes (Taube 1992, 2004; Stuart 2014; San Bartolo murals 2001). Chronology: passes (PBD at San Bartolo ~100 BC predates Nehor individual in Alma 1)."],"ch11":["What Artapanus, Josephus, and the Dead Sea Scrolls Know","“He came with all his household into Egypt, to Pharethothes the king of the Egyptians, and taught him astrology.”","— Artapanus, ~200 BC (preserved in Eusebius, Praeparatio Evangelica; first translated into English by E.H. Gifford, 1903 — fifty-nine years after Joseph Smith's death)","In 1903, a Victorian scholar named E.H. Gifford published an English translation of a massive ancient encyclopedia written by the 4th-century bishop Eusebius of Caesarea. Buried in that encyclopedia was a fragment from a Jewish writer named Artapanus who had lived in Alexandria around 200 BC. A word on the source chain: Artapanus's original text does not survive independently; it is preserved through Eusebius's quotation in the Praeparatio Evangelica, a document that is itself well-attested in multiple Byzantine manuscripts and whose reliability as a quotation source is accepted by classical scholars. The Gifford 1903 translation is the standard English edition. The attribution is solid. What Artapanus wrote is not in dispute; the question is what it means. The fragment said something striking: Abraham came to Pharaoh and taught him astronomy. Not teaching Egyptians generally. Pharaoh personally. In the royal court. Astronomy.","The Book of Abraham, produced by Joseph Smith in 1835, contains a facsimile whose caption reads: “Abraham is reasoning upon the principles of Astronomy, in the king's court.” Joseph Smith was dead by 1844. Gifford's translation appeared in 1903. The specific detail that matches the Book of Abraham most precisely — Pharaoh personally, astronomy specifically, in the king's court — came from a source that did not exist in English until fifty-nine years after Joseph Smith died.","Then there is the name in a cave.","These are the chapter's two central arguments.","The patterns documented in the preceding ten chapters share a common feature: Joseph Smith produced content that he could not have known through any source available to him in 1829. The Sumerian grain word, the NHM altar inscriptions, the Babylonian monetary architecture, the Palestinian Hieratic script, the North Atlantic current system — each was confirmed by scholarship published after 1830, often decades or centuries later, by researchers working on unrelated problems. This chapter examines two more cases from Joseph Smith's other produced texts: the Book of Moses (dictated June 1830) and the Book of Abraham (produced 1835–42).","These texts contain specific, testable claims about ancient history, theology, and personal names. When those claims are tested against ancient sources — many of which were not accessible to scholarship in the 19th century and some of which were physically underground until decades after Joseph Smith's death — two tests produce striking results. Both results show that if these texts are fabrications, the fabricator had access to information that did not exist in accessible form in 1830.","The same pattern. The same direction. The same kind of content that keeps checking out, from people who were not looking for it.","I. Abraham Teaching Pharaoh Astronomy — What Artapanus Knew","The Book of Abraham's Facsimile 3 caption reads: “Abraham is reasoning upon the principles of Astronomy, in the king's court.” The detail is specific: not teaching Egyptians generally, not discussing theology, but reasoning about astronomy specifically, in Pharaoh's court specifically. Critics treated this as Joseph Smith's invention. Astronomy was not an obvious attribute of Abraham from the Hebrew Bible.","Artapanus was a Jewish writer living in Alexandria, Egypt, around 200 BC. His work survives only in fragments preserved by Eusebius of Caesarea. The relevant passage, in E.H. Gifford's 1903 English translation: “ARTABANUS in his Jewish History says that… he, they say, came with all his household into Egypt, to Pharethothes the king of the Egyptians, and taught him astrology.”","“Astrology” in ancient usage was not distinguished from astronomy; the same Greek vocabulary covered both. Abraham teaching Pharaoh “astrology” is Abraham teaching Pharaoh what today would be called astronomy.","Josephus — whose Antiquities of the Jews was available in Whiston's English translation from 1737 and was widely read in Joseph Smith's era — already says Abraham taught astronomy in Egypt. But Josephus says Abraham taught “them” — the Egyptians generally. The Book of Abraham's Facsimile 3 says Pharaoh specifically, the royal court specifically. Artapanus says Abraham came “to Pharethothes the king of the Egyptians, and taught him astrology.” The king personally. Not the Egyptians generally.","A fabricator working from Josephus in 1829 would have the general claim: Abraham taught astronomy in Egypt. What the fabricator would not have is the specific refinement that matches Artapanus and not Josephus: teaching Pharaoh personally rather than Egyptians generally, in the royal court rather than to the general population. That specific detail comes from a source that did not exist in English until fifty-nine years after Joseph Smith died. 1","II. What Genesis Says About Enoch — Four Verses","“‘And Enoch lived sixty and five years, and begat Methuselah: And Enoch walked with God after he begat Methuselah three hundred years, and begat sons and daughters: And all the days of Enoch were three hundred sixty and five years: And Enoch walked with God: and he was not; for God took him.' — Genesis 5:21–24”","Four verses. No sermons. No visions. No city. No weeping God. No missionary campaigns. No named associates. The Hebrew Bible says nothing else about Enoch.","III. What Moses 6–7 Says — Two Full Chapters","The Book of Moses was received by Joseph Smith beginning in June 1830, as part of his work on an inspired translation of the Bible. Moses 6–7 is unlike anything in Genesis. Two full chapters with specific details, proper names, dialogue, theological arguments, and named places.","Moses 6:26–38 describes God calling Enoch to preach against wickedness — a reluctant prophet uncertain of his own eloquence. Moses 6:40 introduces a character named Mahujah, who confronts Enoch directly and asks bold questions. Moses 7:2–21 describes Enoch building a city called Zion — so righteous it is eventually taken from the earth.","“‘And it came to pass that the Lord spake unto Enoch, and told Enoch all the doings of the children of men; wherefore Enoch knew, and looked upon their wickedness, and their misery, and wept… And Enoch saw the God of heaven weep…' — Moses 7:28–29”","A God who weeps. A prophet who builds a translated city. Named associates who confront and question Enoch. Moses 6–7 is not four verses. It is an elaborate ancient narrative — and the question is where it came from.","IV. The Laurence Question — What Was Available in 1830","Richard Laurence published the first English translation of 1 Enoch in 1821, nine years before Joseph Smith received Moses 6–7. 1 Enoch is a collection of ancient Jewish texts about the prophet Enoch, some portions of which may date back to the 3rd century BC. It presents an elaborate Enoch tradition: Enoch as cosmic prophet, mediator between heaven and earth, recipient of celestial visions. These broad themes overlap with Moses 6–7.","The scholarly consensus on whether Joseph Smith had access to Laurence's translation is divided. Historian Richard Bushman concluded it was “scarcely conceivable” that Smith knew of the translation. The 1821 edition was an obscure Oxford academic publication. The honest position: access is uncertain, no proof either way. What follows makes the argument that even if Joseph Smith had read Laurence's 1 Enoch from cover to cover, it would not account for the most specific and striking parallels in Moses 6–7.","V. The Book of Giants — Discovered in 1948","Among the Dead Sea Scrolls found in 1947–1948 in the caves near Qumran were Aramaic fragments of an ancient Jewish text called the Book of Giants. The Book of Giants was completely unknown to scholarship before its discovery at Qumran; the first scholarly edition was published by Milik and Black in 1976.","Hugh Nibley of Brigham Young University found that the Book of Giants contains far more specific and numerous parallels with Moses 6–7 than 1 Enoch does — despite being a fraction of the length. The Interpreter Foundation's summary is direct: the Book of Giants “contains much more dense and generally more pertinent resemblances to Moses 6–7 than the much longer 1 Enoch, the only ancient Enoch text outside the Bible that was published and translated into English in Joseph Smith's lifetime.”","VI. Mahujah and Mahaway — The Name Nobody Could Have Known","Moses 6:40 introduces a character with an unusual name: Mahujah. This figure approaches Enoch and asks him direct, bold questions about his mission and the meaning of his preaching. The name Mahujah does not appear in the Bible. It does not appear in Laurence's 1821 translation of 1 Enoch. It does not appear in any Enoch-related source accessible in 1830.","In the Aramaic Book of Giants from the Dead Sea Scrolls, discovered in 1948, there is a character named Mahaway (Aramaic: MHWY). His role is specific and distinctive: he is sent as an emissary to Enoch and asks Enoch to interpret and explain troubling visions. He is a questioner, an intermediary between the troubled giants and the prophet. Nibley's observation: “The only thing the Mahijah in the book of Moses is remarkable for is his putting of bold direct questions to Enoch. And this is exactly the role, and the only role, that the Aramaic Mahujah plays in the story.”","The philological connection runs deeper than the role. The name Mahujah in Moses 6 and Mahaway in the Aramaic Book of Giants are related forms of the same underlying name. Critically: both omit the suffix “-el” that appears in the closest biblical parallel (Mehujael in Genesis 4:18). Joseph Smith's name matches the Aramaic Dead Sea Scrolls form — differing from the biblical form — in a document that was physically in a cave in Qumran in 1830.","Consider what would be required for this to be coincidence or fabrication. Joseph Smith would have needed to: (1) invent a character name — Mahujah — not in the Bible, not in Laurence's 1 Enoch, not in any accessible source; (2) give that character a distinctive role as a bold questioner and emissary to Enoch; (3) have both the name and the role precisely match a Dead Sea Scrolls text that no scholar knew existed; (4) differ from the closest biblical name in exactly the way the Aramaic version differs.","VII. What 1 Enoch Contributes — and What It Does Not","Laurence's 1 Enoch does share broad themes with Moses 6–7: Enoch as a prophet of special status, cosmic visions, his translation rather than death. But scholars who have examined the specific content carefully consistently reach the same conclusion: 1 Enoch contains relatively few specific and unique resemblances to Moses 6–7, especially given its great length.","What 1 Enoch does NOT contain that Moses 6–7 does: the City of Zion narrative; the weeping God passage; the weeping earth (Moses 7:48–49); the character Mahujah and his distinctive interrogative role; the specific theological dialogue structure of Moses 6. The Book of Giants contains the specific parallels. Laurence's 1 Enoch contains the general ones. The Book of Giants was in a cave in the Judean desert in 1830. 3","VIII. The Weeping God — Wrong for 1830, Right for Antiquity","A clarification worth maintaining through this section: the argument here concerns the Book of Moses rather than the Book of Mormon directly. Both documents were produced by Joseph Smith — the Book of Moses as part of his 1830 inspired revision of Genesis — but through different processes, and the evidentiary case applies to the translator, not to any specific Book of Mormon narrative. The phenomenon is the same that has appeared throughout the preceding chapters: content unavailable in 1829, confirmed by later scholarship from sources inaccessible at the time. The text in question here is not the record of Lehi's family. It is the record of Enoch.","The single most theologically distinctive element of Moses 6–7 is Moses 7:28–29: the God of heaven weeps. The passage reads:","“And it came to pass that the God of heaven looked upon the residue of the people, and he wept; and Enoch bore record of it, saying: How is it that the heavens weep, and shed forth their tears as the rain upon the mountains? And Enoch said unto the Lord: How is it that thou canst weep, seeing thou art holy, and from all eternity to all eternity?” — Moses 7:28–29","Enoch's question — “How is it that thou canst weep?” — is theologically exact. He is not surprised that God is sad. He is surprised that a holy, eternal being is capable of grief. The question embeds the theological problem: the dominant tradition of Joseph Smith's world held that God was impassible — incapable of emotional affect, beyond suffering, unchanging in the Greek philosophical sense. This doctrine ran through Reformed Calvinist theology, the Westminster Confession — the 1647 doctrinal standard for Reformed Protestantism, affirming that God is “without passions” and entirely impassible — and the New England Protestantism that shaped the religious culture of upstate New York. A God who weeps is not the God of the Westminster Confession.","A fabricator working within this tradition would not produce this. The theological move required is not just unusual. It is backwards from the available model. A creative writer in 1830 reaching for emotional resonance would give God anger, or judgment, or power. The specific theological choice to give God grief — and to have a prophet ask the exact question that the impassibility doctrine would prompt — runs against the grain of the only theological tradition available in 1830.","Abraham Joshua Heschel, in The Prophets (Harper & Row, 1962), makes the case that “divine pathos” — the genuine emotional investment of God in human affairs, including grief, anger, and compassion — is the authentic ancient Israelite theology, systematically suppressed by the Greek philosophical tradition that later dominated Christian theology. The God of the Hebrew prophets is not the Unmoved Mover of Aristotle.","The Sumerian tradition goes further back and is more striking. The Lament over the Destruction of Sumer and Ur — composed approximately 2000 BC — depicts the great goddess Ningal interceding with the divine assembly, weeping before the god An and the god Enlil, begging them to spare her city. The gods refuse. Ningal weeps. An weeps. The lament describes divine grief in explicit, extended, emotionally specific terms. Thorkild Jacobsen, in The Harps That Once (Yale University Press, 1987), documents that the divine lament tradition is not peripheral to Mesopotamian religion but central to it.","Moses 7:28–29 depicts God weeping over the wickedness of the residue of the people in a way that is structurally identical to the Mesopotamian divine lament tradition: an eternal being, incapable by the logic of power of being hurt, nonetheless weeps over the suffering and wickedness of the people he created. Enoch's explicit question — “How is it that thou canst weep?” — mirrors the theological tension at the center of the Mesopotamian lament tradition. This specific structural tension is not in the KJV. It is not in any available English translation of Enoch material.","The Sumerian lament texts were not available to Joseph Smith in any form in 1830. Their decipherment required the full unlocking of Sumerian, which did not happen until the late 19th and early 20th centuries. Even the existence of a Sumerian divine lament tradition was unknown to scholarship before cuneiform decipherment began in 1857. Heschel's systematic theological argument for divine pathos as the authentic Hebrew theology was published in 1962. Jacobsen's translations were published in 1987.","The weeping God of Moses 7 is wrong for the theological world of 1830. It is right for the ancient Near Eastern world in which Joseph Smith claimed it originated. 4","IX. The Book of Abraham Facsimiles — An Honest Tension","The Book of Abraham presents a different kind of evidentiary challenge. The surviving papyri from which Joseph Smith produced the Book of Abraham are, by Egyptological consensus, standard Egyptian funerary documents — portions of the Book of Breathings and the Book of the Dead — rather than an Abraham manuscript. The Church of Jesus Christ of Latter-day Saints' own Gospel Topics Essay acknowledges this tension directly, noting that “the relationship between those fragments and the text available today is not fully understood.”","The essay presents the catalyst-revelation model: the papyri may have functioned less like a dictionary to be decoded and more like a photograph that triggers a memory. Joseph Smith may have used the papyri as a starting point from which revelation produced a text, rather than as a document he was translating word by word. This model is coherent. It requires rethinking what “translation” means for this text.","This book has documented a genuine ancient footprint in the Book of Abraham — the Artapanus source confirming that Abraham taught Pharaoh astronomy specifically, a detail matching the facsimile caption exactly, from a source inaccessible in 1830. That footprint is real. So is the Egyptological tension. Readers deserve both, side by side, and the freedom to assess them. 5","X. What the Ancient Witnesses Establish","Three independent ancient sources — Artapanus (~200 BC), Josephus (~AD 93), and the Aramaic Book of Giants (pre-Christian, Dead Sea Scrolls, discovered 1948) — confirm specific, detailed traditions that appear in Joseph Smith's texts.","The Artapanus parallel is the cleanest: an ancient Jewish writer in Egypt recorded that Abraham taught Pharaoh astronomy specifically and personally, matching the Book of Abraham's Facsimile 3 caption more precisely than anything Joseph Smith could have read. The source was not in English until 1903.","The Book of Giants parallel is the most remarkable: a character named Mahujah in Moses 6 — a bold questioner who serves as an emissary to Enoch — matches in name, role, and precise philological form a character in an Aramaic Dead Sea Scrolls text that was physically in a cave in Qumran from before the Common Era until its discovery in 1948. The name form in Moses matches the Aramaic Dead Sea Scrolls form, not the Hebrew biblical form. 2","The weeping God of Moses 7 contradicts the dominant Protestant theology of 1830 and aligns with ancient Mesopotamian and Israelite tradition confirmed by scholarship developed entirely after Joseph Smith's lifetime.","XI. The Lamanite King in the Epigraphic Record","The preceding sections of this chapter have examined Joseph Smith's other produced texts for evidence of content unavailable in 1829. This section returns to the Book of Mormon itself, and to its final century.","Mormon 2:9 records a Lamanite king named Aaron who attacked Mormon's army “just prior to the completion of year 330” after the coming of Christ — approximately 330 AD. Mormon's final battle is recorded at 385 AD (Mormon 6:5). For 1,400 years, these were simply dates in a religious text with no external referent.","In January 2024, the Dumbarton Oaks Research Library and Collection published Spearthrower Owl: A Teotihuacan Ruler in Maya History by David Stuart. Stuart's monograph documents a specific historical event recorded in multiple Maya inscriptions: on January 16, 378 AD, a military commander named Sihyaj K'ahk' arrived at Tikal backed by the power of Teotihuacan. The event is documented in inscriptions at Tikal Stela 31, Uaxactún, El Perú, Bejucal, and El Zotz.","The Book of Mormon's Aaron attacks Mormon's army in the period 330–385 AD. Sihyaj K'ahk' consolidated Teotihuacan-backed military dominance over the Tikal region in January 378 AD — exactly within that window. The final Nephite battle is 385 AD. The final collapse of Nephite civilization and the final consolidation of a Teotihuacan-backed military takeover of the proposed Nephite/Lamanite boundary region occurred within six years of each other.","What this means — and what it does not: this is not an identification of Sihyaj K'ahk' as the Book of Mormon's Aaron. What the calendar alignment shows is that an independent epigraphic record — Maya stone inscriptions produced by people with no knowledge of the Book of Mormon — places a major Teotihuacan-backed military takeover of the proposed Nephite/Lamanite boundary region in the final decades of the Book of Mormon's narrative. The direction is consistent. It is not confirmation. But it is the kind of calendar correspondence that would be surprising to find if the Book of Mormon were invented in 1829 with no access to a Maya epigraphic record that no one would begin to decipher for another century. 6","XII. La Venta Stela 3 — A Possible Mulekite Trace","The preceding sections examined textual and epigraphic witnesses from outside the Book of Mormon that carry content unavailable in 1829. This section examines a physical monument.","La Venta Stela 3 was carved during La Venta Phase IV, dated by archaeologists to approximately 600–450 BC. It is one of the largest sculptures produced at La Venta — a massive bas-relief depicting two elaborately costumed figures meeting in a formal encounter. Hovering above them are supernatural attendants, interpreted as ancestral figures. The scene has been studied by some of the most prominent Mesoamericanists of the twentieth century, and they converge on a striking conclusion.","The figure on the left displays facial characteristics consistent with earlier Olmec sculptures: short stature, broad features, a characteristic Olmec physiognomy. The figure on the right is different in every way: taller, with a full beard — possibly the earliest full-beard representation in Mesoamerican art — and a conspicuously aquiline, beak-like nose. Tatiana Proskouriakoff, one of the twentieth century's foremost Mesoamerican art historians, interpreted the scene as depicting the leaders of two “racially distinct” groups. She noted that the face of the Olmec-featured figure was deliberately mutilated in antiquity, suggesting the group he represented was later dominated by those represented by the bearded figure.","The convergence of scholarly opinion on this point is notable because it is independent of any LDS claim. Miguel Covarrubias agreed with Proskouriakoff's reading. Archaeologist Ignacio Bernal concurred. Elizabeth Benson, synthesizing the evidence from Stela 3, Tres Zapotes Stela D, and the Alvarado Stela — three monuments showing the same bearded, aquiline figure facing a kneeling Olmec-featured subordinate — concluded that “bearded conquerors may have come into the Olmec area quite late.” O. Luis González Calderón, analyzing the clay heads from La Venta, described a lineage “completely different from Olmec classic iconography, and possibly new or of a later arrival,” bearing “very different cultural and religious ideas.” Philip Drucker and John F. Scott also identified the figure as representing a foreign-derived elite.","Sorenson's observation is this: La Venta Phase IV dates to approximately 600–450 BC. The Book of Mormon places the Mulekite arrival — a party of Jews fleeing Jerusalem in 587 BC that included a prince of the royal house of Judah — in the Gulf Coast area at precisely this period. Omni 1:15–16 records that the people of Zarahemla came “out from Jerusalem at the time that Zedekiah, king of Judah, was carried away captive into Babylon.” Semitic peoples from the Levant, arriving in the Gulf Coast of Mexico around 587 BC, would have been bearded and aquiline-nosed — the exact physiognomy multiple non-LDS scholars identified in La Venta Phase IV art as a foreign intrusive elite.","The argument does not require that the bearded figure on Stela 3 is Mulek. It requires only that the monument depicts what mainstream scholarship already says it depicts: a foreign elite of Semitic physiognomy arriving on the Gulf Coast of Mexico at the time the Book of Mormon places the Mulekite arrival there. No knowledge of the Book of Mormon is needed to reach that scholarly conclusion. The Book of Mormon predicts exactly this archaeological signal — a foreign-featured ruling class arriving at the right location at the right time — and the archaeological record, evaluated independently by non-LDS scholars, provides it.","One qualification is essential. Sorenson's Mulekite identification is not the only interpretation. Some scholars read the bearded figure as representing Olmec trade contacts with distant Mesoamerican regions where bearded phenotypes were more common. Others consider the physiognomic contrast stylized rather than ethnic. The honest weight of this argument is a compelling convergence — a suggestive correspondence that multiple independent lines of evidence make plausible — not a demonstration. It is the kind of correspondence the model predicts and the kind that should exist if the Mulekite account is historical. Its existence, evaluated against the alternative (random coincidence), is the footprint. 7","This chapter examined the Pearl of Great Price evidence — a different set of texts producing the same pattern. The next chapter inverts the argument entirely, naming what the evidence has not yet confirmed, and explaining why honest gaps strengthen rather than weaken the cumulative case.","1 Artapanus (~200 BC). In Eusebius, Praeparatio Evangelica 9.18. Translation: E.H. Gifford (1903). | Josephus, F. (~AD 93). Antiquities of the Jews 1.8.2. Translation: W. Whiston (1737).","2 Milik, J.T. & Black, M. 1976. The Books of Enoch: Aramaic Fragments of Qumrân Cave 4. Oxford: Clarendon. | Bradshaw, J.M., Bowen, M.L. & Dahle, R. 2020. “Where Did the Names Mahaway and Mahujah Come From?” Interpreter 40. | Bradshaw, J.M. & Dahle, R. 2019. “Could Joseph Smith Have Drawn on Ancient Manuscripts When He Translated the Story of Enoch?” Interpreter 33:305–373.","3 Nibley, H. 1986. Enoch the Prophet. Salt Lake City: Deseret Book / FARMS. | Nickelsburg, G.W.E. 2001. 1 Enoch 1: A Commentary. Hermeneia. Minneapolis: Fortress. | Laurence, R. 1821. The Book of Enoch the Prophet. Oxford: Parker. | Charles, R.H. 1906. The Book of Enoch. London: SPCK.","4 Heschel, A.J. 1962. The Prophets. New York: Harper & Row. [divine pathos as authentic ancient Israelite theology] | Jacobsen, T. 1987. The Harps That Once: Sumerian Poetry in Translation. New Haven: Yale University Press. [Sumerian divine lament tradition] | Moses 7:28–29. | Westminster Confession of Faith, 1647, Chapter II.","5 Church of Jesus Christ of Latter-day Saints. “Translation and Historicity of the Book of Abraham.” Gospel Topics Essay. churchofjesuschrist.org. [catalyst-revelation model; acknowledges papyri are standard Egyptian funerary documents]","6 Stuart, D. 2024. Spearthrower Owl: A Teotihuacan Ruler in Maya History. Dumbarton Oaks Pre-Columbian Art and Archaeology Studies No. 41. [Sihyaj Kʼhkʼ, January 16, 378 AD; Tikal Stela 31; Uaxactún; El Perú; Bejucal; El Zotz] | Mormon 2:9; Mormon 6:5.","7 Proskouriakoff, T. 1968. “Olmec and Maya Art: Problems of Their Stylistic Relation.” In Dumbarton Oaks Conference on the Olmec, ed. Elizabeth P. Benson. Washington, DC: Dumbarton Oaks. [pp. 121–122: “racially distinct groups”; deliberate mutilation of Olmec figure] | Benson, E.P. 1981. In The Olmec and Their Neighbors, ed. Benson. Dumbarton Oaks. [p. 97: “bearded conquerors”] | Covarrubias, M. 1957. Indian Art of Mexico and Central America. Knopf. [p. 77] | González Calderón, O.L. 1991. The Jade Lords. Coatzacoalcos, Mexico. [pp. 39, 90–91] | Sorenson, J.L. 2013. Mormon's Codex. Deseret Book/Maxwell Institute. [Ch. 22, pp. 529–534] | Omni 1:14–16; Helaman 8:21.","M1–M7 Methodology notes: This chapter examines translator-access evidence rather than Book of Mormon narrative directly. Sections I–X concern the Book of Moses and Book of Abraham. The Nephite/Lamanite two-sphere filter does not apply to translator-access arguments; they concern the translator, not specific civilizational spheres. Sections XI–XII return to Book of Mormon narrative: the Sihyaj Kʼhkʼ calendar correspondence (XI) is Lamanite-sphere; the La Venta Stela 3 Mulekite trace (XII) is Lamanite-adjacent. Control tests pass throughout. JS tests pass throughout: Gifford 1903 (59 years after Smith's death), Milik/Black 1976 (Book of Giants), Heschel 1962, Jacobsen 1987, Stuart 2024, and the Proskouriakoff/Benson scholarly identification of La Venta Phase IV foreign elite all postdate 1829."],"ch12":["Honest Gaps, Open Questions, and Why They Matter","“As they anchored themselves in what they did believe, the Lord would help them with what they didn't.”","— Elder Clark G. Gilbert, “Come Home,” April 2026 General Conference","“Jesus Christ and His atoning sacrifice are the root of our testimony. All other things are branches. Faith is not faith if never tested. Do not despair if you have trials of faith or unanswered questions.”","— Elder Dieter F. Uchtdorf, October 2024 General Conference","“Seeking greater understanding is an important part of our spiritual development, but please be cautious. Reason cannot replace revelation.”","— Elder Dale G. Renlund, April 2022 General Conference","Every chapter in this book has made the same move: take a claim the critics labeled impossible, examine what the evidence actually shows, and document the direction it has moved. The direction, across eleven chapters and dozens of independent arguments, runs consistently toward greater plausibility.","This chapter moves in the other direction. It names what the evidence has not confirmed. It identifies claims in the Book of Mormon that remain unconfirmed by the archaeological record, arguments that are contested or carry genuine tension, and questions that honest scholarship cannot yet answer. This is not a concession chapter. It is a credibility chapter.","A document that has no gaps is not intellectually serious. It is advocacy. The preceding chapters have documented real evidence from real scholarship, and that evidence has earned the right to be taken seriously precisely because it has not hidden the hard cases. A case built on selected evidence is fragile. This one is not.","A note on two kinds of absence: Two kinds of gaps live in this chapter, and they carry different weight. The first kind — the absence of Nephite-sphere material: no named Nephite artifacts, no confirmed Nephite inscription, no monument labeled Nephite by the non-LDS scientific community. This gap is real. But it is also precisely the gap that the Two Civilizations framework (Chapter Two) predicts: Nephite-sphere material was erased by the Lamanites who defeated them, by subsequent pre-Columbian overwriting, and finally by Spanish colonial destruction. The absence is expected. The second kind of gap — specific archaeological claims that should have survived but haven't — is different, and deserves more careful attention. The sections below name both kinds honestly.","Before cataloguing claims that do not currently have supporting findings, it is worth pausing on a different category: claims the Book of Mormon was once said to have already failed.","Not gaps. Predictions. Specific, confident assertions by critics that particular details in the text were demonstrably wrong — and that the evidence would never show otherwise. The history of those predictions is the context in which the genuine gaps that follow should be read.","The name Nahom, for example. First Nephi records the death of Ishmael at a place already bearing that name — a pre-existing toponym the travelers found, not invented. Critics called this a transparent fabrication: no ancient Arabian place bearing that name had ever been documented. Then German and Yemeni archaeologists cataloguing pre-Islamic temple inscriptions near Marib, Yemen, found three votive altars inscribed with the consonantal root N-H-M — in ancient South Arabian script, as in Biblical Hebrew, only consonants are written, making N-H-M the written form of Nahom. The altars had been there for twenty-five centuries. The prediction failed.","The same pattern repeated across two centuries. Sariah was not a real Hebrew woman's name — until the Elephantine papyri produced one. Alma was a Latin feminine noun, not ancient Semitic — until the Ebla tablets showed it as a man's name at 2300 BC. Pre-Columbian barley was categorically impossible in the New World — until archaeologists confirmed it from Arizona to Illinois to Iowa, with evidence of its trade network extending into parts of Mexico. The Classic Maya were a peaceful civilization, making the Book of Mormon's warfare look like invention — until epigraphy revealed a civilization in nearly continuous war. Steel was a historical error for 600 BC Jerusalem — until Vered Jericho. Sophisticated writing was too early for the Book of Mormon's Mesoamerica — until the Cascajal Block and San Bartolo.","In each case, the finding came from researchers working on entirely unrelated problems, publishing in peer-reviewed venues with no stake in the Book of Mormon's claims. The evidence kept arriving in one direction.","The gaps named in this chapter are real. But over two centuries of investigation — including aggressive investigation by critics motivated to disprove the Book of Mormon — the list of confirmed findings that match the text's claims has grown, the list of claimed historical errors has continued to shrink as scientific investigation has deepened, and new errors are not accumulating. A text that keeps surviving the specific challenges made against it, while the number of genuine gaps is shrinking rather than growing, is not behaving the way invented texts behave.","I. No Artifact Has Been Labeled “Nephite” by the Scientific Community","The most basic evidentiary gap is the one critics cite most often, and they are right to cite it: no artifact, no inscription, no site has been identified by the non-LDS scientific community as Nephite, Jaredite, Mulekite, or Lamanite. No monument bears a king's name from the Book of Mormon. No stela records a Nephite battle. No inscription says “Zarahemla” in any script.","This gap is real. What it actually shows is more specific than the standard critical framing.","Brant Gardner, a Mesoamerican specialist and Book of Mormon scholar, identifies precisely why this gap is structurally expected rather than damning. In the New World, unlike the Old World, there is no continuity of occupation that would allow scholars to trace a specific site's identity through conquest, colonization, and archaeological record to a name recorded in a text. Jerusalem has been Jerusalem continuously — the name and the location have never been lost. The major Preclassic Mesoamerican sites were abandoned, overgrown, and their names lost before the Spanish arrived. Even the Olmec did not leave a readable name for themselves in their own script.","The absence of a named Nephite site is therefore not evidence that Nephites did not exist. It is evidence that ancient Mesoamerican site names were not preserved — a characteristic that applies equally to every pre-Columbian civilization in the region, whether or not the Book of Mormon has anything to say about them. 1","II. Why the Archaeological Silence Is Exactly What the Evidence Predicts","The preceding section explains why named Nephite sites were never preserved. This section addresses a deeper question: if the Nephites occupied major population centers for nine centuries, why is there no distinctive Nephite archaeological signature at all?","The Book of Mormon documents the answer in its own pages. Mormon and Moroni describe the Lamanites who destroyed the Nephites in terms that leave no room for ambiguity about their intent. Mormon 4:14 records Lamanite ritual practices that shocked even a military commander accustomed to war. Moroni 9 describes systematic brutality. These were not conquerors who absorbed a defeated civilization. They were conquerors who rejected everything the defeated civilization stood for, including its religion.","In 2024, archaeologists working at K'anwitznal in Guatemala published a remarkable discovery in the journal Antiquity. Beneath the floor of a pyramidal temple, they found the scorched bones of at least four adult members of the previous royal dynasty — burned, commingled, and dumped as construction fill. Among the burned material were fragments of a jade funerary mask of the kind normally reserved for royalty, along with thousands of destroyed royal objects. The fire had reached temperatures exceeding 1,470 degrees Fahrenheit — hot enough to require a very large, very public conflagration. A new ruler named Papmalil had made a deliberate, public act of desecration: burning the previous dynasty's royal remains and burying them as construction fill beneath a new temple built directly over the old one.","Travis Stanton and M. Kathryn Brown's 2021 edited volume A Forest of History documents “termination rituals” — deliberate, repeated, ritualized procedures for destroying monuments, smashing inscriptions, burning ceremonial objects, and burying or scattering the material record of defeated dynasties — as a standard Maya political practice across multiple sites and multiple centuries.","The Lamanites who destroyed the Nephites did not build on Nephite foundations. They erased them. That behavior now has a name in secular Maya archaeology. It is called a termination ritual. And it left exactly the kind of record — or absence of a record — the Book of Mormon predicts. 2","The archaeological silence is not a gap in the evidence for the Book of Mormon. It is a confirmation of the Book of Mormon's own account of what happened to the Nephites.","The theoretical case for the silence is strong on its own terms. The epi-Olmec corpus makes it concrete. Justeson and Kaufman's 1993 decipherment in ‘Science' documented a writing tradition that existed, in the proposed Book of Mormon territory, during the Book of Mormon period — not a theoretical inference but a demonstrated historical fact. The tradition flourished for roughly 600 years across multiple sites. At its peak it produced inscriptions elaborate enough to record a warrior-king's multi-year rise to power through warfare and ritual. Scholars have been studying it for decades. The result: two readable texts. Most of the known inscriptions are described by Justeson and Kaufman as “mostly effaced.” La Mojarra Stela 1 — the most important surviving monument — was found face-down in a river in 1986, displaced from its original location by forces unknown.","This is what happens to records in the proposed Book of Mormon territory across time. A documented, non-LDS writing tradition active for 600 years left almost nothing readable. If that is the survival rate for a tradition confirmed to have existed, the expected survival rate of distinctly Nephite material — belonging to the people who lost, whose monuments were overwritten by their successors, whose territory endured centuries of pre-Columbian architectural overwriting followed by Spanish systematic destruction — is effectively zero. The silence critique asks: where are the Nephite records? The epi-Olmec corpus answers from within the same territory, the same era: this is what happens to records here. Two texts from 600 years. The Nephites had 1,400 years of additional exposure before the first Western scholars arrived. 3","III. The Erasure Was Already Ancient","Every serious discussion of the absence of Nephite physical evidence eventually arrives at the Spanish conquest: the burning of the Maya codices, the destruction of temples, the systematic erasure of indigenous record-keeping. Friar Diego de Landa burned manuscripts in the Yucatán in July of 1562. The Spanish colonial project was an erasure event of the first order.","This is true. But it is not the beginning of the erasure problem. It is the end of it.","By the time Hernán Cortéz arrived in 1519, the Nephite civilization had already been gone for over eleven hundred years. The civilizations that followed the Nephites were not interested in preserving Nephite monuments. They were interested in overwriting them with their own. The pattern of pre-Columbian erasure in Mesoamerica is not a background condition. It is a documented, quantifiable process with specific instances.","At K'anwitznal in Guatemala — published in 2024 in the peer-reviewed journal Antiquity by Halperin and LeMoine — archaeologists excavating beneath a ninth-century ceremonial structure found the burned skeletal remains of at least four members of the previous royal dynasty, commingled, deposited as fill material in the new building's foundation. This is what Maya archaeologists call a termination ritual — the deliberate decommissioning and burial of a prior structure or lineage to legitimize the new one. Termination rituals are documented at dozens of Maya sites throughout the Classic period. Each one is a layer of erasure that predates the Spanish by centuries.","At El Baúl in Guatemala, Preclassic Stela 1 — dated to approximately 36 CE — was not left where it was originally erected. Late Classic rulers, working between 700 and 900 years after the stela was carved, moved it to the most prominent ceremonial location in their city and placed it there as an ancestor monument. They appropriated an ancient monument to claim its depicted ruler as their ancestor. The stela survived the relocation, but its original context was permanently destroyed.","At Lamanai in northern Belize, a pre-Columbian stela was incorporated face-down into the foundation of a Spanish colonial church — the last instance in a long sequence. The Spanish church was built directly on the foundation of a Maya temple platform, which was itself built over earlier structures. Pendergast's Royal Ontario Museum excavations (1974–1986) documented this layering at every major structure on the site.","At Chacchoben in Quintana Roo, the original occupation dates to approximately 300 BC — the early Book of Mormon period. The structures tourists climb today were built around 700 CE, roughly 280 years after the Book of Mormon closes. The Book of Mormon-era occupation is real and documented; it is simply under the visible Late Classic construction.","The Spanish Erasure Was the Last Layer","If the Nephite civilization ended approximately 400 AD, its material legacy has survived through: the Late Classic Maya period (400–900 AD), during which new construction systematically buried Preclassic remains; the Postclassic period (900–1521 AD); the Spanish conquest (1519 onward); and four centuries of post-colonial occupation. The Spanish are the fourth of at least four distinct erasure periods, each compounding the last. The absence of clearly labeled Nephite artifacts is evidence of what the evidence establishes independently: that pre-Columbian Mesoamerica was a place where victors wrote over the losers, generation after generation, for more than a millennium before the Spanish arrived.","The Book of Mormon predicted this about itself. Mormon and Moroni were explicit that the Nephite records were nearly lost, that the Lamanites would not preserve them, and that the physical evidence of the Nephite world would not survive intact. That prediction has been verified — not specifically for Nephite artifacts, but for every conquered civilization in Mesoamerica's pre-Columbian history. 4","IV. No Smelted Iron Confirmed in Pre-Columbian Mesoamerica","No pre-Columbian iron smelting — the production of metallic iron from ore by heating in a furnace — has been confirmed by non-LDS archaeologists in Mesoamerica. This is not a contested claim. It is the current archaeological consensus, stated as such in the JBMS paper this book cites. If the Book of Mormon's references to iron and steel require iron smelting in the modern metallurgical sense, rather than hardened copper alloy or organized iron-ore use, then the archaeological record does not yet confirm that claim.","The translation framework argument is the strongest response: the KJV convention of using “steel” for hardened copper alloys is documented in biblical lexicons. The iron-ore workshop at San Lorenzo documents the Book of Mormon's claim that the Jaredites “worked in all manner of ore” (Ether 10:23) without requiring smelting. But these are not the same as confirmed iron smelting, and the honest book says so.","The Steel Question — A Near Eastern Resolution","The absence of smelted iron in Mesoamerica is real. The BOM's references to iron and steel, however, are not direct claims about smelted iron in Mesoamerica. They are claims about what Lehi's party brought from Jerusalem.","Steel was well-attested in Iron Age Israel. Biblical scholars have established that the KJV word “steel” usually translates the Hebrew words for copper/bronze or iron — the English rendering was always ambiguous. But Congdon's analysis of the archaeological record (1971) showed that by a hammering process, iron tools and weapons were converted into steel implements centuries before Lehi departed Jerusalem. Van der Merwe and Avery, and Wheeler and Maddin, documented iron/steel finds from Cyprus, Greece, Turkey, Syria, Egypt, Iran, Israel, and Jordan as early as 1300 BC, with specimens including tempered steel. The sword of Laban — a steel blade in sixth-century Jerusalem (1 Nephi 4:9) — is entirely consistent with what Near Eastern archaeology has found.","The Jaredites had knowledge of steel much earlier (Ether 7:9), placing it in a Mesopotamian context where the metallurgical tradition was older still. Nephites continued working in iron and steel as late as Jarom 1:8, circa 400 BC. All of these references are to people in their Old World homeland or in the early generations after arrival.","The gap, then, is specifically the absence of Mesoamerican iron smelting after arrival. This is a genuine absence. The most plausible interpretation is that the Lehites arrived in a setting where the raw materials and technical infrastructure for iron smelting were not available, and the tradition was eventually lost. Mesoamerica did work other iron-bearing minerals — hematite, ilmenite, and magnetite at Oaxaca and San Lorenzo were worked as artifacts and described as “iron” in Near Eastern contexts — which gives the BOM phrase “all manner of iron” (Helaman 6:11) a broader, defensible reading. But the absence of smelting is not explained away by this. It belongs in the honest account, where it already is. 5","One further distinction belongs in the honest account. The sword of Laban — described as having a blade of “most precious steel” with a hilt of pure gold (1 Nephi 4:9) — persists as a culturally significant named object across subsequent Nephite narrative. Its metallurgical consistency with 6th-century BC Jerusalem is addressed in Section I of this chapter. The question of its absence from Mesoamerican archaeology is a separate matter, addressed in Section XVI of this chapter.","V. Pre-Columbian Wheat Has Not Been Confirmed","Mosiah 9:9 lists wheat among the crops cultivated by Zeniff's people. As established in Chapter Seven, domesticated little barley has been confirmed, overturning one of the critics' most confident objections. Wheat has not been similarly confirmed.","The loanshift argument — that Lehi's family applied familiar Old World crop names to similar-looking native plant
