d a distinct Oaxacan compound in the southwestern sector of the city, identifiable by its Zapotec ceramic traditions, burial practices, and architectural forms. Evelyn Rattray's analysis identified additional distinct ethnic quarters: a Gulf Coast neighborhood in the eastern sector, and a lowland Maya trader compound in the northeast, each confirmed by isotopic analysis of skeletal remains that reveals where individuals grew up.","The relevance to Moroni's situation is direct. A man fleeing genocide in southern Mesoamerica, moving north through the proposed Land Northward corridor, would arrive at or near a city that had specifically organized itself around the absorption of peoples from multiple ethnic traditions. He would not be the first refugee to arrive from the south. A city with an Oaxacan barrio, a Gulf Coast barrio, and a Maya barrio had demonstrated that its response to outsiders was organization, not elimination.","The chronological alignment is also striking. The ethnic barrios at Teotihuácan crystallize archaeologically around 200–400 AD — precisely the period when the Book of Mormon's golden age was ending and the -ites were returning (4 Nephi 1:24–26, approximately 231 AD onward). The golden age built the city. The end of the golden age produced its ethnic neighborhoods. Joseph Smith in 1829 had no access to Spence's 1992 barrio analysis or Rattray's isotopic skeletal data. The multicultural refuge was not put there by the Book of Mormon. It was put there by archaeology, decades after the Book of Mormon was published. 5","From the Valley of Mexico, the geographic movement northward follows a corridor that North American topography has made a human highway for millennia. North through the Mexican plateau, across what is now the American southwest or midwest, into the Great Lakes basin and the river systems of the upper midwest — this is not a route that requires a map. It is the path that watersheds and terrain provide to anyone moving with minimal equipment through North America.","This corridor was not hypothetical in Moroni's time. The Hopewell Interaction Sphere (approximately 100 BC to 500 AD) was a documented trade and cultural exchange network that moved objects — Lake Superior copper, Gulf Coast shells, obsidian, mica — from the Gulf of Mexico through the Ohio Valley and into the Great Lakes region. Archaeologists have confirmed Hopewellian exchange in both directions across this corridor. The corridor was traveled. It had established pathways.","At the eastern end of that corridor, past the Great Lakes, lies the Finger Lakes region of western New York. The archaeological record of this region at 400 AD is consistent and clear. The Middle Woodland period (100 BC – 1000 AD) in this region was characterized by small hunting and gathering bands, with no large settlements, no cities, and no organized political structures. The Iroquois Confederacy does not appear in the archaeological record until approximately 1100 AD. At 400 AD, upstate New York was occupied by small Woodland-era bands scattered across a vast forested landscape. A lone traveler passing through would not be remarkable. A hill selected as a deposit site would not be disturbed for a very long time. 6","What the corridor and destination mean together: a man making rational decisions under extreme duress, moving north through the natural geographic corridor of North America, would end up at a remote, forested, sparsely populated region at the continental edge of that corridor. The hill in Manchester, New York sits exactly there.","VI. The Man in the Mound — What the Zelph Incident Actually Shows","On June 3, 1834, Joseph Smith and a company of men known as Zion's Camp stopped along the Illinois River at a large burial mound in Pike County, Illinois. Digging into the mound, they discovered human bones and an arrowhead. Joseph Smith reportedly received a vision identifying the man buried there as Zelph — described by multiple witnesses as a white Lamanite warrior and prophet who served under Onandagus, a king described as known “from the Rocky Mountains to the Atlantic Sea or Hill Cumorah.”","A caveat within LDS scholarship itself: Kenneth W. Godfrey (BYU Studies, 1989) and others have documented that the accounts of what Joseph Smith said about Zelph vary significantly across the witnesses present. Different journal accounts give different details about what Smith actually stated. Some accounts say he identified Zelph as a “white Lamanite” who was known from the Rocky Mountains to the eastern sea; other accounts are less specific. The incident cannot be treated as a precise revelatory statement about Book of Mormon geography. It is used here for a limited purpose: the radiocarbon dating of the Hopewell mound tradition demonstrates that whatever group Zelph belonged to, it postdates the Book of Mormon narrative period — eliminating the Heartland geography's use of the Zelph incident as evidence. The positive argument about Moroni's route does not depend on Zelph.","This incident has been used by proponents of a North American Book of Mormon geography as evidence that the final battles between Nephites and Lamanites occurred in Illinois. The problem is the radiocarbon date. In 2011, archaeologists conducted systematic excavation of Naples-Russell Mound 8 — the specific mound where Zelph was found. Radiocarbon dating of the skeletal remains established the date of burial as approximately 91 AD, with a calibrated two-sigma range of 58–127 AD. The calibrated date of 91 AD places Zelph's burial in the middle of the Book of Mormon's golden age described in 4 Nephi 1:13 — when “there were no robbers, nor murderers, neither were there Lamanites, nor any manner of -ites.” This peace period runs from approximately 29 AD through roughly 315 AD. The final battles between Nephites and Lamanites occurred in the 370s through 385 AD. Zelph's burial at 91 AD precedes those battles by approximately 280 years. A Lamanite warrior killed in the final battles cannot have been buried 280 years before those battles occurred. 7","What the Zelph incident actually shows is more interesting. A man buried in Illinois at 91 AD could be a descendant of the northward migrants described in Helaman 3 — the people who, decades before the golden age, “began to cover the face of the whole earth, from the sea south to the sea north” and of whom some “never did return” (Alma 63:8). The Hopewell Interaction Sphere connects the Gulf of Mexico to the Great Lakes in exactly the geographic range that Onandagus was said to be known: “from the Rocky Mountains to the Atlantic Sea.”","The LDS Church's own official position is dispositive. Its published gospel topics essay on Book of Mormon geography states that it does not take “a position on the specific geographic locations of Book of Mormon events.” The radiocarbon date eliminates Zelph as a final-battle casualty. The Zelph incident is consistent evidence for a Mesoamerican-origin model in which some of the book's peoples migrated north through the corridor documented in this chapter and were integrated into the Hopewell cultural system when the final battles took place two thousand miles to the south.","The peoples Moroni passed through or near — the multicultural population of the Teotihuácan corridor in the early 5th century AD — are the ancestral populations of the peoples whose descendants eventually produced the K'iche'an documents. The Popol Vuh, the Annals of the Cakchiquels, and the Título de Totonicapán were written down in the 16th century by the descendants of the populations that reorganized after Teotihuácan's collapse (approximately 550–650 AD) — roughly a century after Moroni's wandering years.","Those documents preserve traditions of migration from across the sea in two distinct directions: from the east (Popol Vuh, Título de Totonicapán) and from the west (Annals of the Cakchiquels). The Popol Vuh's preamble describes the content of its lost pre-Conquest hieroglyphic original as including “the coming from the other side of the sea and the narration of our obscurity.” The word translated “obscurity” refers to darkness before dawn — the state of the world before creation. In the Jaredite crossing narrative of Ether 6, the defining physical experience of the ocean crossing was sealed darkness: barges “tight like unto a dish,” driven through the deep, the brother of Jared asking for light in the darkness. “The narration of our obscurity” and “the coming from the other side of the sea” are, in Ether 6, the same event.","The Jaredite-as-Olmec model, developed in Chapter Eight, holds that the Jaredite civilization became the Olmec — the documented mother civilization of Mesoamerica, whose iconography, calendar, and religious concepts seeded all subsequent Mesoamerican cultures. If this model is correct, the Jaredite foundational memory — sealed darkness, burial in the sea, emergence into light — would have diffused most broadly of any cultural memory in the hemisphere. The creation-from-darkness theme that pervades Mesoamerican mythology carries the structural signature of the Jaredite ocean crossing mythologized into a universal cosmological frame.","What the downstream memory means: the tradition Moroni was part of did not disappear when the Nephites did. It survived, fragmented and mythologized, in the oral traditions of the peoples who outlasted it and reorganized after Teotihuácan's fall. The K'iche'an documents are not evidence of the Book of Mormon. They are evidence that the cultural memory of what the Book of Mormon describes persisted — in degraded form, through multiple layers of mythologization — in the peoples who outlasted it. That is exactly what the Two Civilizations framework in Chapter Two predicts.","VIII. What the Evidence Permits","This chapter has done something none of the preceding chapters have done. It has told a story. Every other chapter in this book argues forward from the text to the world: the Book of Mormon says X; independent evidence shows X. This chapter argues through narrative: here is the situation; here is what the evidence says about the geography, the archaeology, and the chronology; here is the story that the evidence permits.","Moroni's route is not known. No record of it survives. No archaeology has traced a single step from the Mesoamerican Cumorah to the New York hill. The narrative reconstructed here rests on five categories of evidence, each independently sourced:","1. The Chiapas abandonment data (Sorenson, Mormon's Codex, 2013; citing Lowe and Mason): the proposed Zarahemla was being emptied at approximately 350 AD, 35 years before the final battle. The chaos is documented.","2. Teotihuácan's multicultural peak (Spence 1992; Rattray 1992): the largest city in the hemisphere, with confirmed ethnic barrios, was at peak during Moroni's wandering years. The refuge is documented.","3. The Hopewell corridor (Seeman 1979): the northward route from Mesoamerica to the Great Lakes was a documented trade and travel highway during exactly this period. The path is documented.","4. The sparseness of upstate New York at 400 AD (BIA documentation; Snow 1994): no large settlements, no organized political structures, small Woodland-era bands. The Iroquois Confederacy is seven centuries away. The terminus is documented.","5. The naming of Cumorah (Hoskisson, Interpreter 60:239–252, 2024): the name is not geographic. It is functional and theological. Both hills received the name because both received the same deposit for the same purpose. The naming logic is documented.","None of this was constructed to fit the story. Spence's barrio analysis was published in 1992. Rattray's isotopic skeletal data came from the same era. Lowe's systematic survey of the Chiapas Central Depression was conducted independently. Seeman's Hopewell documentation predates the LDS scholarly discussion of this corridor. The upstate New York population data is standard archaeological record. Hoskisson's etymology derives from Hebrew linguistics with no geographic agenda. The evidence was found in its place. The narrative assembled around it. 8","The plates were found where they were said to be buried. In the hill that bears the name of the hill they came from — a name that means, in Hebrew, “Rise up, O Light of the Lord.” By the man who said he buried them. Fourteen hundred years after he carried them out of a civilization that archaeology has since confirmed was collapsing in exactly the way, and at exactly the time, he said it was.","1 Mormon 6:6; 6:2. | Ether 15:11 [Moroni's editorial note: Hill Ramah = Hill Cumorah]. | Moroni 1:1; Ether 12:29 [Moroni is the abridger of the Book of Ether]. | Hoskisson, P.Y. 2024. “Rise Up, O Light of the Lord: An Appropriate and Defensible Etymology for Cumorah.” Interpreter 60:239–252. | 2 Nephi 8:1.","2 Taylor, J.E. 2002. “Khirbet Qumran in the Nineteenth Century and the Name of the Site.” Palestine Exploration Quarterly 134/2:144–152. [ancient name of Qumran site unknown; not in Dead Sea Scrolls] | Ricks, S.D. and Tvedtnes, J.A. 1997. “The Hebrew Origin of Some Book of Mormon Place Names.” JBMS 6/2:255–259.","5 Spence, M.W. 1992. “Tlailotlacan, a Zapotec Enclave in Teotihuácan.” In Art, Ideology, and the City of Teotihuácan, ed. J.C. Berlo. Washington: Dumbarton Oaks. | Rattray, E.C. 1992. The Teotihuácan Burials and Offerings. Nashville: Vanderbilt University Publications in Anthropology. | 4 Nephi 1:17; 4 Nephi 1:24–26.","6 Bureau of Indian Affairs. 2003. Oneida Nation of New York Conveyance: Draft EIS, Section 3.6. bia.gov/sites/default/files/dup/assets/public/pdf/idc-000256.pdf. [Middle Woodland period, 100 BC–1000 AD; upstate New York small bands] | Snow, D.R. 1994. The Iroquois. Oxford: Blackwell. [Iroquois Confederacy origin ~1100 AD] | Seeman, M.F. 1979. The Hopewell Interaction Sphere. Indiana Historical Society.","7 King, Jason, et al. 2011. “Time and Archaeological Traditions in the Lower Illinois Valley.” American Antiquity 76(3):500–528. [radiocarbon date QL-4904 = 91 AD calibrated] | Farnsworth, K.B. and Atwell, K.A. 2019. Excavations at the Blue Island and Naples-Russell Mounds. Illinois State Archaeological Survey Research Report 34. | Grover, J.D. 2025. A Scientific Evaluation of the Zelph Revelation. Challex Scientific Publishing. | Godfrey, K.W. 1989. “The Zelph Story.” BYU Studies Quarterly 29/2. | 4 Nephi 1:13; Helaman 3:3–16; Alma 63:8.","8 Sachse, F. and Christenson, A.J. 2005. “Tulan and the Other Side of the Sea.” Mesoweb. | Ether 6:3–7 [Jaredite crossing in sealed darkness] | Diehl, R.A. 2004. The Olmecs. Thames & Hudson. | Popol Vuh. Goetz and Morley (trans.). 1954. University of Oklahoma Press. | Hoskisson, P.Y. 2024. Interpreter 60:239–252.","M1–M8 Methodology notes: This chapter presents a narrative reconstruction, not a demonstrated argument. Sections I–II (Cumorah naming, collapse archaeology) are Nephite-sphere textual and Lamanite-sphere geographic. Section III (archival decision) is Nephite-sphere with epi-Olmec corroboration. Section IV (Teotihuacan) is Lamanite-adjacent archaeological. Section V (Hopewell corridor) is Lamanite-adjacent ethnographic. Section VI (Zelph radiocarbon) is Lamanite-adjacent historical, used defensively. Section VII (Kʼicheʼaan memory) is mixed. All evidence is from non-LDS secondary sources postdating 1829."]};

const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw8-gqJ1ui5nODxAKVO-qcnPfozE8OOXnucrwTUFve-NHi4yHc7oLigHsBH53GtdKK0/exec';
const REVIEW_PASSWORD = 'footprints2026';

// ── STATE ────────────────────────────────────────────
let curChapter = null;
let curPara = null;
let commentType = 'General';
let ttsPlaying = false;
let ttsParaIdx = 0;
let ttsSpd = parseFloat(localStorage.getItem('fp_speed') || '1.1');
let ttsUtt = null;
let reviewMode = false;
let revComments = {}; // { chId: { paraIdx: [comment,...] } }
let revReaders = new Set();

// ── READER NAME ──────────────────────────────────────
const nameEl = document.getElementById('reader-name');
nameEl.value = localStorage.getItem('fp_reader') || '';
nameEl.addEventListener('input', () => localStorage.setItem('fp_reader', nameEl.value.trim()));
function getReader() { return nameEl.value.trim() || 'Anonymous'; }

// ── MOBILE SIDEBAR ───────────────────────────────────
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sb-overlay');
  const isOpen = sb.classList.contains('sb-open');
  if (isOpen) { closeSidebar(); } else {
    sb.classList.add('sb-open');
    ov.classList.add('sb-open');
  }
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('sb-open');
  document.getElementById('sb-overlay').classList.remove('sb-open');
}

// ── CHAPTER LIST ─────────────────────────────────────
function buildChapList() {
  const list = document.getElementById('ch-list');
  list.innerHTML = '';
  CHAPTERS.forEach(ch => {
    const cnt = reviewMode ? revChCount(ch.id) : myChCount(ch.id);
    const btn = document.createElement('button');
    btn.className = 'ch-btn' + (ch.id === curChapter ? ' active' : '');
    const rdot = `<span class="ch-read-dot${isChapterRead(ch.id)?' read':''}"></span>`;
    btn.innerHTML = esc(ch.title) + (cnt > 0 ? `<span class="ch-cnt">${cnt}</span>` : '') + rdot;
    btn.onclick = () => loadChapter(ch.id);
    list.appendChild(btn);
  });
}

// ── LOAD CHAPTER ─────────────────────────────────────
function loadChapter(chId) {
  ttsStop();
  sessionPaused = false;
  closePanel();
  curChapter = chId;
  const ch = CHAPTERS.find(c => c.id === chId);
  document.getElementById('ch-title').textContent = ch.title;
  const paras = BOOK[chId];
  const container = document.getElementById('paras');
  container.innerHTML = '';
  paras.forEach((text, idx) => {
    const wrap = document.createElement('div');
    wrap.className = 'para-wrap';
    wrap.dataset.idx = idx;
    if (reviewMode) {
      const p = document.createElement('div');
      p.className = 'para-text';
      p.textContent = text;
      wrap.appendChild(p);
      const comments = (revComments[chId] && revComments[chId][idx]) || [];
      if (comments.length) {
        p.classList.add('has-comment');
        const sorted = [...comments].sort((a,b) => a.reader.localeCompare(b.reader)||a.timestamp-b.timestamp);
        sorted.forEach(c => {
          const d = document.createElement('div');
          d.className = 'rev-comment';
          d.innerHTML = `<div class="rev-meta"><span class="rev-reader">${esc(c.reader)}</span><span class="rev-type">${esc(c.type)}</span><span>${new Date(c.timestamp).toLocaleDateString()}</span></div><div class="rev-text">${esc(c.text)}</div>`;
          wrap.appendChild(d);
        });
      }
    } else {
      const cnt = myParaCount(chId, idx);
      const displayText = convertSectionHeadings(text);
      const isHeading = isSectionHeading(text);
      const p = document.createElement('div');
      p.className = 'para-text' + (cnt > 0 ? ' has-comment' : '') + (isHeading ? ' section-heading' : '');
      p.textContent = displayText;
      p.onclick = () => openPanel(idx);
      wrap.appendChild(p);
      if (cnt > 0) {
        const mk = document.createElement('div');
        mk.className = 'cmk';
        mk.textContent = cnt;
        mk.onclick = () => openPanel(idx);
        wrap.appendChild(mk);
      }
    }
    container.appendChild(wrap);
  });
  restoreScrollPos(chId);
  document.querySelectorAll('.ch-btn').forEach((b,i) => b.classList.toggle('active', CHAPTERS[i].id === chId));
  closeSidebar();
  // Save last chapter
  localStorage.setItem('fp_lastch_' + getReader(), chId);
  markChapterRead(chId);
}

// ── PROGRESS ─────────────────────────────────────────
function updateProgress() {
  const el = document.getElementById('reader');
  const pct = el.scrollHeight > el.clientHeight
    ? (el.scrollTop / (el.scrollHeight - el.clientHeight)) * 100 : 0;
  document.getElementById('prog-fill').style.width = Math.min(100,pct) + '%';
  saveScrollPos();
}

// ── COMMENTS (localStorage) ──────────────────────────
function cKey(reader, chId, paraIdx, ts) { return `fp_c_${reader}_${chId}_${paraIdx}_${ts}`; }
function allMyComments() {
  const out = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith('fp_c_')) {
      try { out.push({ key: k, ...JSON.parse(localStorage.getItem(k)) }); } catch(e) {}
    }
  }
  return out;
}
function myParaComments(chId, idx) {
  return allMyComments().filter(c => c.chapterId===chId && c.paraIdx===idx)
    .sort((a,b) => a.timestamp-b.timestamp);
}
function myParaCount(chId, idx) { return myParaComments(chId,idx).length; }
function myChCount(chId) { return allMyComments().filter(c => c.chapterId===chId).length; }

// ── PANEL ────────────────────────────────────────────
function openPanel(idx) {
  if (!curChapter) return;
  curPara = idx;
  const text = BOOK[curChapter][idx];
  document.getElementById('cp-preview').textContent = text;
  document.getElementById('cp-text').value = '';
  renderPanelComments();
  document.getElementById('cpanel').classList.add('open');
}
function closePanel() {
  document.getElementById('cpanel').classList.remove('open');
  curPara = null;
}
function renderPanelComments() {
  const list = document.getElementById('cp-list');
  const comments = myParaComments(curChapter, curPara);

// ── TTS ──────────────────────────────────────────────
function getBestVoice() {
  const voices = window.speechSynthesis.getVoices();
  // Prefer high-quality natural voices in priority order
  const preferred = [
    'Samantha','Karen','Daniel','Moira','Rishi', // Apple
    'Google UK English Female','Google US English', // Chrome
    'Microsoft Aria Online','Microsoft Jenny Online','Microsoft Guy Online', // Edge
    'Alex','Victoria','Tom', // macOS
  ];
  for (const name of preferred) {
    const v = voices.find(v => v.name.includes(name));
    if (v) return v;
  }
  // Fall back to first English voice
  return voices.find(v => v.lang.startsWith('en')) || voices[0] || null;
}

let sessionPaused = false; // true if paused within this session

function ttsToggle() {
  if (ttsPlaying) { ttsPause(); return; }
  // If paused in this session, just resume from current position
  if (sessionPaused) {
    sessionPaused = false;
    ttsPlay();
    return;
  }
  // New session — check for saved position
  const savedPara = getSavedTtsPara();
  if (savedPara > 0) {
    showResumeModal();
  } else {
    ttsParaIdx = getVisibleParaIdx();
    ttsPlay();
  }
}
function ttsPlay() {
  if (!curChapter) { toast('Select a chapter first.'); return; }
  if (!window.speechSynthesis) { toast('Text-to-speech not supported in this browser.'); return; }
  ttsPlaying = true;
  requestWakeLock();
  document.getElementById('tts-btn').textContent = '⏸ Pause';
  document.getElementById('tts-stop-btn').style.display = 'inline-block';
  ttsReadPara(ttsParaIdx);
}
function ttsPause() {
  saveTtsPos();
  ttsPlaying = false;
  sessionPaused = true;
  releaseWakeLock();
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  document.getElementById('tts-btn').textContent = '▶ Resume';
  document.getElementById('tts-status').textContent = 'Paused';
  document.querySelectorAll('.para-text').forEach(p => p.classList.remove('tts-active'));
}
function ttsStop() {
  saveTtsPos();
  ttsPlaying = false; ttsParaIdx = 0;
  releaseWakeLock();
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  document.getElementById('tts-btn').textContent = '▶ Read Aloud';
  document.getElementById('tts-stop-btn').style.display = 'none';
  document.getElementById('tts-status').textContent = '';
  document.querySelectorAll('.para-text').forEach(p => p.classList.remove('tts-active'));
  updateTtsProgress();
}
function ttsReadPara(idx) {
  if (!ttsPlaying || !curChapter) return;
  const paras = BOOK[curChapter];
  if (idx >= paras.length) { ttsStop(); return; }
  ttsParaIdx = idx;
  document.querySelectorAll('.para-text').forEach((p,i) => p.classList.toggle('tts-active', i===idx));
  const wrap = document.querySelector(`.para-wrap[data-idx="${idx}"]`);
  if (wrap) {
    // Smooth scroll keeping active paragraph centered in view
    wrap.scrollIntoView({ behavior:'smooth', block:'nearest' });
    // If paragraph is near top or bottom, center it
    const rect = wrap.getBoundingClientRect();
    const reader = document.getElementById('reader');
    const rRect = reader.getBoundingClientRect();
    if (rect.top < rRect.top + 80 || rect.bottom > rRect.bottom - 80) {
      wrap.scrollIntoView({ behavior:'smooth', block:'center' });
    }
  }
  document.getElementById('tts-status').textContent = `¶ ${idx+1} / ${paras.length}`;
  // Wait for voices to load
  const go = () => {
    const cleanText = preprocessForTTS(paras[idx]);
    ttsUtt = new SpeechSynthesisUtterance(cleanText);
    ttsUtt.rate = ttsSpd;
    if (selectedVoice) ttsUtt.voice = selectedVoice;
    else { const v = getBestVoice(); if (v) ttsUtt.voice = v; }
    ttsUtt.onend = () => { if (ttsPlaying) ttsReadPara(idx+1); };
    ttsUtt.onerror = () => { if (ttsPlaying) ttsReadPara(idx+1); };
    window.speechSynthesis.speak(ttsUtt);
    updateTtsProgress();
  };
  if (window.speechSynthesis.getVoices().length) { go(); }
  else { window.speechSynthesis.onvoiceschanged = go; }
}
function ttsSpeedChange(v) {
  ttsSpd = parseFloat(v);
  localStorage.setItem('fp_speed', v);
  document.getElementById('tts-spd-lbl').textContent = ttsSpd.toFixed(1) + '×';
}

// ── ROMAN NUMERAL CONVERSION ──────────────────────────
const romanMap = {
  'I':1,'V':5,'X':10,'L':50,'C':100,'D':500,'M':1000
};
function romanToArabic(s) {
  let result = 0, prev = 0;
  for (let i = s.length - 1; i >= 0; i--) {
    const val = romanMap[s[i]];
    if (!val) return null;
    if (val < prev) result -= val; else result += val;
    prev = val;
  }
  return result;
}
function convertSectionHeadings(text) {
  // Match patterns like "XIV. " or "I. " at start of paragraph
  return text.replace(/^([IVXLCDM]+)\.\s+/, (match, roman) => {
    const num = romanToArabic(roman);
    return num ? num + '. ' : match;
  });
}
function isSectionHeading(text) {
  return /^([IVXLCDM]+)\.\s+[A-Z]/.test(text) ||
         /^\d+\.\s+[A-Z]/.test(text);
}

// ── MIDDLE INITIAL FIX ────────────────────────────────
function preprocessForTTS(text) {
  // Remove periods after single capital letters (middle initials, abbreviations)
  // "J. Smith" -> "J Smith", "Dr. Jones" -> "Dr Jones"  
  return text
    .replace(/([A-Z])\.\s/g, '$1 ')   // single capital + period + space
    .replace(/(Dr|Mr|Mrs|Ms|Prof|St|vs|etc|Vol|No|Ch|pp)\.\s/g, '$1 '); // common abbreviations
}

// ── VOICE SELECTOR ────────────────────────────────────
let selectedVoice = null;
let voicesLoaded = false;

// Priority lists for male and female voices
const FEMALE_VOICES = [
  'Microsoft Aria Online','Microsoft Jenny Online','Samantha','Karen',
  'Google UK English Female','Moira','Victoria','Tessa',
  'Microsoft Zira','Google US English Female'
];
const MALE_VOICES = [
  'Microsoft Guy Online','Microsoft Davis Online','Daniel','Alex',
  'Google UK English Male','Tom','Microsoft David',
  'Google US English Male','Rishi'
];

function pickTopVoices(voices) {
  const female = [], male = [];
  // Try priority lists first
  for (const name of FEMALE_VOICES) {
    const v = voices.find(v => v.name.includes(name));
    if (v && female.length < 2 && !female.includes(v)) female.push(v);
  }
  for (const name of MALE_VOICES) {
    const v = voices.find(v => v.name.includes(name));
    if (v && male.length < 2 && !male.includes(v)) male.push(v);
  }
  // Fill gaps with any English voices
  const english = voices.filter(v => v.lang.startsWith('en'));
  for (const v of english) {
    if (female.length < 2 && !female.includes(v) && !male.includes(v)) female.push(v);
    if (male.length < 2 && !male.includes(v) && !female.includes(v)) male.push(v);
    if (female.length >= 2 && male.length >= 2) break;
  }
  return { female, male };
}

function buildVoiceSelector() {
  const voices = window.speechSynthesis.getVoices();
  if (!voices.length) return;
  voicesLoaded = true;
  const { female, male } = pickTopVoices(voices);
  const sel = document.getElementById('voice-select');
  sel.innerHTML = '';

  if (female.length) {
    const og = document.createElement('optgroup');
    og.label = 'Female';
    female.forEach(v => {
      const opt = document.createElement('option');
      opt.value = v.name;
      // Shorten name for display
      opt.textContent = v.name.replace('Microsoft ','').replace(' Online','').replace('Google ','');
      og.appendChild(opt);
    });
    sel.appendChild(og);
  }
  if (male.length) {
    const og = document.createElement('optgroup');
    og.label = 'Male';
    male.forEach(v => {
      const opt = document.createElement('option');
      opt.value = v.name;
      opt.textContent = v.name.replace('Microsoft ','').replace(' Online','').replace('Google ','');
      og.appendChild(opt);
    });
    sel.appendChild(og);
  }

  // Restore saved preference
  const saved = localStorage.getItem('fp_voice');
  if (saved) {
    const match = voices.find(v => v.name === saved);
    if (match) { sel.value = saved; selectedVoice = match; return; }
  }
  // Default: first female voice if available
  const allShown = [...female, ...male];
  if (allShown.length) { selectedVoice = allShown[0]; sel.value = allShown[0].name; }
}

function ttsVoiceChange(name) {
  const voices = window.speechSynthesis.getVoices();
  selectedVoice = voices.find(v => v.name === name) || null;

// ── TTS PROGRESS BAR ─────────────────────────────────
function updateTtsProgress() {
  if (!curChapter) return;
  const total = BOOK[curChapter].length;
  const pct = total > 0 ? (ttsParaIdx / total) * 100 : 0;
  const fill = document.getElementById('tts-progress-fill');
  const label = document.getElementById('tts-progress-label');
  if (fill) fill.style.width = Math.min(100, pct) + '%';
  if (label) label.textContent = `¶ ${ttsParaIdx + 1} / ${total}`;
}

function ttsSeek(e) {
  if (!curChapter) return;
  const bar = document.getElementById('tts-progress-bar');
  const rect = bar.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  const total = BOOK[curChapter].length;
  const targetIdx = Math.floor(pct * total);
  const wasPlaying = ttsPlaying;
  if (ttsPlaying) { ttsPlaying = false; window.speechSynthesis.cancel(); }
  ttsParaIdx = targetIdx;
  updateTtsProgress();
  if (wasPlaying) { ttsPlaying = true; ttsReadPara(ttsParaIdx); }
  else {
    // Scroll to paragraph
    const wrap = document.querySelector(`.para-wrap[data-idx="${targetIdx}"]`);
    if (wrap) {
    // Smooth scroll keeping active paragraph centered in view
    wrap.scrollIntoView({ behavior:'smooth', block:'nearest' });
    // If paragraph is near top or bottom, center it
    const rect = wrap.getBoundingClientRect();
    const reader = document.getElementById('reader');
    const rRect = reader.getBoundingClientRect();
    if (rect.top < rRect.top + 80 || rect.bottom > rRect.bottom - 80) {
      wrap.scrollIntoView({ behavior:'smooth', block:'center' });
    }
  }
  }
}

// Paragraph currently visible in center of viewport
function getVisibleParaIdx() {
  const reader = document.getElementById('reader');
  const readerTop = reader.getBoundingClientRect().top;
  const readerMid = readerTop + reader.clientHeight / 2;
  const wraps = document.querySelectorAll('.para-wrap');
  let closest = 0;
  let closestDist = Infinity;
  wraps.forEach(w => {
    const rect = w.getBoundingClientRect();
    const dist = Math.abs(rect.top + rect.height/2 - readerMid);
    if (dist < closestDist) { closestDist = dist; closest = parseInt(w.dataset.idx); }
  });
  return closest;
}

// ── SWIPE CHAPTER NAVIGATION ─────────────────────────
let swipeStartX = 0, swipeStartY = 0;
const readerEl = document.getElementById('reader');

readerEl.addEventListener('touchstart', e => {
  swipeStartX = e.touches[0].clientX;
  swipeStartY = e.touches[0].clientY;
}, { passive: true });

readerEl.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - swipeStartX;
  const dy = e.changedTouches[0].clientY - swipeStartY;
  // Only trigger if horizontal swipe > 80px and more horizontal than vertical
  if (Math.abs(dx) > 80 && Math.abs(dx) > Math.abs(dy) * 2) {
    const curIdx = CHAPTERS.findIndex(c => c.id === curChapter);
    if (dx < 0 && curIdx < CHAPTERS.length - 1) {
      // Swipe left = next chapter
      loadChapter(CHAPTERS[curIdx + 1].id);
      toast('Next: ' + CHAPTERS[curIdx + 1].title);
    } else if (dx > 0 && curIdx > 0) {
      // Swipe right = previous chapter
      loadChapter(CHAPTERS[curIdx - 1].id);
      toast('Previous: ' + CHAPTERS[curIdx - 1].title);
    }
  }
}, { passive: true });

// ── INIT ─────────────────────────────────────────────
window.addEventListener('pagehide', saveTtsPos);
window.addEventListener('beforeunload', saveTtsPos);
// Build voice selector when voices are ready
// Restore saved speed
const savedSpd = localStorage.getItem('fp_speed');
if (savedSpd) {
  ttsSpd = parseFloat(savedSpd);
  const spdSlider = document.getElementById('tts-speed');
  const spdLbl = document.getElementById('tts-spd-lbl');
  if (spdSlider) spdSlider.value = ttsSpd;
  if (spdLbl) spdLbl.textContent = ttsSpd.toFixed(1) + '×';
}
if (window.speechSynthesis) {
  if (window.speechSynthesis.getVoices().length) {
    buildVoiceSelector();
  } else {
    window.speechSynthesis.onvoiceschanged = buildVoiceSelector;
  }
}
buildChapList();
const lastCh = localStorage.getItem('fp_lastch_' + (localStorage.getItem('fp_reader')||''));
loadChapter(lastCh && CHAPTERS.find(c=>c.id===lastCh) ? lastCh : CHAPTERS[0].id);
</script>
</body>
</html>
