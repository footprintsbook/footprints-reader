<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FOOTPRINTS — Beta Reader</title>
<style>
:root{
  --navy:#1E3A5F; --navy2:#2a4f7f; --ink:#1a1a1a; --muted:#5a5955;
  --hairline:#d0cec8; --paper:#FAFAF7; --cream:#F3F2EE; --gold:#B89060;
  --sw:300px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:Georgia,'Times New Roman',serif;background:var(--paper);color:var(--ink);display:flex;height:100vh;}

/* ── SIDEBAR ── */
#sidebar{
  width:var(--sw);min-width:var(--sw);
  background:var(--navy);color:#fff;
  display:flex;flex-direction:column;
  height:100vh;overflow:hidden;
  position:relative;z-index:10;
  flex-shrink:0;
}
#sb-head{padding:18px 16px 12px 20px;border-bottom:1px solid rgba(255,255,255,.12);}
#sb-head h1{font-family:Arial,sans-serif;font-size:12px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:2px;}
#sb-head p{font-size:11px;color:rgba(255,255,255,.5);font-family:Arial,sans-serif;}
#sb-setup{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.12);}
#sb-setup label{font-family:Arial,sans-serif;font-size:10px;color:rgba(255,255,255,.55);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.08em;}
#reader-name{width:100%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:7px 10px;border-radius:4px;font-family:Arial,sans-serif;font-size:13px;}
#reader-name::placeholder{color:rgba(255,255,255,.3);}
#ch-list{flex:1;overflow-y:auto;padding:6px 0;}
.ch-btn{display:block;width:100%;text-align:left;background:none;border:none;color:rgba(255,255,255,.7);padding:9px 16px;font-family:Arial,sans-serif;font-size:12px;cursor:pointer;line-height:1.3;transition:background .12s,color .12s;}
.ch-btn:hover{background:rgba(255,255,255,.08);color:#fff;}
.ch-btn.active{background:rgba(255,255,255,.14);color:#fff;font-weight:700;}
.ch-cnt{float:right;background:var(--gold);color:var(--navy);border-radius:10px;font-size:10px;font-weight:900;padding:1px 6px;font-family:Arial,sans-serif;}
.ch-read-dot{float:right;width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.2);margin:5px 4px 0 0;}
.ch-read-dot.read{background:var(--gold);}
#sb-foot{padding:12px 16px;border-top:1px solid rgba(255,255,255,.12);display:flex;flex-direction:column;gap:7px;}
.sb-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:#fff;padding:7px 10px;border-radius:4px;font-family:Arial,sans-serif;font-size:12px;cursor:pointer;text-align:center;transition:background .12s;}
.sb-btn:hover{background:rgba(255,255,255,.2);}
.sb-btn.send{background:rgba(184,144,96,.25);border-color:rgba(184,144,96,.5);font-weight:900;}
.sb-btn.danger{color:rgba(255,180,180,.85);border-color:rgba(255,80,80,.3);}
.sb-btn.review-btn{color:rgba(255,255,255,.6);border-color:rgba(255,255,255,.2);font-size:13px;font-weight:700;}
.sb-btn:disabled{opacity:.5;cursor:default;}

/* ── MAIN ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

/* TTS bar */
#tts-bar{background:var(--cream);border-bottom:1px solid var(--hairline);padding:6px 12px 4px;display:flex;flex-direction:column;gap:4px;flex-shrink:0;}
#tts-row1{display:flex;align-items:center;gap:8px;flex-wrap:nowrap;overflow:hidden;}
#tts-row2{display:flex;align-items:center;gap:0;width:100%;}
#tts-progress-wrap{flex:1;display:flex;flex-direction:column;gap:2px;width:100%;}
#tts-progress-bar{height:8px;background:var(--hairline);border-radius:4px;cursor:pointer;position:relative;width:100%;}
#tts-progress-fill{height:100%;background:var(--gold);border-radius:4px;width:0%;transition:width .3s;}
#tts-progress-label{font-family:Arial,sans-serif;font-size:10px;color:var(--muted);}
#voice-select{font-family:Arial,sans-serif;font-size:11px;color:var(--muted);background:transparent;border:1px solid var(--hairline);border-radius:4px;padding:3px 6px;cursor:pointer;max-width:130px;flex-shrink:0;}
#tts-speed-wrap{display:flex;align-items:center;gap:4px;font-family:Arial,sans-serif;font-size:11px;color:var(--muted);flex-shrink:0;}
#tts-speed{width:65px;}
#tts-bar button{background:var(--navy);color:#fff;border:none;border-radius:4px;padding:6px 14px;font-family:Arial,sans-serif;font-size:12px;font-weight:700;cursor:pointer;}
#tts-bar button:hover{background:var(--navy2);}
#tts-bar button.stop{background:#922;}
#tts-speed-wrap{display:flex;align-items:center;gap:5px;font-family:Arial,sans-serif;font-size:12px;color:var(--muted);}
#tts-speed{width:80px;}
#tts-status{font-family:Arial,sans-serif;font-size:11px;color:var(--muted);font-style:italic;margin-left:auto;}

/* Review bar */
#rev-bar{display:none;background:#111;color:#fff;padding:10px 24px;align-items:center;gap:12px;flex-shrink:0;flex-wrap:wrap;}
#rev-bar strong{color:var(--gold);font-family:Arial,sans-serif;font-size:13px;}
.rev-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.22);color:#fff;padding:5px 12px;border-radius:4px;font-family:Arial,sans-serif;font-size:12px;cursor:pointer;}
.rev-btn:hover{background:rgba(255,255,255,.25);}
.rev-btn.exit{border-color:rgba(255,180,180,.4);color:rgba(255,200,200,.9);}
#rev-stats{margin-left:auto;font-family:Arial,sans-serif;font-size:12px;color:rgba(255,255,255,.5);}

/* Reader */
#reader{flex:1;overflow-y:auto;padding:0 10% 44px;scroll-behavior:smooth;}
/* Persistent visible scrollbar */
#reader::-webkit-scrollbar{width:6px;}
#reader::-webkit-scrollbar-track{background:var(--hairline);border-radius:3px;}
#reader::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px;opacity:.7;}
#reader::-webkit-scrollbar-thumb:hover{background:var(--navy);}
@media(max-width:800px){#reader{padding:28px 5%;}}
#ch-title{font-family:Arial,sans-serif;font-weight:900;font-size:24px;color:var(--navy);margin-bottom:32px;padding-bottom:14px;border-bottom:2px solid var(--hairline);line-height:1.2;position:sticky;top:0;background:var(--paper);z-index:40;padding-top:8px;margin-top:0;box-shadow:0 2px 8px rgba(250,250,247,.95);}
.para-wrap{position:relative;}
.para-text{font-size:17px;line-height:1.78;color:var(--ink);padding:8px 40px 8px 12px;border-left:3px solid transparent;cursor:pointer;border-radius:2px;transition:background .12s,border-color .12s;}
.para-text.section-heading{font-family:Arial,sans-serif;font-weight:900;font-size:15px;color:var(--navy);border-left-color:var(--hairline);margin-top:12px;letter-spacing:.01em;}
.para-text:hover{background:rgba(30,58,95,.04);border-left-color:rgba(30,58,95,.25);}
.para-text.tts-active{background:rgba(184,144,96,.13);border-left-color:var(--gold);}
.para-text.has-comment{border-left-color:var(--gold);}
.cmk{position:absolute;right:0;top:10px;background:var(--gold);color:var(--navy);font-family:Arial,sans-serif;font-size:10px;font-weight:900;border-radius:10px;padding:2px 7px;cursor:pointer;}

/* Review comments inline */
.rev-comment{background:#fff8ee;border-left:3px solid var(--gold);border-radius:0 4px 4px 0;padding:8px 12px;margin:3px 0 3px 12px;}
.rev-meta{font-family:Arial,sans-serif;font-size:11px;color:var(--muted);margin-bottom:3px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.rev-reader{font-weight:700;color:var(--navy);}
.rev-type{background:var(--navy);color:#fff;border-radius:3px;padding:1px 5px;font-size:10px;font-weight:700;font-family:Arial,sans-serif;}
.rev-text{font-size:14px;line-height:1.5;color:var(--ink);}

/* Progress */
#prog{position:fixed;top:0;left:var(--sw);right:0;height:3px;background:var(--hairline);z-index:50;pointer-events:none;}
#prog-fill{height:100%;background:var(--gold);width:0%;transition:width .1s;}

/* Comment panel */
#cpanel{position:fixed;right:0;top:0;bottom:0;width:360px;max-width:90vw;background:#fff;box-shadow:-3px 0 20px rgba(0,0,0,.1);transform:translateX(100%);transition:transform .22s;display:flex;flex-direction:column;z-index:200;}
#cpanel.open{transform:translateX(0);}
#cp-head{background:var(--navy);color:#fff;padding:14px 16px;display:flex;gap:10px;align-items:flex-start;}
#cp-head-txt{flex:1;}
#cp-head h3{font-family:Arial,sans-serif;font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;color:var(--gold);margin-bottom:3px;}
#cp-preview{font-size:12px;color:rgba(255,255,255,.6);font-style:italic;line-height:1.4;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
#cp-close{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;font-size:18px;cursor:pointer;padding:6px 12px;line-height:1;flex-shrink:0;border-radius:4px;font-family:Arial,sans-serif;font-weight:700;}
#cp-close:hover{background:rgba(255,255,255,.28);}
#cp-list{flex:1;overflow-y:auto;padding:14px;}
.cp-item{background:var(--cream);border-radius:5px;padding:11px 13px;margin-bottom:9px;border-left:3px solid var(--gold);}
.cp-delete{display:block;margin-top:8px;background:none;border:1px solid #ddd;color:#aaa;font-size:12px;cursor:pointer;padding:4px 10px;border-radius:3px;font-family:Arial,sans-serif;}
.cp-delete:hover{background:rgba(180,0,0,.08);color:#922;border-color:#f99;}
.cp-meta{font-family:Arial,sans-serif;font-size:11px;color:var(--muted);margin-bottom:5px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px;}
.cp-reader{font-weight:700;color:var(--navy);}
.cp-type{background:var(--navy);color:#fff;border-radius:3px;padding:1px 5px;font-size:10px;font-weight:700;}
.cp-body{font-size:14px;line-height:1.5;}
.cp-empty{text-align:center;color:var(--muted);font-family:Arial,sans-serif;font-size:13px;margin-top:20px;font-style:italic;}
#cp-new{border-top:1px solid var(--hairline);padding:12px 14px;background:var(--paper);}
#cp-types{display:flex;gap:5px;margin-bottom:9px;flex-wrap:wrap;}
.type-btn{background:var(--cream);border:1px solid var(--hairline);color:var(--muted);padding:4px 9px;border-radius:4px;font-family:Arial,sans-serif;font-size:11px;font-weight:700;cursor:pointer;}
.type-btn.sel{background:var(--navy);border-color:var(--navy);color:#fff;}
#cp-text{width:100%;border:1px solid var(--hairline);border-radius:4px;padding:9px 11px;font-family:Georgia,serif;font-size:14px;line-height:1.5;resize:vertical;min-height:72px;background:#fff;color:var(--ink);margin-bottom:9px;}
#cp-text:focus{outline:none;border-color:var(--navy);}
#cp-submit{width:100%;background:var(--navy);color:#fff;border:none;border-radius:4px;padding:9px;font-family:Arial,sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
#cp-submit:hover{background:var(--navy2);}

/* Mobile */
#mob-toggle{display:none;position:fixed;top:10px;left:10px;z-index:300;background:var(--navy);color:#fff;border:none;border-radius:5px;width:38px;height:38px;font-size:18px;cursor:pointer;align-items:center;justify-content:center;}
#sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9;}

/* Toast */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--navy);color:#fff;padding:9px 18px;border-radius:5px;font-family:Arial,sans-serif;font-size:13px;opacity:0;transition:all .25s;z-index:999;white-space:nowrap;pointer-events:none;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Password modal */
#pw-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;align-items:center;justify-content:center;}
#pw-modal.open{display:flex;}
#pw-box{background:#fff;border-radius:8px;padding:28px 28px 24px;width:320px;max-width:90vw;font-family:Arial,sans-serif;}
#pw-box h3{color:var(--navy);font-size:16px;font-weight:900;margin-bottom:8px;}
#pw-box p{font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.5;}
#pw-input{width:100%;border:1px solid var(--hairline);border-radius:4px;padding:9px 11px;font-family:Arial,sans-serif;font-size:14px;margin-bottom:10px;}
#pw-input:focus{outline:none;border-color:var(--navy);}
#pw-err{font-size:12px;color:#922;margin-bottom:10px;display:none;}
#pw-btns{display:flex;gap:8px;}
#pw-ok{flex:1;background:var(--navy);color:#fff;border:none;border-radius:4px;padding:9px;font-family:Arial,sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
#pw-cancel{background:var(--cream);border:1px solid var(--hairline);color:var(--muted);border-radius:4px;padding:9px 14px;font-family:Arial,sans-serif;font-size:13px;cursor:pointer;}

@media(max-width:700px){
  /* Body becomes block so fixed sidebar doesn't steal flex space */
  body{display:block;overflow:hidden;}
  /* Sidebar: fixed overlay, starts off-screen left */
  #sidebar{
    position:fixed;left:0;top:0;
    width:85vw;max-width:320px;
    height:100vh;height:100dvh;
    transform:translateX(-100%);
    transition:transform .28s ease;
    z-index:1000;
    min-width:unset;
    display:flex;flex-direction:column;
    overflow:hidden;
  }
  #sidebar.sb-open{transform:translateX(0);}
  /* Main fills full viewport */
  #main{
    position:fixed;left:0;top:0;right:0;bottom:0;
    display:flex;flex-direction:column;
    overflow:hidden;
    z-index:1;
  }
  /* Overlay sits above main but below sidebar */
  #sb-overlay{
    display:block;
    position:fixed;inset:0;
    background:rgba(0,0,0,.45);
    z-index:999;
    opacity:0;pointer-events:none;
    transition:opacity .28s;
  }
  #sb-overlay.sb-open{opacity:1;pointer-events:auto;}
  /* Hamburger */
  #mob-toggle{display:flex;z-index:1001;}
  /* Progress bar full width */
  #prog{left:0;}
  /* Reader padding to clear hamburger */
  #reader{padding:0 5% 24px;}
  /* TTS bar compact */
  #tts-bar{padding:6px 8px 4px;gap:3px;}
  #tts-row1{padding-left:46px;gap:6px;}
  #tts-row2{padding-left:46px;}
  #tts-status{display:none;}
  #voice-select{max-width:85px;font-size:10px;}
  #tts-speed{width:55px;}
  /* Comment panel full width */
  #cpanel{width:100vw;max-width:100vw;}
}
</style>
</head>
<body>

<button id="mob-toggle" aria-label="Menu" onclick="toggleSidebar()">☰</button>
<div id="sb-overlay" onclick="closeSidebar()"></div>

<nav id="sidebar">
  <div id="sb-head">
    <h1>Footprints</h1>
    <p>Beta Reader Edition</p>
  </div>
  <div id="sb-setup">
    <label for="reader-name">Your name</label>
    <input id="reader-name" type="text" placeholder="Enter your name to begin" autocomplete="name">
  </div>
  <div id="ch-list"></div>
  <div id="sb-foot">
    <button class="sb-btn send" id="send-btn" onclick="sendToDrive()">⬆ Send Comments to Adam</button>
    <button class="sb-btn" onclick="downloadBackup()">Download Backup</button>
    <button class="sb-btn" onclick="document.getElementById('import-inp').click()">Import Backup Comments</button>
    <input type="file" id="import-inp" accept=".json" style="display:none" onchange="importComments(event)">
    <button class="sb-btn danger" onclick="clearMine()">Clear My Comments</button>
    <button class="sb-btn review-btn" onclick="promptReview()">Author Review Mode</button>
  </div>
</nav>

<div id="main">
  <div id="tts-bar">
    <div id="tts-row1">
      <button id="tts-btn" onclick="ttsToggle()">▶ Read Aloud</button>
      <button id="tts-stop-btn" style="display:none" class="stop" onclick="ttsStop()">■ Stop</button>
      <select id="voice-select" onchange="ttsVoiceChange(this.value)" title="Select voice"></select>
      <div id="tts-speed-wrap">Speed <input type="range" id="tts-speed" min="0.5" max="2" step="0.1" value="1.1" oninput="ttsSpeedChange(this.value)"><span id="tts-spd-lbl">1.1×</span></div>
      <span id="tts-status"></span>
    </div>
    <div id="tts-row2">
      <div id="tts-progress-wrap">
        <div id="tts-progress-bar" onclick="ttsSeek(event)" title="Click to jump to position">
          <div id="tts-progress-fill"></div>
        </div>
        <div id="tts-progress-label">¶ 0 / 0</div>
      </div>
    </div>
  </div>
  <div id="rev-bar">
    <strong>Author Review</strong>
    <button class="rev-btn" onclick="document.getElementById('rev-import').click()">+ Import Files</button>
    <input type="file" id="rev-import" accept=".json" multiple style="display:none" onchange="revImport(event)">
    <button class="rev-btn" onclick="revClear()">Clear All</button>
    <button class="rev-btn exit" onclick="exitReview()">Exit Review</button>
    <span id="rev-stats"></span>
  </div>
  <div id="reader" onscroll="updateProgress()">
    <div id="ch-title">Select a chapter to begin reading</div>
    <div id="paras"></div>
  </div>
</div>

<div id="prog"><div id="prog-fill"></div></div>

<div id="cpanel">
  <div id="cp-head">
    <div id="cp-head-txt">
      <h3>Add a Comment</h3>
      <div id="cp-preview"></div>
    </div>
    <button id="cp-close" onclick="closePanel()">✕ Close</button>
  </div>
  <div id="cp-list"></div>
  <div id="cp-new">
    <div id="cp-types">
      <button class="type-btn sel" data-t="General" onclick="pickType(this)">General</button>
      <button class="type-btn" data-t="Lost me here" onclick="pickType(this)">Lost me here</button>
      <button class="type-btn" data-t="Overclaiming?" onclick="pickType(this)">Overclaiming?</button>
      <button class="type-btn" data-t="Strong ✓" onclick="pickType(this)">Strong ✓</button>
      <button class="type-btn" data-t="Question" onclick="pickType(this)">Question</button>
      <button class="type-btn" data-t="Edit" onclick="pickType(this)">Edit</button>
    </div>
    <textarea id="cp-text" placeholder="Your comment on this paragraph…"></textarea>
    <button id="cp-submit" onclick="submitComment()">Save Comment</button>
  </div>
</div>


<div id="pw-modal">
  <div id="pw-box">
    <h3>Author Review Mode</h3>
    <p>This mode is for Adam Port only. Enter the password to continue.</p>
    <input id="pw-input" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')pwOk()">
    <div id="pw-err">Incorrect password.</div>
    <div id="pw-btns">
      <button id="pw-cancel" onclick="closePwModal()">Cancel</button>
      <button id="pw-ok" onclick="pwOk()">Enter</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- TTS Resume Modal -->
<div id="resume-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:600;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:10px;padding:24px 22px;width:320px;max-width:90vw;font-family:Arial,sans-serif;">
    <div style="font-weight:900;color:#1E3A5F;font-size:15px;margin-bottom:6px;">Resume Reading?</div>
    <div id="resume-desc" style="font-size:13px;color:#5a5955;margin-bottom:18px;line-height:1.5;"></div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <button onclick="resumeChoice('current')" style="background:#1E3A5F;color:#fff;border:none;border-radius:5px;padding:10px 14px;font-family:Arial,sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-align:left;">▶ Start from where I'm currently reading</button>
      <button onclick="resumeChoice('saved')" id="resume-saved-btn" style="background:#F3F2EE;color:#1E3A5F;border:1px solid #d0cec8;border-radius:5px;padding:10px 14px;font-family:Arial,sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-align:left;"></button>
      <button onclick="resumeChoice('start')" style="background:#F3F2EE;color:#5a5955;border:1px solid #d0cec8;border-radius:5px;padding:10px 14px;font-family:Arial,sans-serif;font-size:13px;cursor:pointer;text-align:left;">↩ Start from the beginning of this chapter</button>
    </div>
    <button onclick="closeResumeModal()" style="margin-top:12px;width:100%;background:none;border:none;color:#9a9891;font-family:Arial,sans-serif;font-size:12px;cursor:pointer;">Cancel</button>
  </div>
</div>

<script>
const BOOK={"prologue":["“Carter realized that the entire floor of the Valley of the Kings had been methodically excavated — except the area of their own base camp. Within a few days of digging there, they found the first steps leading down to the tomb.”","— Elder Dale G. Renlund, “Jesus Christ Is the Treasure,” October 2023 General Conference","On February 12, 2014, at 5:38 in the morning, the floor of the National Corvette Museum in Bowling Green, Kentucky opened up. The Skydome — the museum's signature exhibit space — collapsed into a hole 40 feet wide, 60 feet long, and 30 feet deep. Eight rare Corvettes fell in. When the engineers arrived to assess the damage, they discovered what had caused it: directly beneath the museum floor was a massive prehistoric cave. The museum's own website describes it precisely: “collapsing of the bedrock roof above a prehistoric cave.” 1","The cave had always been there. The museum had been built directly above it, separated from the cavern ceiling by a thin skin of limestone. For the entire operational life of the building, one of the world's great automobile collections had been sitting on top of an enormous hidden thing that nobody knew was there. No ground survey had detected it. No geological assessment had flagged it. The floor felt solid. The building felt permanent.","This book is about what happens when the floor opens up.","In 1907 a wealthy Englishman named George Herbert, the fifth Earl of Carnarvon, took up an interest in archaeology and approached the Egyptologist Howard Carter with a proposal: Carter would oversee their excavations, Carnarvon would provide the funding. Together they received permission to excavate in the Valley of the Kings, where the tombs of Egypt's pharaohs had been found for centuries. Their target was the tomb of Tutankhamun, whose burial site was unknown.","They spent five years looking. They found nothing. By 1922, Carnarvon was finished. He informed Carter that he was done with the fruitless quest. Carter pleaded for one more season. Carnarvon relented.","Carter then recognized something he had overlooked: he mapped the entire floor of the Valley of the Kings and identified the one area that had never been excavated — the area directly beneath their own base camp. Every previous expedition had cleared the valley methodically. Nobody had cleared the spot where they put their tents.","Within a few days of digging there, Carter's workmen found a step cut into the bedrock. Then another. Then twelve steps, and an intact sealed doorway bearing the royal necropolis seal. The tomb of Tutankhamun had been there the entire time. It had been hidden for 3,000 years under a layer of debris from the cutting of a nearby tomb 150 years after Tutankhamun's burial, and then covered by ancient workers' huts that every subsequent expedition had avoided disturbing. The most famous archaeological find of the 20th century was under their feet.","When Carter made a small hole in the second sealed doorway and held a candle inside, Lord Carnarvon asked from behind him: “Can you see anything?” Carter replied: “Yes, wonderful things.”","The Carter story is not exceptional. It has become, if anything, routine.","In 1994, a German archaeologist named Klaus Schmidt visited a hill in southeastern Turkey that had been surveyed decades earlier and dismissed as a medieval cemetery. He recognized immediately that the stone fragments emerging from the ground were not medieval. The site — Göbekli Tepe, Turkish for ‘Potbelly Hill' — turned out to be a monumental temple complex dated by radiocarbon analysis to approximately 9600 BC. It predates Stonehenge by more than 6,000 years. Predates the pyramids by 7,000 years. Predates the invention of writing by several millennia.","The standard narrative of human development held that civilization followed a specific sequence: agriculture first, then settled communities, then organized religion, then monumental architecture. Göbekli Tepe reversed this entirely. Hunter-gatherers — people without agriculture, without cities, without pottery — had organized themselves to quarry, carve, and erect massive limestone pillars in precisely arranged circles, decorated with sophisticated iconographic carvings. The monument is so large and complex that scholars estimate it required a sustained labor force of hundreds of people over generations. The consensus was wrong. The site had been there for 11,600 years. Approximately 90 percent of it remains underground today.","The pattern is not exceptional. It has become, if anything, routine.","In 2020, Egyptian archaeologists working near the Valley of the Kings found what journalists called the “Egyptian Pompeii” — the city of Aten, built by Amenhotep III, lying intact beneath three feet of sand three miles from one of the most intensively excavated landscapes on earth. The city was so well preserved that loaves of bread were found in its ovens. It had been there for 3,000 years. Nobody had looked in that exact spot.","In 2025, the first royal Egyptian tomb discovered since Tutankhamun's was found near the Valley of the Kings — the tomb of Thutmose II, hidden through 200 years of continuous modern Egyptian archaeology in a landscape that the academic consensus had declared substantially understood.","In 2022, a team of researchers conducting a LiDAR survey — airborne laser mapping that penetrates jungle canopy to reveal ground features below — over 658 square miles of the Mirador-Calakmul Karst Basin in northern Guatemala identified 964 ancient Maya settlements that no ground-level survey had ever detected. Not fragments. Not single structures. Settlements — cities, towns, and villages organized into at least six levels of hierarchy, connected by more than 100 miles of elevated causeways, with ball courts, water reservoirs, and agricultural terracing. The survey was centered on El Mirador, a site that archaeologists have studied since the 1960s. At the center of El Mirador stands La Danta — the largest pyramid in the history of the Maya, larger than the Great Pyramid of Giza, estimated to have required between six and ten million days of labor to build. It has been known for decades. The 964 surrounding settlements were entirely unknown until 2022. 3","In Belize in 2025, a dig at Caracol — a well-known, extensively studied Maya city — unearthed a chamber containing a royal burial that no previous excavation had detected. Caracol has been excavated for decades. It still had things nobody knew were there. 4","IV. What Has Not Been Found Yet","The Corvette Museum, the Valley of the Kings, Göbekli Tepe, the city of Aten, El Mirador: these are in Kentucky, Egypt, Turkey, and Guatemala. In a parking lot, in an exhausted desert, on a hill that had been surveyed and dismissed, under three feet of sand three miles from the most famous dig in history, in a jungle where 964 settlements were invisible from the ground. Proximity does not guarantee discovery. Familiarity does not guarantee understanding. The floor can feel solid for decades.","In Mesoamerica — the region spanning southern Mexico, Guatemala, Belize, and Honduras that is the focus of this book — the variables are particularly dramatic.","Lamanai, a major ancient city in northern Belize with 718 mapped structures and 3,500 years of continuous occupation, has been excavated to approximately 5 percent of its extent. Ninety-five percent of a major ancient city is still in the ground. The remaining 95 percent has not been found.","The Mesoamerican archaeological situation has an additional complication that Egypt and Turkey do not. The Spanish arrived in the 16th century with a specific intention to eliminate the indigenous intellectual and cultural record. In 1562, Bishop Diego de Landa ordered the burning of Maya codices at Maní, in the Yucatán. De Landa was a Spanish Franciscan friar charged with converting the Maya to Christianity; historians regard his order to burn the Maya books as one of the most consequential acts of cultural destruction in history. Thousands of bark-paper books containing historical, astronomical, ritual, and genealogical records accumulated over centuries were destroyed in a single afternoon. Only three authenticated pre-Columbian Maya codices survive. Whatever those books contained about the history, genealogy, and religious traditions of the people who wrote them is gone permanently. It cannot be excavated.","The Maya also built on top of earlier structures as a matter of religious and political practice. Earlier temples were encased within later ones. The Preclassic city sits inside the Classic city. The Classic city sits inside the Postclassic rebuilding. What an excavator sees at the surface is the most recent layer. The earlier layers are accessible only through deeper excavation, which requires funding, permission, and time. Most sites have received neither the funding nor the time.","The result is that the Mesoamerican archaeological record — for all that has been discovered in the past two centuries — represents a partial, and in some places systematically truncated, picture of what was actually there. Five percent of Lamanai. Ninety percent of Göbekli Tepe still underground. Nine hundred sixty-four settlements at El Mirador invisible until 2022. A royal tomb at Caracol undetected through decades of excavation. Three codices surviving out of a library.","This book is not an argument from ignorance. It does not claim that the absence of evidence proves the presence of something. It is the opposite: a careful account of what the evidence actually shows, given what has been excavated, what has been destroyed, and what remains underground.","The Book of Mormon was published in 1830. It has been controversial since the moment it appeared. Some of that controversy is theological and lies outside the scope of this book. But a significant portion of it has always been empirical: the text describes things — places, peoples, crops, animals, scripts, buildings, events — that its critics argued were invented, impossible, or inconsistent with the ancient world it claimed to describe.","The empirical controversy has had an interesting history. Evidence has arrived — not in a flood, but in a steady accumulation — from sources that had no interest in the Book of Mormon one way or the other. Epigraphers, archaeologists, geneticists, geographers, and philologists working on unrelated problems have produced findings that bear directly on the text. Some of what they found confirms details the Book of Mormon contained before anyone knew those details were real. Some of it changed the interpretive framework entirely. Some of it arrived by accident, in documents nobody expected, from fields nobody had anticipated.","Some of what that evidence shows falls into a pattern worth naming before the chapters begin. Consider three examples, each examined at length later in this book.","In the mountains of Yemen, German and Yemeni archaeologists cataloguing pre-Islamic temple inscriptions in the early 1990s found stone altars bearing a consonantal root: N-H-M. In ancient South Arabian script, that is Nahom. The Book of Mormon had used that word 162 years earlier — not as a name the travelers invented, but as a place that already had a name when they arrived.¹⁰ The archaeologists were not looking for it. They did not know it mattered. The stone had been there for twenty-five centuries.","A woman named Sariah appears in the Book of Mormon as Lehi's wife. Critics noted that Sariah was not a known Hebrew woman's name. Then scholars translated papyri from a 5th-century BC Jewish military colony in Egypt, and the name appeared in the record: a real Hebrew woman, in the right era, with that name.¹¹ A man named Alma appears in the same text. Critics argued that Alma was a Latin feminine noun, not an ancient Semitic masculine name. Then scholars deciphered cuneiform business records from the city of Ebla — dated to approximately 2300 BC — and found it: Alma, a man's name.¹²","None of this was arranged. None of it was predicted. The text simply had these names before the evidence existed to confirm them. Names in the right language, the right form, the right region — confirmed by the right sources, by people who had never read the Book of Mormon.","The second kind of evidence changes the way you read the entire text. The Book of Mormon describes towers, high places, and temples built on elevated ground. It never mentions pyramids. For decades, critics called this a gap — an omission that exposed the book's 19th-century origin, since any ancient American narrative should mention the most visible monuments on the landscape. Then Mesoamerican scholarship established what the people who built those monuments actually called them: artificial mountains. Sacred elevated platforms. Not tombs, not monuments — sanctuaries. What the Hebrew tradition called bamot, or high places. The silence in the text is not a gap. It is a match. It is what a Hebrew-tradition writer in Mesoamerica would produce. This kind of evidence does not confirm a single detail. It reframes the whole.","The third kind is evidence that arrived sideways. No one was looking for the name Alma in Eblaite business records. No one was searching Epi-Olmec stone inscriptions for dates that match the Book of Mormon's timeline. These things surfaced in the course of unrelated research, were noticed by scholars with no stake in the outcome, and landed directly on problems the text had presented since 1830. They are, in a sense, the most persuasive category — because no one can accuse anyone of looking for them.","The fourth category is things that took a long time and are only now beginning to show what lies beneath. The geographic model has been refined across more than a century of work. Each generation of researchers cleared another triangle of ground and found another step. The first steps have been found. The work is not finished.","And some things remain unknown. Ninety-five percent of Lamanai is still in the ground. The codices the Spanish burned are gone permanently. Untranslated words in the text — sheum, neas, cureloms, cumoms — have plausible ancient etymologies not yet definitively confirmed. The current absence of knowledge is not evidence of absence. It is evidence of a floor that has not yet been opened.","This book does not claim to prove that the Book of Mormon is what it says it is. That kind of proof is not available in archaeology or linguistics or geography. What it claims is more modest — and more consequential: that the evidence accumulated since 1830, from sources with no interest in the outcome, has moved consistently in one direction. Not all at once. Not conclusively. But consistently, and in ways that no one predicted.","Carter and Carnarvon spent five fruitless years before they realized that what they were looking for was under their feet. Elder Renlund observed that there is no need to labor unsuccessfully, as they did for a time, to find the treasure. The steps, it turns out, are already there. They are simply waiting for someone willing to clear the camp.","1 National Corvette Museum. “Sinkhole.” corvettemuseum.org/sinkhole.","2 Schmidt, K. 2000. “Göbekli Tepe, southeastern Turkey: A preliminary report on the 1995–1999 excavations.” Paléorient 26/1:45–54.","3 Hansen, R.D. et al. 2022. “LiDAR analyses in the contiguous Mirador-Calakmul Karst Basin, Guatemala.” Ancient Mesoamerica. doi.org/10.1017/S0956536122000244.","4 Chase, A.F. and Chase, D.Z. 2025. Discovery of the tomb of Te K'ab Chaak, first ruler of Caracol. Announced July 10, 2025, University of Houston. Peer-reviewed publication forthcoming; results presented at the Maya Working Group conference, Santa Fe Institute, August 2025.","5 Pendergast, D.M. 1981. “Lamanai, Belize: Summary of Excavation Results, 1974–1980.” Journal of Field Archaeology 8/1:29–53.","6 Landa, D. de. 1566. Relación de las cosas de Yucatán. [The burning of Maya codices at Maní occurred July 12, 1562; documented by Landa himself.]","Epigraph Renlund, D.G. “Jesus Christ Is the Treasure.” October 2023 General Conference. churchofjesuschrist.org/study/general-conference/2023/10/57renlund"],"preface":["This book asks one question: has the evidence moved toward or away from the plausibility of the Book of Mormon since 1830?","It does not attempt to prove the Book of Mormon is what it claims to be. That kind of proof is not available in archaeology or linguistics or geography. The Book of Mormon is a religious text making theological claims that no shovel can confirm or refute. This book is not about those claims.","It is about a different category of claim entirely — the empirical kind. The Book of Mormon describes specific places, specific crops, specific languages, specific animals, specific scripts, specific buildings, and specific events. Those descriptions can be tested against the physical record. Since 1830, they have been tested — not by believers working to confirm them, but by epigraphers, archaeologists, geneticists, paleoclimatologists, and linguists working on entirely unrelated problems. The pattern of what those researchers have found is the subject of this book.","This book is written for two readers who do not usually share a shelf.","The first is someone who believes the Book of Mormon and wants to understand what the evidence actually shows — not the advocacy version, not the dismissal version, but the honest account of what independent scholarship has produced. There is more here than most believers know, and some of it is unexpected. There are also gaps, and they are named here plainly. A case built on selected evidence is fragile. This one is not.","The second is someone who is curious — skeptical, perhaps, but sincerely interested in what the argument looks like when it is made rigorously and honestly. If you have encountered only the popular dismissals of the Book of Mormon, this book may surprise you. If you have encountered only the popular defenses, this book may also surprise you. The goal is not to persuade. The goal is to show what the evidence actually shows, and let the reader decide what to do with it.","A Note on the Text — Three Civilizations, Not Two","For readers who have not read the Book of Mormon, a brief orientation: the Book of Mormon is a religious text published by Joseph Smith in 1830, presented as a translation of ancient records. Contrary to a common simplification, it does not describe two groups migrating from the ancient Near East to the Americas. It describes three.","The first group: the Jaredites. They departed Mesopotamia at the time the Book of Mormon associates with the Tower of Babel — which, on the traditional biblical chronology, falls somewhere between roughly 2000 and 2400 BC depending on the manuscript tradition followed — crossed the northern ocean in sealed vessels, and landed on the Gulf Coast of the Americas (Ether 1:33; 6:4–8). They built a civilization lasting nearly two millennia before destroying themselves in civil war. The last Jaredite, a man named Coriantumr, survived the final battle, wandered alone, and was found by the people of the second group.","The second group: the people of Zarahemla. They departed Jerusalem at approximately 589 BC, led by a man named Mulek, identified in the text as the surviving son of Zedekiah, the last king of Judah before the Babylonian conquest (Helaman 6:10; 8:21). They settled in what became the land and city of Zarahemla. The Book of Mormon consistently calls them “the people of Zarahemla” — the conventional modern label “Mulekites” does not appear in the text at any point. This group had no scripture: their language deteriorated over generations until it was mutually unintelligible with the language of the third group (Omni 1:17). They are important to this book because they represent the geographic junction between the first and third groups: the last Jaredite survivor, Coriantumr, was found by the people of Zarahemla and lived among them for nine months before dying (Omni 1:21). The Jaredite civilization ends in their presence. That intersection is testable against the archaeological record.","The third group: Lehi's family. They departed Jerusalem around 600 BC (1 Nephi 1–2), traveled south through the Arabian Peninsula — giving specific place names and directional bearings that can be tested against Arabian geography — and eventually built a ship on the Arabian coast and crossed the open ocean to arrive in the Americas. This group divided into Nephites and Lamanites; their descendants are the subject of most of the Book of Mormon's narrative. The Nephite civilization ends approximately 421 AD, when the last Nephite, a man named Moroni, sealed the record and deposited it in a hill in what is now upstate New York.","The three civilizations do not operate in separate compartments. They telescope together at their ends. The Jaredite civilization collapses at approximately the time the people of Zarahemla arrived. Coriantumr's contact with the people of Zarahemla — documented in Omni 1:21 — is the historical junction point between the first and second groups. The Nephites later absorb the people of Zarahemla and translate the Jaredite record (Mosiah 8:7–9; 28:11–18), bringing all three civilizations into a single textual framework. The three separate migration events produce three independently testable archaeological footprints, each in a specific region of Mesoamerica, all converging in the same 400-mile corridor from the Pacific coast of Guatemala through Chiapas and into the Petén. Chapter Two frames this argument in full, establishing the evidentiary framework for the two-civilization model. Chapter Nine examines the theological world the Nephites entered when they arrived.","This book also explains, briefly, why one hill appears in both the final Jaredite narrative and the final Nephite narrative under different names. The Jaredites called their final battle hill Ramah. The Nephites called the same hill Cumorah. Moroni — who abridged the Jaredite record and recognized in it the same hill where his father had buried the Nephite records — explicitly identifies them as the same place (Ether 15:11). He later gave the same name, Cumorah, to a different hill in upstate New York, where he buried the plates he carried from Mesoamerica. Why two different hills share the same name is not a geographic problem. It is a naming problem — and the answer is that Cumorah designates what a hill is for, not where it is. Chapter Thirteen develops this argument.","The non-LDS scholarship cited in this work has been sought out deliberately. Every effort has been made to ground this book in research produced by scholars working on unrelated problems — not by apologists working to confirm the Book of Mormon, and not by critics working to undermine it.","Scholars excavating Mesoamerica, deciphering Akkadian tablets, mapping ancient climate events, documenting Arabian Peninsula inscriptions, analyzing ancient DNA, and studying Olmec civilization were not working to validate or invalidate the Book of Mormon. Most had never read it. That they keep producing findings that bear directly on the text is not something this book arranged. It is simply what keeps happening.","When evidence for a proposition comes from people with no stake in proving it, that evidence carries weight that no amount of motivated research can replicate. That is the only kind of evidence this book cites.","One category of LDS scholarship is included: the work of field archaeologists and linguists whose findings have been peer-reviewed and independently confirmed by non-LDS researchers. Where an LDS scholar's affiliation is relevant to the reader's evaluation of a claim, it is disclosed. A small number of arguments in this book rest in part on work that has appeared only in LDS or non-peer-reviewed venues — most notably the proposed Semitic and Egyptian element in the Uto-Aztecan languages. Where that is the case, it is flagged plainly at the point it arises, and the argument is presented on its own evidentiary merits rather than on any claim of mainstream scholarly endorsement it has not received.","This book does not examine every empirical claim in the Book of Mormon. It examines the claims where independent scholarship has produced relevant evidence. Some are examined because the evidence confirmed them. Some are examined because the evidence has not confirmed them, and honesty requires saying so. The selection is not exhaustive, but it is honest about its own limits.","This book does not claim to prove the Book of Mormon is what it says it is. It does not claim that archaeology has confirmed Nephite cities. It does not claim that the geographic model is certain. It does not claim that all the evidence is in.","It claims something more modest: that the specific, checkable claims in the text have aged better than anyone would have predicted in 1830 — better, in fact, than its critics predicted. Point by point, what was held up as proof the Book of Mormon was wrong has become, with advancing knowledge, evidence that it is not obviously wrong. The plausibility of the text's historical claims has progressed consistently in one direction. This book documents the direction."],"ch01":["What Scholarship Has Found Since 1830","“There is currently a remarkable set of correspondences that are quite precise for time, place, and event — showing that the Book of Mormon accurately reflects the greater world in which it was written.”","— Brant A. Gardner, “History and Historicity in the Book of Mormon,” FairMormon Conference (2015)","This chapter establishes the method and the pattern. It documents what the settled consensus of 1830 held to be true about ancient America, introduces the critics who made that case most rigorously, and then tracks what independent scholarship has done to those claims in the nearly two centuries since. It is organized not as an argument but as a record: here is what was said, here is what was found, here is the direction the evidence has moved. The chapters that follow develop each argument in full. This chapter shows why those arguments matter.","Consider three items before the catalog begins. NHM altar inscriptions in Yemen confirmed a place name the text used 162 years earlier — a burial site the Book of Mormon identified as pre-existing, not invented.","A woman named Sariah appears in the Book of Mormon as Lehi's wife. Critics called this an invented name — Sariah was not a known Hebrew woman's name. Then scholars translated papyri from a 5th-century BC Jewish military colony in Egypt, and the name appeared in the record. A man named Alma is condemned in the text as a Latin feminine noun, not an ancient Semitic masculine name. Then scholars deciphered cuneiform business records from the city of Ebla, dated to approximately 2300 BC, and found it: Alma, a man's name. None of this was arranged. The text simply had these names before the evidence existed to confirm them.","These are not the argument. They are an introduction to its texture. The chapters that follow collect two centuries of findings like these — from epigraphers, archaeologists, paleoclimatologists, and linguists working on unrelated problems who kept inadvertently confirming specific, checkable claims the Book of Mormon had been making since 1830. What follows is the record of what they found.","Those three are the texture of the argument. But they are not the only data point. Over two centuries, critics of the Book of Mormon made specific, confident predictions about what the evidence would never show. The evidence has been arriving ever since.","Critics argued the name Nahom was invented. German and Yemeni archaeologists cataloguing pre-Islamic temple inscriptions near Marib, Yemen, found three stone altars inscribed with the consonantal root N-H-M — in ancient South Arabian script, as in Biblical Hebrew, only consonants are written, not vowels, making N-H-M the written form of Nahom. The altars had been there for twenty-five centuries. The prediction failed.","Critics argued that Sariah was not a real Hebrew woman's name. Scholars translating papyri from a 5th-century BC Jewish military colony at Elephantine in Egypt found it: a real Hebrew woman, the right era, that name. The prediction failed.","Critics argued that “Alma” was a Latin feminine noun imported from 19th-century Spanish — not an ancient Semitic masculine name. Scholars deciphering cuneiform business records from the city of Ebla, dated to approximately 2300 BC, found it: Alma, a man's name. The prediction failed.","Critics made a categorical claim: no pre-Columbian barley existed anywhere in the New World. Three wild species of barley are native to the Americas. Domesticated little barley has been confirmed at multiple pre-Columbian sites — from Arizona to Illinois to Iowa — and researchers document its cultivation extending into parts of Mexico, within the well-established trade network between North America and Mesoamerica. The categorical claim was wrong. The prediction failed.","For decades, the scholarly consensus held the Classic Maya were an unusually peaceful civilization, making the Book of Mormon's pervasive, detailed warfare look like 19th-century invention projected onto an imagined past. Epigraphy unlocked the Classic Maya inscriptions in the 1980s and 1990s, and what emerged was a civilization in nearly continuous organized warfare. The prediction failed.","Critics argued that steel weapons were a historical error in the text — a technology that did not yet exist in Lehi's Jerusalem around 600 BC. A sword with a steel-hardened edge was excavated at Vered Jericho, in a Jerusalem-area context, dated to approximately 600 BC. The prediction failed.","Critics argued that sophisticated writing did not exist early enough in Mesoamerica to support the Book of Mormon's literate civilization. The Cascajal Block — a stone tablet bearing a previously unknown writing system — was dated to 900–800 BC. The San Bartolo murals, elaborate iconographic programs with calendrical notation, were dated to approximately 100 BC. The prediction failed.","That is the track record. Not a proof — individual findings can be disputed, recontextualized, or supplemented by further evidence. But a pattern of specific, confident falsification predictions failing in one direction, from researchers working on unrelated problems who had no stake in the outcome, is not what fabricated texts produce. The chapters that follow document how the pattern was built.","By the time Joseph Smith published the Book of Mormon in March 1830, the educated Western world had reached a fairly settled picture of ancient America. It was not flattering.","The prevailing consensus held several things to be essentially true. The indigenous peoples of the Americas were pre-literate: no writing systems, no recorded history, no civilization in the sense that word carried in 19th-century academic usage. They were understood to be relatively sparse in number, organized at best into small agricultural communities, and entirely disconnected from the languages, crops, monetary systems, or technologies of the ancient Near East from which the Bible emerged.","This was not a fringe view. Lewis Cass — U.S. Secretary of War, long-serving Governor of Michigan Territory, and the leading federal authority on Native American affairs — expressed the scholarly standard of the era in his 1823 essay in the North American Review, describing indigenous peoples as entirely without writing, institutional law, or historical continuity (Cass, 1823). Albert Gallatin, co-founder of the American Ethnological Society, codified the same position in his authoritative Synopsis of the Indian Tribes of North America, published in the Transactions of the American Antiquarian Society (Gallatin, 1836). These were not peripheral figures. They represented the leading scientific opinion of the era on the peoples Joseph Smith claimed as ancestors of the Book of Mormon's characters.","This picture was not born of prejudice alone, though prejudice certainly colored it. The scholars who held it were working from the best available evidence of their time. They were not fools. They were working from what they could see — and what they could see was limited.","No one in 1830 had read a Babylonian financial tablet, because cuneiform would not be deciphered for another 27 years. No one had identified an ancient writing system native to Mesoamerica, because Maya hieroglyphs were still largely undecoded and the Olmec script had not yet been found. No one had documented pre-Columbian cement construction, because the relevant sites had not been excavated. No one had found the altar inscriptions in Yemen that corroborate a specific place name in the Book of Mormon's opening narrative — those inscriptions would not be discovered for another 160 years. And no one possessed the aerial technology that would eventually reveal the true scale of ancient civilization hidden beneath centuries of jungle growth.","This book asks one question: has the evidence moved toward or away from plausibility since 1830? It does not attempt to prove the Book of Mormon is what it claims to be. That kind of proof is not available in archaeology or linguistics or geography, and this book does not pretend otherwise. What it tracks is simpler: the direction of the evidence, across thirteen chapters, across nearly two centuries of scholarship, largely from researchers with no stake in the outcome. The answer, documented point by point below, runs consistently in one direction. The direction of evidence has consistently moved from impossibility toward plausibility, and in some cases, to confirmation of the historical claims the Book of Mormon has made.","Critics of the Book of Mormon sometimes pose a challenge that sounds rigorous but is not: “Tell me what evidence would prove the Book of Mormon false.” The demand for falsifiability — the idea that a claim is only meaningful if one can specify in advance what would disprove it — is a reasonable standard in laboratory science. It is not how historical inquiry works, and applying it to ancient texts is not intellectual rigor. It is a distraction from a more useful question.","No one applies this standard to the Iliad. When Heinrich Schliemann set out in 1870 to excavate the site he believed was Troy, no one required him to specify in advance what evidence would prove Homer wrong. The question was simpler and more useful: does the evidence support or undermine the text's historical claims? Schliemann dug at Hisarlik because the Iliad described a walled city on a defensible hill near a navigable river close to the Aegean coast. He found one — multiple layers of it, rebuilt on the same site over millennia. The question answered itself without anyone first requiring a falsifiability declaration.","The right question for any ancient text claiming historical content is not “what would falsify this?” It is: “Is this text historically reliable?” That is a question the evidence can answer — gradually, because the excavation of Mesoamerica is nowhere near complete; imperfectly, because organic material decays, entire libraries of codices were burned, and temples were built over temples for a thousand years before European contact; and without certainty, because the events described occurred between roughly 600 BC and 400 AD, and no ancient history at that distance admits certainty. But it can be asked rigorously and answered honestly. That is what this book does.","A second challenge, related but distinct, deserves a direct response. Some critics dismiss the Book of Mormon's historical claims not on the basis of evidence but simply because they do not want it to be true. The argument runs roughly: the Book of Mormon is a 19th-century religious document produced by an uneducated farmer in upstate New York, and therefore its claims about ancient civilization are not worth investigating. This is a conclusion in search of reasoning, not reasoning in search of a conclusion. It is an argument designed to produce comfort for the unconvinced rather than to engage what the evidence actually shows.","Counterarguments based on evidence are entirely fair. They appear throughout this book — most fully in Chapter Twelve, which is devoted entirely to claims that do not currently have supporting findings. What does not deserve the same weight is the argument from prior commitment: the position that the Book of Mormon cannot be historically reliable because the person who produced it could not have done so. That argument is not about the evidence. It is about the arguer's conclusion, reached before the evidence was examined. This book is about the evidence.","III. The First and Most Formidable Critic","Any serious examination of early opposition to the Book of Mormon must begin with Alexander Campbell, and any serious examination of Alexander Campbell must begin with who he actually was.","Campbell (1788–1866) was one of the most formidable religious thinkers in 19th-century America — a preacher, lecturer, and philosopher who ran two major newspapers, organized and led the largest indigenous Protestant movement in the New World, and served as the founder, first president, and professor of Bethany College in Virginia. His publication The Millennial Harbinger reached readers across the continent. Richard Bushman, Yale historian and author of Joseph Smith: Rough Stone Rolling (Knopf, 2005), acknowledged that Campbell “read enough of the Book of Mormon to offer a reasoned critique.” When Alexander Campbell said something was impossible, educated Americans listened.","It is also worth understanding the circumstances under which Campbell wrote. His “Delusions” article — 8,836 words — was published in The Millennial Harbinger on February 7, 1831. Only weeks before, Sidney Rigdon, one of Campbell's own ministers and a close associate, had converted to Mormonism and taken a substantial portion of his congregation with him to Kirtland, Ohio. Campbell had just suffered a significant institutional loss. He also had only a few weeks to read a 588-page book before producing his analysis. Moreover, Campbell was engaged in his own restoration project — the Disciples of Christ movement — and the new Mormon church was drawing from the same theological wells, the same revival culture, and many of the same congregations. He was a man of formidable intellect operating under personal grievance, competitive institutional pressure, and a Protestant theological framework that made the very premise of new scripture difficult to accept before he read a word. None of this makes him dishonest. All of it is relevant context for reading him fairly.","His most inflammatory passages reveal that temperature clearly. Of the Book of Mormon's literary quality, he wrote: “It is patched up and cemented with ‘And it came to pass'… and is, without exaggeration, the meanest book in the English language.” His verdict on its origin: “It is as certainly Smith's fabrication as Satan is the father of lies, or darkness the offspring of night.”","One observation Campbell made, however, has aged better than anything else he wrote — even though he intended it as proof of fraud:","“[The Book of Mormon] decides all the great controversies — infant baptism, ordination, the trinity, regeneration, repentance, justification, the fall of man, the atonement, transubstantiation, fasting, penance, church government, religious experience, the call to the ministry, the general resurrection, eternal punishment, who may baptize, and even the question of free masonry, republican government, and the rights of man.”","Campbell meant to show that Joseph Smith had compiled every theological controversy of his day into his book, betraying its 19th-century American origin. What he inadvertently showed was that a 23-year-old farmer's son with little formal education had produced a 270,000-word, internally consistent, multi-generational ancient narrative so comprehensive in its theological scope that one of the most learned Protestant ministers in America needed 8,836 words just to catalog it. Campbell's archaeological objections have been dismantled one by one by subsequent scholarship. His observation about the text's extraordinary comprehensiveness has not been dismantled. It has only become more striking.","Campbell was not alone. The first decade of Book of Mormon criticism produced a recognizable set of voices, each with a distinct character and a distinct set of claims. Understanding them — and what became of their specific arguments — is the most direct way to document the direction of the evidence since 1830.","EBER D. HOWE and DOCTOR PHILASTUS HURLBUT. Mormonism Unvailed [sic]. Painesville, Ohio, 1834. Howe, editor of the Painesville Telegraph, dedicated 76 of his 290 pages to a book-by-book analysis of the Book of Mormon. His most consequential specific claims: (1) metallurgical errors in time (claims that a technology appears too early in history to be authentic) — steel and brass in pre-Columbian America; (2) the Spaulding manuscript theory — the Book of Mormon was plagiarized from an unpublished novel by Solomon Spaulding. Chapter Seven addresses the metallurgical claims. The Spaulding theory requires a paragraph of its own.","ORIGEN BACHELER. Mormonism Exposed, Internally and Externally. New York, 1838. Bacheler's specific historicity claims: the 3 Nephi 8 catastrophe “has no appearance of truth”; the transparent stones in Ether 3 are “ages before glass was invented”; ziff is a fake word; irreantum is meaningless nonsense; and Lehi's wilderness sacrifices violate Josiah's Deuteronomy reform. Chapters Three through Six address these in turn.","Three other critics are less relevant to this book's empirical focus. Abner Cole (“Obadiah Dogberry”), writing in the Palmyra Reflector (1829–1831), focused on literary mockery and character attacks on Smith rather than historicity arguments. Ezra Booth's Ohio Star letters (1831) addressed failed prophecies and organizational failures he witnessed as a brief church member, not archaeological anachronisms. Thomas C. Sharp, editor of the Warsaw Signal (1841–1844), made political and social objections to the Mormon presence in Illinois. None of the three made systematic arguments about steel, horses, ancient scripts, or Mesoamerican geography.","The Spaulding Theory — The Settled Debate","The dominant secular alternative to revelation as an explanation for the Book of Mormon's origin was the Spaulding manuscript theory. Howe's 1834 book argued that the Book of Mormon was plagiarized from an unpublished novel by Solomon Spaulding (1761–1816), a former preacher who had written a historical fiction about ancient Romans discovering America. Multiple witnesses who knew Spaulding signed affidavits claiming to recognize his manuscript in the Book of Mormon. The theory held that Sidney Rigdon had obtained Spaulding's manuscript and collaborated with Smith to adapt it.","In 1884, L. L. Rice — who had purchased the assets of Howe's Painesville Telegraph in 1839, including files he had not examined — discovered the Spaulding manuscript in his collection in Honolulu, Hawaii. He deposited it with Oberlin College president James H. Fairchild. Rice, Fairchild, and several others — none of them church members — examined the manuscript. Rice wrote: “I am of the opinion that no one who reads this Manuscript will give credit to the story that Solomon Spaulding was in any wise the author of the Book of Mormon.” Fairchild concluded: “The theory of the origin of the Book of Mormon in the traditional manuscript of Solomon Spaulding will probably have to be relinquished.” They could “detect no resemblance between the two, in general or detail.” Since 1885, no serious student of Mormonism has advanced the Spaulding theory as a credible explanation. B1","IV. What the Book of Mormon Said","Into the settled consensus of 1830, the Book of Mormon made claims that were not merely unverified. Several were in direct tension with the best available knowledge of the day.","It described a civilization-scale society in the ancient Americas: cities, armies numbering in the tens of thousands, professional metalworkers, and agricultural systems using identifiable crop names. Its monetary economy was unlike any system known to scholarship at that time — structured around two simultaneous commodity standards with named denominations and defined conversion rates. And it described an extensive tradition of written records kept on metal plates. It placed the story in a specific geographic setting: a north-flowing river, a narrow land passage between two seas, events consistent with a volcanic catastrophe including floods, dark skies, fire, and earthquake, datable to the first century AD. It included a detailed account of a family's journey across the Arabian Peninsula — giving specific directional bearings and a burial site name that has since been confirmed archaeologically — before crossing an ocean to the New World.","It also did something a fabricator would almost certainly not have done: it preserved untranslatable vocabulary intact. Joseph Smith consistently rendered familiar concepts into English equivalents. Horses are horses. Cattle are cattle. Wheat is wheat. Barley is barley. But when he encountered vocabulary he apparently could not identify, he left it untranslated: neas (an unidentified grain, preserved untranslated in the crop list at Mosiah 9:9), sheum, cureloms, cumoms. This is exactly the pattern of an honest translator encountering unfamiliar ancient terms. No pre-1830 writer of ancient American fiction did this.","Sheum deserves particular attention. The word appears in Mosiah 9:9 in a list of crops, untranslated and unglossed. When Akkadian cuneiform was deciphered beginning in 1857, and Sumerian subsequently unlocked in the decades that followed, scholars found ŠE.UM — the primary Sumerian word for grain, the central agricultural term of ancient Mesopotamia at the time of the Tower of Babel, approximately 2200 BC. The word Joseph Smith left untranslated in 1829 — in a language no living person on earth could read — turned out to be the primary grain term of exactly the civilization whose story the Jaredite narrative recounts. Chapter Four develops this argument in full, including the control test and Joseph Smith test results for sheum and the other preserved untranslated terms.","The scholarly consensus of 1830 would have pushed any fabricator in a different direction entirely: toward the familiar landscape of North America, toward the hunter-gatherer and mound-builder cultures already in the public imagination, toward vague narratives rather than named places, toward King James vocabulary rather than untranslatable Mesopotamian grain terms. The Book of Mormon went the opposite way on nearly every point.","V. What 1820s Fiction About Ancient America Looked Like","Before examining what the evidence has done since 1830, it is worth establishing what a fabricated story about ancient America actually looked like when someone of that era tried to write one — because the record exists.","Solomon Spalding, a former minister, wrote a fictional narrative around 1812 called Manuscript Found — Romans blown off course and landing in ancient America. Ethan Smith published View of the Hebrews in 1823, arguing the ten lost tribes migrated to the New World. James Adair's History of the American Indians (1775) made a similar case from an earlier generation. The Spalding manuscript was recovered in 1885 and is publicly available.","The pattern is consistent across all three pre-1830 works: they are vague where the Book of Mormon is specific, and specific only in ways that cannot be verified or falsified. No fictional account of ancient America written before 1830 includes a monetary system with named denominations operating on dual commodity standards. None preserves untranslatable vocabulary from a dead language. None traces an Old World journey with a burial site name cross-referenceable against ancient inscriptions. None specifies a construction material geographically exclusive to one region of the New World.","The question is not whether an unusually talented fabricator could produce a comprehensive, internally consistent narrative — Campbell himself demonstrated that such a text existed and could be catalogued in 8,836 words. The question is whether any fabricator, however talented, could produce the specific correct details that independent scholarship working in unrelated fields keeps confirming from sources inaccessible in 1829. Those are not the same question.","The objection that Joseph Smith was simply a more talented fabricator collapses on examination. It is not the quantity of details that separates the Book of Mormon from its contemporaries. It is their nature. Spalding could have named his burial sites and given his river a direction. He did not, because a fabricator with no reliable information wisely avoids specifics that can be checked. Every specific the Book of Mormon offers is checkable. They keep checking out in the text's favor. That is the signature of a translator, not a fabricator.","VI. The Evidence: What Scholarship Has Found","The following account moves category by category through the claims critics identified in 1830 as proof of fabrication — and documents what happened to each one. The full catalog, with direction codes and source citations, appears as Appendix A at the end of this chapter. What follows is the argument.","The Book of Mormon's most falsifiable claims are its geographic ones. The text gives specific directional bearings from Jerusalem. It names a burial site in Arabia. It describes a fertile coastal haven at the tip of the Arabian Peninsula. It identifies an ocean crossing driven by wind. In 1830, every one of these claims was considered implausible or unfalsifiable.","None of them stayed that way. The south-southeast bearing from Jerusalem follows the Frankincense Road, the ancient trade corridor along the eastern face of the Hejaz mountains — the only viable overland route from Jerusalem toward Yemen. A fabricator guessing at Arabian geography would have written ‘south.' South-southeast is either specifically correct or specifically wrong. Researchers who walked the route confirmed it is specifically correct. A1","The burial site name is more striking. First Nephi 16:34 says Ishmael was buried at a place “which was called Nahom” — a place with a name that pre-existed their arrival. In the early 1990s, German and Yemeni archaeologists cataloguing pre-Islamic temple inscriptions near Marib, Yemen — working with no interest in the Book of Mormon — found three votive altars bearing the consonantal root NHM. In ancient Semitic writing, which records consonants but not vowels, that is Nahom. The Nihm tribe still inhabits that region today, the name preserved across twenty-five centuries. Turning due east from the NHM region, following the Hadhramaut plateau corridor, leads directly to the Dhofar coast of Oman. On that coast, at a sheltered lagoon called Khor Kharfot, researchers who spent years walking the Arabian coast confirmed that the site satisfies all twelve of Nephi's criteria for Bountiful simultaneously. No other site in Arabia does. A2","The ocean crossing description — ‘driven forth before the wind' — is a specific meteorological claim. The Indian Ocean monsoon system drives vessels eastward from the Dhofar coast between November and March, producing the passive crossing the text describes. British explorer Tim Severin confirmed the seaworthiness of a traditional Arabian sewn-plank vessel by sailing one 6,000 miles from Oman to China in 1980. The critics who called an Arabian-coast ocean crossing impossible were not citing a weakness in the evidence. They were citing the consensus of 1829. A3","The Book of Mormon opened with one of its easiest targets: Nephi writing in ‘the language of the Egyptians.' Critics were confident. Jews wrote Hebrew. Egypt had nothing to do with Judahite scribal practice.","Then archaeologists excavated 7th and 6th-century Hebrew military outposts in the Negev and found the pottery. Arad, Lachish, Kadesh-Barnea — ostraca from Lehi's generation showing Egyptian hieratic scribal conventions embedded in Hebrew administrative records. Training exercises showing students practicing Egyptian hieratic alongside their Hebrew letters. At Kadesh-Barnea, two ostraca from the same site: one for the Hebrew alphabet, one for Egyptian hieratic numerals. Stefan Wimmer's 2004 systematic study catalogued what he called ‘Palestinian Hieratic' — an independently developed Egyptian-influenced script used by Hebrew scribes in the Kingdom of Judah at exactly the period Lehi left. The claim that Egyptian scribal practice had nothing to do with Judahite writing was not partially wrong. It was categorically wrong. A4","Writing on metal plates was treated as inherently absurd. The Pyrgi Gold Tablets (500 BC, Italy), the Copper Scroll from Qumran, and the Darius Plates from Persepolis (518 BC) — one generation from Lehi — made the practice look commonplace. But the most resonant example was found in a rock-cut burial tomb southwest of Jerusalem's Old City in 1979.","Archaeologist Gabriel Barkay excavated Ketef Hinnom and found, in a bone repository under a collapsed ceiling that had preserved the contents from centuries of looting, two tiny rolled silver amulets. When painstakingly unrolled, they revealed the Aaronic benediction from Numbers 6:24–26 — the Priestly blessing, the most central liturgical text of the Hebrew tradition — inscribed in Paleo-Hebrew characters. These are the oldest surviving texts of the Hebrew Bible. Their date: approximately 650–587 BC, the span that brackets Lehi's departure from Jerusalem. Sacred text, on rolled silver sheets, sealed in a tomb in Jerusalem, in the generation of Lehi. The Book of Mormon does not claim its characters invented writing on metal. It claims they used a practice already native to their world. The silver burial on the Hill of Hinnom is what that practice looks like in the ground. A5","The writing systems of the Americas were considered nonexistent in 1830. By 1952, Yuri Knorozov had published the first phonetic decipherment of Maya hieroglyphs — confirming a fully developed writing system capable of representing any spoken syllable, recording dynasties, battles, and historical narratives across centuries. In 2006, Rodríguez Martínez and colleagues published in Science the discovery of the Cascajal Block — 62 incised symbols on a basalt tablet from San Lorenzo, Veracruz, dated to approximately 900 BC, the oldest confirmed writing in the Western Hemisphere. Three separate pre-Columbian writing systems, none in scholarly awareness in 1830. The critics who called literacy in ancient America an obvious fabrication were not citing a weakness in the text. They were occupying the standard academic position of 1830. By 1990, that position had been overturned completely. A6","The Book of Mormon preserves words it declined to translate. Sheum appears in a crop list at Mosiah 9:9, untranslated and unglossed. When Sumerian cuneiform was unlocked beginning in the 1850s, scholars found ŠE.UM — the primary Sumerian logograph for grain, the central agricultural term of ancient Mesopotamia at the time of the Tower of Babel. The word Joseph Smith left untranslated in 1829, in a language no living person could read, turned out to be the primary grain term of exactly the civilization the Jaredite narrative recounts. Deseret is glossed by the text itself as ‘honey bee' — and yields a plausible Egyptian etymology (dšrt, royal bee). Cureloms and cumoms have no English equivalent because the translator apparently could not identify them. A fabricator invents plausible names. Untranslatability is the authenticity marker. A7","First Nephi 4:9 describes Laban's sword: gold hilt, fine workmanship, blade of ‘the most precious steel.' Critics called this fantastical. The Israel Museum holds an iron sword with gold fittings from a Jerusalem-area tomb dated to approximately 620 BC — within Lehi's generation. Every specific detail is archaeologically plausible. The metallurgical claim requires one additional note: the King James Bible translates both iron and bronze as ‘steel' in multiple passages. The word choice is a translation convention, not a claim about iron-carbon alloy in Mesoamerica. A8","Helaman 3:7–11 was used as evidence of fabrication for over a century: the people who migrated to the Land Northward ‘became exceedingly expert in the working of cement.' Critics argued this was simply impossible. Archaeological excavation of major Mesoamerican sites revealed extensive pre-Columbian lime cement construction, with an explosion of structural use beginning around 100 BC — the period Helaman 3 internally dates. In 2023, Rodriguez-Navarro and colleagues published in Science Advances a finding that ancient Maya lime plasters contained polysaccharide-rich organic additives from tree bark extracts, producing a biomimetic material with durability exceeding modern Portland cement. The Book of Mormon does not say the Nephites merely used cement. It says they ‘became exceedingly expert' in working it. The archaeology confirms exactly that level of specialist sophistication. A9","Third Nephi 6:8 describes ‘highways cast up' and ‘roads made which led from city to city, from land to land.' The word ‘highway' in 1830 meant a raised route. ‘Cast up' is construction language for earthworks. El Mirador's sacbeob — elevated plastered causeways raised 10 to 20 feet above the jungle floor, some miles in length, 40 feet wide — were at peak use approximately 26–30 AD, matching the passage's internal date. A10","The Alma 43–49 fortification system — earthen ditch, heaped bank, timber breastwork, picket frame, towers, bastions — was confirmed by David Webster's 1976 excavation at Becán, Campeche. The ditch: 16 meters wide, 2.5 meters deep, nearly vertical sides, flat bottom. The rampart: 10 to 14 meters wide, 1.0 to 3.6 meters high. The three-element system matches Alma 48–49 precisely. Becán was under jungle and unknown to any outsider until surveyed and excavated in the 20th century. A11","Two crops in the Book of Mormon were considered categorical anachronisms in pre-Columbian America: barley and wheat. On barley: domesticated Hordeum pusillum — little barley, a native North American grass — has been confirmed in the archaeological record across the American Southwest and Midwest. Graham, Adams, Smith, and Murphy documented it at an Ancestral Puebloan site in southwestern Colorado. Asch and Asch identified it as the third most common seed at Woodland sites in Illinois. The claim that barley was impossible in pre-Columbian America has been overturned. Wheat has not been confirmed. The barley precedent is directly relevant to how much weight that absence should carry. A12","No Book of Mormon claim sustained more confident criticism than the mention of horses. In 1830, horses were considered extinct in the Americas since approximately 10,000 BC, reintroduced only by Spanish conquistadors.","Miller, Carpenter, and Hill (2022) documented three extinct horse species at Rancho Carabanchel in San Luis Potosí, Mexico, with nineteen radiocarbon dates spanning approximately 460 BC to AD 1020 — covering the entire Book of Mormon period. The extinct species are morphologically distinct from the Spanish Equus caballus, found only in the topmost stratigraphic unit, ruling out contamination. At Loltún Cave in Yucatán, horse bones in artifact-bearing ceramic layers dated to approximatel
